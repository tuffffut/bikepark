<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikepark Atlas CR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #f2efe9;
  --white: #ffffff;
  --card: #ffffff;
  --border: #e3dfd8;
  --border2: #ccc8c0;
  --ink: #18160f;
  --ink2: #5a564f;
  --ink3: #a09b93;
  --orange: #d4500e;
  --orange-l: #fff3ee;
  --orange-m: #fedbc8;
  --green: #24603f;
  --green-l: #ebf5ef;
  --green-m: #b8deca;
  --blue: #1a4faa;
  --yellow: #e09b00;
  --sh1: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --sh2: 0 4px 16px rgba(0,0,0,.09), 0 1px 4px rgba(0,0,0,.05);
  --sh3: 0 8px 28px rgba(0,0,0,.12);
  --r: 12px;
  --r2: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--ink); line-height: 1.5; }

/* === HEADER === */
.hdr {
  position: sticky; top: 0; z-index: 900;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  box-shadow: var(--sh1);
  height: 56px;
  padding: 0 18px;
  display: flex; align-items: center; gap: 12px;
}
.logo { font-size: 17px; font-weight: 800; color: var(--ink); white-space: nowrap; letter-spacing: -.2px; }
.logo i { color: var(--orange); font-style: normal; }
.vline { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0; }
.pills { display: flex; gap: 4px; }
.pill {
  font-size: 12px; font-weight: 600;
  padding: 4px 11px; border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: transparent; color: var(--ink2);
  cursor: pointer; white-space: nowrap;
  transition: all .14s;
}
.pill:hover { border-color: var(--orange); color: var(--orange); }
.pill.on { background: var(--orange); border-color: var(--orange); color: #fff; }
.pill.on.tc { background: var(--green); border-color: var(--green); }
.srch { position: relative; flex-shrink: 0; }
.srch input {
  border: 1.5px solid var(--border2); border-radius: 20px;
  background: var(--bg); padding: 5px 12px 5px 30px;
  font: inherit; font-size: 13px; color: var(--ink);
  width: 190px; outline: none;
  transition: border-color .14s;
}
.srch input:focus { border-color: var(--orange); }
.srch::before {
  content: '\1F50D';
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  font-size: 13px; color: var(--ink3); pointer-events: none;
}
.hstats { margin-left: auto; display: flex; gap: 12px; flex-shrink: 0; }
.hstat { font-size: 12px; color: var(--ink3); display: flex; align-items: center; gap: 5px; }
.hstat-dot { width: 7px; height: 7px; border-radius: 50%; }

/* === LAYOUT: sidebar left, map right, sticky === */
.app-wrap {
  display: grid;
  grid-template-columns: 420px 1fr;
  height: calc(100vh - 56px);
}
.sidebar {
  display: flex; flex-direction: column;
  background: var(--bg);
  border-right: 1px solid var(--border);
  overflow: hidden;
  height: calc(100vh - 56px);
}
.sb-top {
  padding: 10px 14px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.sb-count { font-size: 12.5px; font-weight: 500; color: var(--ink3); }
.sb-count b { color: var(--orange); font-weight: 700; }
.sort-sel {
  font: inherit; font-size: 12px;
  border: 1px solid var(--border2); border-radius: 6px;
  background: var(--white); padding: 4px 8px;
  color: var(--ink2); outline: none; cursor: pointer;
}

/* THE FIX: normal block layout, not flex, so cards don't collapse */
.card-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px;
}
.card-list::-webkit-scrollbar { width: 5px; }
.card-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
/* gap between cards */
.card + .card { margin-top: 10px; }

/* === MAP === */
.map-side { position: relative; height: calc(100vh - 56px); }
#map { width: 100%; height: 100%; }
.map-lbl {
  position: absolute; bottom: 28px; left: 10px; z-index: 500;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 9px; padding: 6px 10px;
  font-size: 11.5px; color: var(--ink2);
  box-shadow: var(--sh2); pointer-events: none; line-height: 1.45;
}
.map-lbl strong { color: var(--orange); display: block; font-size: 12px; }

/* === CARD === */
.card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--r2);
  overflow: hidden;
  cursor: pointer;
  box-shadow: var(--sh1);
  transition: border-color .18s, box-shadow .18s, transform .15s;
  /* CRITICAL: no flex-shrink, normal block */
  display: block;
}
.card:hover { border-color: var(--orange); box-shadow: var(--sh2); transform: translateY(-1px); }
.card.sel { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(212,80,14,.1), var(--sh2); }
.card.sel.tc { border-color: var(--green); box-shadow: 0 0 0 3px rgba(36,96,63,.1), var(--sh2); }

/* top accent */
.c-stripe { height: 3px; }
.c-stripe.bp { background: linear-gradient(90deg, var(--orange) 0%, #f07a4a 100%); }
.c-stripe.tc { background: linear-gradient(90deg, var(--green) 0%, #42a86b 100%); }

/* card head */
.c-head { padding: 11px 13px 7px; display: flex; align-items: flex-start; gap: 10px; }
.c-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; flex-shrink: 0;
}
.c-icon.bp { background: var(--orange-l); }
.c-icon.tc { background: var(--green-l); }
.c-body { flex: 1; min-width: 0; }
.c-name {
  font-size: 14.5px; font-weight: 700; color: var(--ink);
  margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.c-tags { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.badge {
  font-size: 9.5px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
}
.b-bp { background: var(--orange-l); color: var(--orange); }
.b-tc { background: var(--green-l); color: var(--green); }
.b-reg { background: #edeae4; color: var(--ink3); font-size: 9px; }
.b-plan { background: var(--orange-l); color: var(--orange); }
.b-vis  { background: var(--green-l); color: var(--green); }
.c-btns { display: flex; gap: 4px; flex-shrink: 0; }
.ab {
  width: 30px; height: 30px; border-radius: 7px;
  border: 1.5px solid var(--border); background: var(--bg);
  font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .13s;
}
.ab:hover { border-color: var(--orange); background: var(--orange-l); }
.ab.on-p { background: var(--orange-l); border-color: var(--orange); }
.ab.on-v { background: var(--green-l); border-color: var(--green); }

/* 5 key stats */
.c-stats {
  padding: 2px 13px 10px;
  display: flex; flex-wrap: wrap; gap: 4px 12px;
}
.cst { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--ink2); }
.cst b { color: var(--ink); font-weight: 600; }
.cst.fr b { color: var(--green); }

/* expand toggle */
.x-btn {
  width: 100%; background: transparent;
  border: none; border-top: 1px solid #f0ede7;
  padding: 7px 13px;
  display: flex; align-items: center; gap: 5px;
  font: inherit; font-size: 12px; font-weight: 500; color: var(--ink3);
  cursor: pointer; transition: color .13s; text-align: left;
}
.x-btn:hover, .x-btn.xo { color: var(--orange); }
.x-arr { display: inline-block; transition: transform .2s; font-style: normal; font-size: 10px; }
.x-btn.xo .x-arr { transform: rotate(180deg); }

/* === DETAIL === */
.c-det { display: none; padding: 2px 13px 13px; border-top: 1px solid #f0ede7; }
.c-det.open { display: block; }
.ds { margin-top: 12px; }
.ds-t {
  font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase;
  color: var(--ink3); margin-bottom: 6px;
}
.ds-desc { font-size: 12.5px; color: var(--ink2); line-height: 1.65; }

/* meta grid */
.mg { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.mc { background: var(--bg); border-radius: 7px; padding: 7px 9px; }
.mc-l { font-size: 9px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--ink3); margin-bottom: 2px; }
.mc-v { font-size: 12.5px; font-weight: 700; color: var(--ink); }
.mc-v.fr { color: var(--green); }

/* difficulty bar */
.dbar { display: flex; align-items: center; gap: 7px; margin-top: 5px; }
.dsegs { display: flex; gap: 3px; flex: 1; }
.ds_ { height: 5px; flex: 1; border-radius: 3px; background: var(--border); }
.ds_.g { background: #22c55e; }
.ds_.b { background: #3b82f6; }
.ds_.r { background: #ef4444; }
.ds_.k { background: #1c1917; }
.dtxt { font-size: 11px; color: var(--ink3); white-space: nowrap; }

/* trail pills */
.tpills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
.tp {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 500; color: var(--ink2);
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 5px; padding: 3px 8px;
}
.tp-km { font-size: 10px; color: var(--ink3); }

/* stars */
.stars { display: flex; gap: 2px; margin-top: 4px; }
.star { font-size: 22px; color: var(--border2); cursor: pointer; line-height: 1; transition: color .1s, transform .1s; }
.star.on { color: var(--yellow); }
.star:hover { transform: scale(1.15); }
.rrow { display: flex; align-items: center; gap: 9px; }
.rlbl { font-size: 12px; color: var(--ink3); }

/* note */
.ntxt { margin-top: 5px; }
.ntxt textarea {
  width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 10px; font: inherit; font-size: 12.5px; color: var(--ink);
  background: var(--bg); resize: vertical; min-height: 72px;
  outline: none; line-height: 1.55; transition: border-color .14s;
}
.ntxt textarea:focus { border-color: var(--orange); }
.ntxt textarea::placeholder { color: #c8c3bb; }
.nrow { margin-top: 6px; display: flex; align-items: center; gap: 9px; }
.bsave {
  font: inherit; font-size: 12px; font-weight: 600;
  padding: 6px 14px; background: var(--orange); color: #fff;
  border: none; border-radius: 7px; cursor: pointer;
  transition: background .13s;
}
.bsave:hover { background: #b8400b; }
.bsave:disabled { background: var(--border2); cursor: not-allowed; }
.nst { font-size: 11.5px; color: var(--ink3); }
.nst.ok { color: var(--green); }
.nst.err { color: var(--orange); }

/* link buttons */
.lrow { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 11px; }
.lbtn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border: 1.5px solid var(--border2);
  border-radius: 7px; font: inherit; font-size: 12px; font-weight: 500;
  color: var(--ink2); text-decoration: none; background: transparent;
  cursor: pointer; transition: all .13s;
}
.lbtn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-l); }

/* === POPUP === */
.leaflet-popup-content-wrapper {
  border-radius: 13px !important;
  box-shadow: var(--sh3) !important;
  border: 1px solid var(--border) !important;
  padding: 0 !important; overflow: hidden;
}
.leaflet-popup-content { margin: 0 !important; min-width: 215px; }
.leaflet-popup-close-button { top: 8px !important; right: 10px !important; color: var(--ink3) !important; font-size: 17px !important; }
.leaflet-control-zoom { border: none !important; box-shadow: var(--sh2) !important; }
.leaflet-control-zoom a { background: var(--white) !important; color: var(--ink) !important; border-color: var(--border) !important; }
.leaflet-control-zoom a:hover { color: var(--orange) !important; }
.leaflet-control-attribution { background: rgba(255,255,255,.8) !important; font-size: 10px !important; }
.pop-str { height: 4px; }
.pop-str.bp { background: linear-gradient(90deg, var(--orange), #f07a4a); }
.pop-str.tc { background: linear-gradient(90deg, var(--green), #42a86b); }
.pop-bdy { padding: 12px 14px 14px; }
.pop-nm { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
.pop-tp { font-size: 11.5px; font-weight: 600; margin-bottom: 7px; }
.pop-tp.bp { color: var(--orange); }
.pop-tp.tc { color: var(--green); }
.pop-mt { font-size: 12px; color: var(--ink2); line-height: 1.75; }
.pop-btn {
  display: block; width: 100%; margin-top: 9px; padding: 7px;
  border: none; border-radius: 7px;
  font: inherit; font-size: 12.5px; font-weight: 700;
  cursor: pointer; text-align: center; transition: filter .13s;
}
.pop-btn.bp { background: var(--orange); color: #fff; }
.pop-btn.tc { background: var(--green); color: #fff; }
.pop-btn:hover { filter: brightness(.9); }

/* === LOADING === */
#ld {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
#ld.gone { display: none; }
.spin {
  width: 38px; height: 38px;
  border: 3px solid var(--border); border-top-color: var(--orange);
  border-radius: 50%;
  animation: sp .7s linear infinite;
}
@keyframes sp { to { transform: rotate(360deg); } }
#ld-title { font-size: 18px; font-weight: 700; color: var(--ink2); letter-spacing: -.2px; }
#ld-msg { font-size: 13px; color: var(--ink3); }

/* === TOAST === */
#toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 9999;
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 22px; padding: 8px 16px;
  font-size: 12.5px; color: var(--ink2);
  box-shadow: var(--sh2);
  opacity: 0; transform: translateY(8px);
  transition: all .24s; pointer-events: none;
}
#toast.show { opacity: 1; transform: translateY(0); }
#toast.ok { color: var(--green); border-color: var(--green-m); }
#toast.err { color: var(--orange); border-color: var(--orange-m); }

/* === MOBILE === */
@media (max-width: 800px) {
  .app-wrap { grid-template-columns: 1fr; grid-template-rows: 48vw 1fr; height: auto; }
  .sidebar { height: auto; order: 2; overflow: visible; }
  .map-side { height: 48vw; min-height: 240px; order: 1; }
  .card-list { max-height: none; }
  .hstats { display: none; }
  .srch input { width: 140px; }
  .mg { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div id="ld"><div class="spin"></div><div id="ld-title">Bikepark Atlas CR</div><div id="ld-msg">Nacitam data...</div></div>
<div id="toast"></div>

<header class="hdr">
  <div class="logo">Bike<i>park</i> Atlas</div>
  <div class="vline"></div>
  <div class="pills">
    <button class="pill on" data-f="all">Vse</button>
    <button class="pill" data-f="bikepark">Bikeparky</button>
    <button class="pill tc" data-f="trail">Trail centra</button>
  </div>
  <div class="srch"><input type="text" id="sq" placeholder="Hledat lokalitu..."></div>
  <div class="hstats">
    <div class="hstat"><div class="hstat-dot" style="background:var(--orange)"></div><span id="sBP">-</span></div>
    <div class="hstat"><div class="hstat-dot" style="background:var(--green)"></div><span id="sTC">-</span></div>
  </div>
</header>

<div class="app-wrap">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-count">Zobrazeno: <b id="cnt">-</b> lokalit</div>
      <select class="sort-sel" id="ss">
        <option value="dist">Vzdalmost</option>
        <option value="name">Nazev A-Z</option>
        <option value="rating">Hodnoceni</option>
        <option value="type">Typ</option>
      </select>
    </div>
    <div class="card-list" id="cl"></div>
  </aside>
  <div class="map-side">
    <div id="map"></div>
    <div class="map-lbl"><strong>Vychozi bod</strong>Brno - Novy Liskovec</div>
  </div>
</div>

<script>
var SU = localStorage.getItem('bp_url') || '';
var OLA = 49.1694, OLN = 16.5928;
var PARKS = [], flt = 'all', qry = '', srt = 'dist', selId = null;
var MAP, MKS = {}, UD = {};

function dist(la, ln) {
  var R = 6371, d2r = function(x) { return x * Math.PI / 180; };
  var a = Math.sin(d2r(la-OLA)/2)*Math.sin(d2r(la-OLA)/2) +
          Math.cos(d2r(OLA))*Math.cos(d2r(la))*Math.sin(d2r(ln-OLN)/2)*Math.sin(d2r(ln-OLN)/2);
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}
function ftime(km) {
  var m = Math.round(km / 80 * 60);
  return m < 60 ? m + ' min' : Math.floor(m/60) + 'h' + (m%60 ? ' ' + m%60 + 'm' : '');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function gu(id) { return UD[id] || {}; }
function su(id, f, v) {
  if (!UD[id]) UD[id] = {};
  UD[id][f] = v;
  if (SU) fetch(SU, { method:'POST', body: JSON.stringify({ action:'saveUserData', id:id, field:f, value:v }) }).catch(function(){});
}

function initMap() {
  MAP = L.map('map').setView([49.8, 16.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19 }
  ).addTo(MAP);
  L.marker([OLA, OLN], { icon: L.divIcon({
    className:'',
    html:'<div style="width:13px;height:13px;background:#d4500e;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 7px rgba(212,80,14,.5)"></div>',
    iconSize:[13,13], iconAnchor:[6,6]
  })}).addTo(MAP).bindTooltip('Brno - Novy Liskovec');
}

function addMk(p) {
  var bp = p.type === 'bikepark', c = bp ? '#d4500e' : '#24603f';
  var ico = L.divIcon({
    className:'',
    html: '<div style="width:34px;height:34px;border-radius:9px;background:'+c+';border:2px solid rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 9px rgba(0,0,0,.22);cursor:pointer">' + (bp ? '\u{1F6A0}' : '\u{1F97E}') + '</div>',
    iconSize:[34,34], iconAnchor:[17,17], popupAnchor:[0,-20]
  });
  var mk = L.marker([p.lat, p.lng], {icon:ico}).addTo(MAP);
  mk.bindPopup(mkpop(p), {maxWidth:275});
  mk.on('click', function() { pick(p.id); });
  MKS[p.id] = mk;
}

function mkpop(p) {
  var bp = p.type==='bikepark', u = gu(p.id);
  var st = u.my_status === 'planned' ? '<br><b style="color:#d4500e">V planu</b>' :
           u.my_status === 'visited' ? '<br><b style="color:#24603f">Navstiveno</b>' : '';
  return '<div><div class="pop-str '+(bp?'bp':'tc')+'"></div>' +
    '<div class="pop-bdy">' +
      '<div class="pop-nm">'+esc(p.name)+'</div>' +
      '<div class="pop-tp '+(bp?'bp':'tc')+'">'+(bp?'Bikepark':'Trail centrum')+' &middot; '+esc(p.region)+'</div>' +
      '<div class="pop-mt">'+p._d+' km &middot; '+p._t+'<br>Skipas: '+esc(p.skipas)+'<br>Parkovani: '+esc(p.parking)+st+'</div>' +
      '<button class="pop-btn '+(bp?'bp':'tc')+'" onclick="pick(\''+p.id+'\');var c=document.querySelector(\'.leaflet-popup-close-button\');if(c)c.click()">Zobrazit detail &rarr;</button>' +
    '</div></div>';
}

function isvis(p) {
  if (flt !== 'all' && p.type !== flt) return false;
  if (qry) { var q = qry.toLowerCase(); return p.name.toLowerCase().indexOf(q) >= 0 || p.region.toLowerCase().indexOf(q) >= 0; }
  return true;
}

function getsorted() {
  var l = PARKS.filter(isvis);
  l.sort(function(a,b) {
    if (srt === 'dist') return a._d - b._d;
    if (srt === 'name') return a.name.localeCompare(b.name,'cs');
    if (srt === 'type') return a.type.localeCompare(b.type);
    if (srt === 'rating') return parseFloat((gu(b.id).my_rating||0)) - parseFloat((gu(a.id).my_rating||0));
    return 0;
  });
  return l;
}

function render() {
  var list = getsorted();
  document.getElementById('cnt').textContent = list.length;
  PARKS.forEach(function(p) {
    var mk = MKS[p.id]; if (!mk) return;

function wirecard(card, p) {
  var id = p.id;
  card.addEventListener('click', function(e) {
    if (e.target.closest('.ab')||e.target.closest('.c-det')||e.target.closest('.lbtn')||e.target.closest('.x-btn')) return;
    pick(id);
  });
  var bpl = card.querySelector('[data-a="pl"]');
  if (bpl) bpl.addEventListener('click', function(e) { e.stopPropagation(); su(id,'my_status',gu(id).my_status==='planned'?'':'planned'); toast('Stav ulozen','ok'); render(); });
  var bvi = card.querySelector('[data-a="vi"]');
  if (bvi) bvi.addEventListener('click', function(e) { e.stopPropagation(); su(id,'my_status',gu(id).my_status==='visited'?'':'visited'); toast('Stav ulozen','ok'); render(); });
  card.querySelectorAll('[data-a="x"]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var det = card.querySelector('.c-det'), xb = card.querySelector('.x-btn');
      var o = det.classList.contains('open');
      det.classList.toggle('open');
      if (xb) { xb.classList.toggle('xo', !o); xb.childNodes[0].innerHTML = (o?'&#9660;':'&#9650;'); xb.lastChild.textContent = ' ' + (o ? 'Rozbalit detail' : 'Sbalit detail'); }
    });
  });
  card.querySelectorAll('.star').forEach(function(st) {
    st.addEventListener('click', function(e) {
      e.stopPropagation();
      var rv = parseInt(st.dataset.s), cur = parseFloat(gu(id).my_rating||0);
      su(id,'my_rating',String(cur===rv?0:rv));
      toast('Hodnoceni ulozeno','ok'); render();
    });
  });
  var bsn = card.querySelector('[data-a="sn"]');
  if (bsn) bsn.addEventListener('click', function(e) {
    e.stopPropagation();
    var ta = card.querySelector('textarea'), ns = card.querySelector('[data-ns]');
    bsn.disabled = true; bsn.textContent = 'Ukladam...'; ns.textContent = ''; ns.className = 'nst';
    su(id,'my_note',ta.value);
    setTimeout(function() {
      ns.textContent = 'Ulozeno do Sheets'; ns.className='nst ok';
      bsn.disabled = false; bsn.textContent = 'Ulozit poznamku';
      toast('Poznamka ulozena','ok');
      setTimeout(function(){ns.textContent='';ns.className='nst'},4000);
    }, 700);
  });
}

function pick(id) {
  selId = id; render();
  setTimeout(function() {
    var c = document.querySelector('.card[data-id="'+id+'"]');
    if (!c) return;
    c.scrollIntoView({ behavior:'smooth', block:'nearest' });
    var det = c.querySelector('.c-det'), xb = c.querySelector('.x-btn');
    if (det && !det.classList.contains('open')) {
      det.classList.add('open');
      if (xb) { xb.classList.add('xo'); xb.childNodes[0].innerHTML = '&#9650;'; xb.lastChild.textContent = ' Sbalit detail'; }
    }
  }, 50);
  var p = PARKS.find(function(x){return x.id===id});
  if (p) { MAP.setView([p.lat,p.lng],Math.max(MAP.getZoom(),12),{animate:true}); setTimeout(function(){var mk=MKS[id];if(mk)mk.openPopup();},420); }
}

var ttt;
function toast(msg, type) {
  var el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show '+(type||'');
  clearTimeout(ttt); ttt = setTimeout(function(){el.className='toast';},3000);
}

function pr(row) {
  var la = parseFloat(String(row.lat||'').replace(/[^0-9.\-]/g,''));
  var ln = parseFloat(String(row.lng||'').replace(/[^0-9.\-]/g,''));
  if (isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180) { console.warn('bad coords',row.name); return null; }
  var d = dist(la,ln);
  var rawt = row.trails_json || row.trails || '';
  var trails = [];
  var s = String(rawt).trim();
  if (s.charAt(0)==='[') { try { var arr=JSON.parse(s); trails=arr.map(function(t){ return {d:String(t.d||'').trim(),n:String(t.n||''),km:parseFloat(t.km)||0}; }); } catch(e){} }
  return { id:row.id||String(row.name||'').toLowerCase().replace(/[^a-z0-9]/g,'-'),
    name:String(row.name||''), type:String(row.type||'').toLowerCase().indexOf('bikepark')>=0?'bikepark':'trail',
    lat:la, lng:ln, region:String(row.region||''),
    skipas:String(row.skipas||'viz web'), parking:String(row.parking||'viz web'),
    web:String(row.web||''), season:String(row.season||''), lifts:String(row.lifts||''),
    desc:String(row.description||''), trails:trails, _d:d, _t:ftime(d) };
}

async function loadData() {
  var msg = document.getElementById('ld-msg');
  if (!SU) {
    var u = prompt('Vloz Apps Script URL (z Google Sheets > Rozsireni > Apps Script > Nasadit):\n\nZrus pro ukazana data.');
    if (u && u.indexOf('http')===0) { localStorage.setItem('bp_url',u); location.reload(); return []; }
    msg.textContent = 'Ukazuji zabudovana data'; return FD();
  }
  try {
    msg.textContent = 'Nacitam z Google Sheets...';
    var r = await fetch(SU+'?action=getData');
    var j = await r.json();
    if (j.error) throw new Error(j.error);
    j.data.forEach(function(row){ if(row.id) UD[row.id]={my_status:row.my_status||'',my_note:row.my_note||'',my_rating:row.my_rating||'',my_visited_date:row.my_visited_date||''}; });
    return j.data.map(pr).filter(Boolean);
  } catch(e) {
    console.error(e); toast('Chyba Sheets: '+e.message,'err'); return FD();
  }
}
