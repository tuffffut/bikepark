<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikepark Atlas ČR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f0ede7;color:#18160f;font-size:14px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:900;background:#fff;border-bottom:1px solid #e3dfd8;height:56px;padding:0 14px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);flex-wrap:nowrap}
.logo{font-size:16px;font-weight:800;letter-spacing:-.3px;white-space:nowrap}
.logo span{color:#d4500e}
.sep{width:1px;height:22px;background:#ccc8c0;flex-shrink:0}
.pills{display:flex;gap:4px;flex-shrink:0}
.pill{font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;border:1.5px solid #ccc8c0;background:transparent;color:#5a564f;cursor:pointer;white-space:nowrap;transition:all .15s}
.pill:hover{border-color:#d4500e;color:#d4500e}
.pill.on{background:#d4500e;border-color:#d4500e;color:#fff}
.pill.on.tc{background:#24603f;border-color:#24603f}
.srch{position:relative;flex:1;min-width:0;max-width:180px}
.srch input{width:100%;border:1.5px solid #ccc8c0;border-radius:20px;background:#f0ede7;padding:6px 10px 6px 28px;font:inherit;font-size:13px;outline:none;color:#18160f}
.srch input:focus{border-color:#d4500e}
.srch-ic{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#a09b93;font-size:12px;pointer-events:none}
/* Počasí tlačítko - viditelné vždy */
.btn-wx{font:inherit;font-size:12px;font-weight:600;padding:6px 12px;background:transparent;border:1.5px solid #1a4faa;color:#1a4faa;border-radius:20px;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.btn-wx:hover{background:#1a4faa;color:#fff}
.btn-wx:disabled{border-color:#ccc;color:#bbb;cursor:not-allowed}
.hdr-stats{display:flex;gap:8px;align-items:center;flex-shrink:0}
.hstat{font-size:11px;color:#a09b93;display:flex;align-items:center;gap:4px}
.hdot{width:7px;height:7px;border-radius:50%}

/* LAYOUT - PC: vedle sebe, mobil: nad sebou */
.app{display:flex;height:calc(100vh - 56px)}
.sidebar{width:420px;flex-shrink:0;display:flex;flex-direction:column;background:#f0ede7;border-right:1px solid #e3dfd8;overflow:hidden;height:calc(100vh - 56px)}
.sb-top{padding:9px 12px;background:#fff;border-bottom:1px solid #e3dfd8;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-cnt{font-size:12px;font-weight:500;color:#a09b93}
.sb-cnt b{color:#d4500e;font-weight:700}
.sort-sel{font:inherit;font-size:12px;border:1px solid #ccc8c0;border-radius:6px;background:#fff;padding:4px 8px;color:#5a564f;outline:none;cursor:pointer}
/* KLÍČOVÁ OPRAVA: display:block místo flex - karty se nezhroutí */
.card-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px;display:block}
.card-list::-webkit-scrollbar{width:4px}
.card-list::-webkit-scrollbar-thumb{background:#ccc8c0;border-radius:2px}
.card+.card{margin-top:9px}

.map-side{flex:1;position:relative}
#map{width:100%;height:100%}
.map-lbl{position:absolute;bottom:28px;left:10px;z-index:500;background:#fff;border:1px solid #e3dfd8;border-radius:9px;padding:6px 10px;font-size:11px;color:#5a564f;box-shadow:0 2px 8px rgba(0,0,0,.08);pointer-events:none;line-height:1.45}
.map-lbl strong{color:#d4500e;display:block;font-size:11.5px}
.btn-fs{position:absolute;top:10px;right:10px;z-index:600;background:#fff;border:1px solid #e3dfd8;border-radius:9px;padding:7px 12px;font:inherit;font-size:12px;font-weight:600;color:#5a564f;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);display:none;align-items:center;gap:5px}
.btn-fs-close{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:9001;background:#d4500e;color:#fff;border:none;border-radius:22px;padding:9px 22px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;display:none;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(212,80,14,.4)}
.map-side.fs{position:fixed;inset:0;height:100dvh;z-index:9000}
.map-side.fs #map{height:100%}
.map-side.fs .btn-fs{display:none}
.map-side.fs .btn-fs-close{display:flex}

/* KARTA */
.card{background:#fff;border:1.5px solid #e3dfd8;border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05);display:block;transition:border-color .18s,box-shadow .18s,transform .15s}
.card:hover{border-color:#d4500e;box-shadow:0 4px 16px rgba(0,0,0,.09);transform:translateY(-1px)}
.card.sel{border-color:#d4500e;box-shadow:0 0 0 3px rgba(212,80,14,.1)}
.card.sel.tc{border-color:#24603f;box-shadow:0 0 0 3px rgba(36,96,63,.1)}
.cbar{height:3px}
.cbar.bp{background:linear-gradient(90deg,#d4500e,#f07a4a)}
.cbar.tc{background:linear-gradient(90deg,#24603f,#42a86b)}
.c-head{padding:11px 13px 6px;display:flex;align-items:flex-start;gap:10px}
.c-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.c-icon.bp{background:#fff3ee}.c-icon.tc{background:#ebf5ef}
.c-body{flex:1;min-width:0}
.c-name{font-size:14.5px;font-weight:700;color:#18160f;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-tags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:9.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap}
.b-bp{background:#fff3ee;color:#d4500e}
.b-tc{background:#ebf5ef;color:#24603f}
.b-reg{background:#edeae4;color:#a09b93;font-size:9px}
.b-plan{background:#fff3ee;color:#d4500e}
.b-vis{background:#ebf5ef;color:#24603f}
.c-btns{display:flex;gap:4px;flex-shrink:0}
.ab{width:32px;height:32px;border-radius:8px;border:1.5px solid #e3dfd8;background:#f0ede7;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s}
.ab:hover{border-color:#d4500e;background:#fff3ee}
.ab.on-p{background:#fff3ee;border-color:#d4500e}
.ab.on-v{background:#ebf5ef;border-color:#24603f}
.c-stats{padding:2px 13px 9px;display:flex;flex-wrap:wrap;gap:4px 12px}
.cst{display:flex;align-items:center;gap:3px;font-size:12px;color:#5a564f}
.cst b{color:#18160f;font-weight:600}
.cst.fr b{color:#24603f}

/* POČASÍ */
.wx-strip{border-top:1px solid #e3dfd8;padding:8px 12px 10px;display:grid;grid-template-columns:1fr 1fr;gap:6px;background:linear-gradient(180deg,#f5f9ff,#fff)}
.wx-col{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.85);border:1px solid #d8eaf8;border-radius:9px;padding:7px 10px}
.wx-col.sun{background:#fffdf0;border-color:#f0e0a0}
.wx-col.rain{background:#f0f5ff;border-color:#c5d5f0}
.wx-col.storm{background:#f5f0ff;border-color:#c8b8f0}
.wx-col.snow{background:#f0faff;border-color:#b8def5}
.wx-ico{font-size:26px;line-height:1;flex-shrink:0}
.wx-inf{flex:1;min-width:0}
.wx-dn{font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#a09b93;margin-bottom:1px}
.wx-cd{font-size:11px;font-weight:600;color:#5a564f;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wx-t{font-size:13px;font-weight:800;color:#18160f}
.wx-t small{font-size:10px;font-weight:500;color:#a09b93}
.wx-w{font-size:10px;color:#a09b93}
.wx-w b{color:#5a564f}

/* ROZBALIT */
.x-btn{width:100%;background:transparent;border:none;border-top:1px solid #f0ede7;padding:7px 13px;display:flex;align-items:center;gap:5px;font:inherit;font-size:12px;font-weight:500;color:#a09b93;cursor:pointer;transition:color .13s}
.x-btn:hover,.x-btn.xo{color:#d4500e}
.x-arr{display:inline-block;transition:transform .2s;font-size:10px}
.x-btn.xo .x-arr{transform:rotate(180deg)}

/* DETAIL */
.c-det{display:none;padding:4px 13px 13px;border-top:1px solid #f0ede7}
.c-det.open{display:block}
.ds{margin-top:11px}
.ds-t{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#a09b93;margin-bottom:5px}
.ds-d{font-size:12.5px;color:#5a564f;line-height:1.65}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.mc{background:#f0ede7;border-radius:7px;padding:7px 9px}
.mc-l{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:#a09b93;margin-bottom:2px}
.mc-v{font-size:12.5px;font-weight:700;color:#18160f}
.mc-v.fr{color:#24603f}
.diff-bar{display:flex;align-items:center;gap:7px;margin-top:4px}
.diff-segs{display:flex;gap:3px;flex:1}
.dseg{height:5px;flex:1;border-radius:3px;background:#e3dfd8}
.dseg.g{background:#22c55e}.dseg.b{background:#3b82f6}.dseg.r{background:#ef4444}.dseg.k{background:#1c1917}
.diff-lbl{font-size:11px;color:#a09b93;white-space:nowrap}
.tpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tp{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:500;color:#5a564f;background:#f0ede7;border:1px solid #e3dfd8;border-radius:5px;padding:3px 8px}
.tp-km{font-size:10px;color:#a09b93}
.stars{display:flex;gap:2px;margin-top:4px}
.star{font-size:22px;color:#e3dfd8;cursor:pointer;line-height:1;transition:color .1s,transform .1s}
.star.on{color:#e09b00}
.star:hover{transform:scale(1.15)}
.rrow{display:flex;align-items:center;gap:9px}
.rlbl{font-size:12px;color:#a09b93}
.ntxt{margin-top:5px}
.ntxt textarea{width:100%;border:1.5px solid #e3dfd8;border-radius:8px;padding:8px 10px;font:inherit;font-size:12.5px;color:#18160f;background:#f0ede7;resize:vertical;min-height:70px;outline:none;line-height:1.55;transition:border-color .14s}
.ntxt textarea:focus{border-color:#d4500e}
.ntxt textarea::placeholder{color:#c8c3bb}
.nrow{margin-top:6px;display:flex;align-items:center;gap:9px}
.btn-save{font:inherit;font-size:12px;font-weight:600;padding:6px 14px;background:#d4500e;color:#fff;border:none;border-radius:7px;cursor:pointer;transition:background .13s}
.btn-save:hover{background:#b8400b}
.btn-save:disabled{background:#ccc;cursor:not-allowed}
.nst{font-size:11.5px;color:#a09b93}
.nst.ok{color:#24603f}.nst.err{color:#d4500e}
.lrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.lbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:1.5px solid #ccc8c0;border-radius:7px;font:inherit;font-size:12px;font-weight:500;color:#5a564f;text-decoration:none;background:transparent;cursor:pointer;transition:all .13s}
.lbtn:hover{border-color:#d4500e;color:#d4500e;background:#fff3ee}

/* LEAFLET */
.leaflet-popup-content-wrapper{border-radius:13px!important;box-shadow:0 8px 28px rgba(0,0,0,.13)!important;border:1px solid #e3dfd8!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;min-width:210px}
.leaflet-popup-close-button{top:8px!important;right:10px!important;color:#a09b93!important;font-size:17px!important}
.leaflet-control-zoom{border:none!important;box-shadow:0 2px 8px rgba(0,0,0,.1)!important}
.leaflet-control-zoom a{background:#fff!important;color:#333!important;border-color:#e3dfd8!important}
.leaflet-control-zoom a:hover{color:#d4500e!important}
.leaflet-control-attribution{background:rgba(255,255,255,.8)!important;font-size:10px!important}
.pop-bar{height:4px}
.pop-bar.bp{background:linear-gradient(90deg,#d4500e,#f07a4a)}
.pop-bar.tc{background:linear-gradient(90deg,#24603f,#42a86b)}
.pop-body{padding:11px 13px 13px}
.pop-name{font-size:14px;font-weight:700;margin-bottom:2px}
.pop-type{font-size:11.5px;font-weight:600;margin-bottom:7px}
.pop-type.bp{color:#d4500e}.pop-type.tc{color:#24603f}
.pop-meta{font-size:12px;color:#5a564f;line-height:1.75}
.pop-btn{display:block;width:100%;margin-top:9px;padding:7px;border:none;border-radius:7px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;text-align:center}
.pop-btn.bp{background:#d4500e;color:#fff}
.pop-btn.tc{background:#24603f;color:#fff}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:#fff;border:1.5px solid #e3dfd8;border-radius:22px;padding:8px 16px;font-size:12.5px;color:#5a564f;box-shadow:0 4px 16px rgba(0,0,0,.1);opacity:0;transform:translateY(8px);transition:all .24s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{color:#24603f;border-color:#b8deca}
#toast.err{color:#d4500e;border-color:#fbd5c0}

/* MOBIL */
@media(max-width:800px){
  /* Na mobilu: mapa nahoře, seznam dole */
  .app{flex-direction:column;height:auto}
  .sidebar{width:100%;height:auto;overflow:visible;border-right:none;border-bottom:1px solid #e3dfd8}
  .card-list{max-height:none;padding:8px}
  .map-side{height:50vw;min-height:240px;order:-1}
  /* Zobrazit fullscreen tlačítko na mobilu */
  .btn-fs{display:flex!important}
  /* Zmenšit header na mobilu */
  .hdr{gap:6px;padding:0 10px}
  .logo{font-size:14px}
  .pill{font-size:11px;padding:4px 8px}
  .srch input{font-size:13px}
  .btn-wx{font-size:11px;padding:5px 9px}
  .hdr-stats{display:none}
  /* Větší prvky pro dotyk */
  body{font-size:15px}
  .c-name{font-size:15px}
  .c-icon{width:42px;height:42px;font-size:20px}
  .ab{width:36px;height:36px;font-size:16px}
  .star{font-size:26px}
  .mgrid{grid-template-columns:1fr 1fr}
  .ntxt textarea{font-size:15px}
  .btn-save{font-size:14px;padding:9px 18px}
  .lbtn{font-size:13px;padding:9px 14px}
  .cst{font-size:13px}
  .wx-ico{font-size:24px}
  .wx-t{font-size:14px}
}
</style>
</head>
<body>
<div id="toast"></div>

<header class="hdr">
  <div class="logo">Bike<span>park</span> Atlas</div>
  <div class="sep"></div>
  <div class="pills">
    <button class="pill on" data-f="all">Vše</button>
    <button class="pill" data-f="bikepark">Bikeparky</button>
    <button class="pill tc" data-f="trail">Trail centra</button>
  </div>
  <div class="srch">
    <span class="srch-ic">&#128269;</span>
    <input type="text" id="sq" placeholder="Hledat...">
  </div>
  <button class="btn-wx" id="btnWx">&#9925; Načíst počasí</button>
  <div class="hdr-stats">
    <div class="hstat"><div class="hdot" style="background:#d4500e"></div><span id="sBP">-</span></div>
    <div class="hstat"><div class="hdot" style="background:#24603f"></div><span id="sTC">-</span></div>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-cnt">Zobrazeno: <b id="cnt">-</b> lokalit</div>
      <select class="sort-sel" id="ss">
        <option value="dist">Vzdálenost</option>
        <option value="name">Název A–Z</option>
        <option value="rating">Hodnocení</option>
        <option value="type">Typ</option>
      </select>
    </div>
    <div class="card-list" id="cl"></div>
  </aside>
  <div class="map-side" id="mside">
    <div id="map"></div>
    <div class="map-lbl"><strong>&#128205; Výchozí bod</strong>Brno – Nový Lískovec</div>
    <button class="btn-fs" id="btnFS">&#9974; Celá obrazovka</button>
    <button class="btn-fs-close" id="btnFSC">&#10005; Zavřít mapu</button>
  </div>
</div>

<script>
// ===================================================
// NASTAVENI - vloz svou Apps Script URL:
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec';
// ===================================================

var OLA=49.1694, OLN=16.5928;
var PARKS=[], flt='all', qry='', srt='dist', selId=null;
var MAP, MKS={}, UD={}, WX={}, wxDone=false;

// --- Pomocne funkce ---
function gd(la,ln){
  var R=6371, toR=function(x){return x*Math.PI/180;};
  var a=Math.sin(toR(la-OLA)/2)*Math.sin(toR(la-OLA)/2)+Math.cos(toR(OLA))*Math.cos(toR(la))*Math.sin(toR(ln-OLN)/2)*Math.sin(toR(ln-OLN)/2);
  return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}
function ft(km){
  var m=Math.round(km/80*60);
  return m<60 ? m+' min' : Math.floor(m/60)+'h'+(m%60?' '+m%60+'m':'');
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function gu(id){return UD[id]||{};}
function su(id,f,v){
  if(!UD[id])UD[id]={};
  UD[id][f]=v;
  if(SCRIPT_URL&&SCRIPT_URL.indexOf('http')===0){
    fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'saveUserData',id:id,field:f,value:v})}).catch(function(){});
  }
}
var TT;
function toast(m,t){
  var el=document.getElementById('toast');
  el.textContent=m;
  el.className='toast show '+(t||'');
  clearTimeout(TT);
  TT=setTimeout(function(){el.className='toast';},3000);
}

// --- Mapa ---
function initMap(){
  MAP=L.map('map').setView([49.8,16.5],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19
  }).addTo(MAP);
  L.marker([OLA,OLN],{icon:L.divIcon({
    className:'',
    html:'<div style="width:13px;height:13px;background:#d4500e;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 7px rgba(212,80,14,.5)"></div>',
    iconSize:[13,13],iconAnchor:[6,6]
  })}).addTo(MAP).bindTooltip('Brno – Nový Lískovec');
}

function addMk(p){
  var bp=p.type==='bikepark', c=bp?'#d4500e':'#24603f';
  var mk=L.marker([p.lat,p.lng],{icon:L.divIcon({
    className:'',
    html:'<div style="width:34px;height:34px;border-radius:9px;background:'+c+';border:2px solid rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;box-shadow:0 2px 9px rgba(0,0,0,.22);font-family:Inter,sans-serif">'+(bp?'BP':'TC')+'</div>',
    iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-20]
  })}).addTo(MAP);
  mk.bindPopup(mkpop(p),{maxWidth:275});
  mk.on('click',function(){pick(p.id);});
  MKS[p.id]=mk;
}

function mkpop(p){
  var bp = p.type === 'bikepark', u = gu(p.id);
  var st = u.my_status === 'planned' ? '<br><b style="color:#d4500e">V plánu</b>' : u.my_status === 'visited' ? '<br><b style="color:#24603f">Navštíveno</b>' : '';
  var wx = WX[p.id], wxl = '';
  if(wx && wx[0]){ wxl = `<br>Víkend: ${wxi(wx[0].code).i} ${wx[0].maxT}°C, vítr ${wx[0].wind} km/h`; }

  // Používáme šablonový literál (backtick), který řeší problémy s uvozovkami
  return `<div>
    <div class="pop-bar ${bp ? 'bp' : 'tc'}"></div>
    <div class="pop-body">
      <div class="pop-name">${esc(p.name)}</div>
      <div class="pop-type ${bp ? 'bp' : 'tc'}">${bp ? 'Bikepark' : 'Trail centrum'} &middot; ${esc(p.region)}</div>
      <div class="pop-meta">${p._d} km &middot; ${p._t}<br>Skipas: ${esc(p.skipas)}<br>Parkování: ${esc(p.parking)}${wxl}${st}</div>

// --- Pocasi ---
var WXC={
  0:'sun|Jasno',1:'sun|Převažně jasno',2:'oblacno|Polojasno',3:'oblacno|Zataženo',
  45:'oblacno|Mlha',48:'oblacno|Námraza',51:'rain|Slabe mrholeni',53:'rain|Mrholeni',
  55:'rain|Husté mrholeni',61:'rain|Slabý dešť',63:'rain|Dešť',
  65:'rain|Vydaté dešť',71:'snow|Sněžení',73:'snow|Sněžení',
  75:'snow|Silné sněžení',80:'rain|Přeháňky',
  81:'rain|Silné přeháňky',82:'storm|Bouřkové přeháňky',
  95:'storm|Bouřka',96:'storm|Bouřka s krupobitím'
};
var WXI={sun:'&#9728;&#65039;',rain:'&#127783;&#65039;',snow:'&#127784;&#65039;',storm:'&#9928;&#65039;',oblacno:'&#9729;&#65039;'};

function wxi(code){
  var v=WXC[code];
  if(!v){
    var k=Object.keys(WXC).map(Number).sort(function(a,b){return a-b;});
    for(var i=k.length-1;i>=0;i--){if(k[i]<=code){v=WXC[k[i]];break;}}
  }
  if(!v)return{i:'&#9729;&#65039;',l:'Neznámo',c:'oblacno'};
  var parts=v.split('|');
  return{i:WXI[parts[0]]||'&#9729;&#65039;',l:parts[1],c:parts[0]};
}

function wndl(k){
  if(k<10)return 'Klid';
  if(k<20)return 'Slabý';
  if(k<30)return 'Mírný';
  if(k<40)return 'Čerstvý';
  if(k<55)return 'Silný';
  return 'Bouřlivý';
}

function nxtWk(){
  var t=new Date(), d=t.getDay(), ds=(6-d+7)%7;
  if(ds===0)ds=7;
  var sa=new Date(t); sa.setDate(t.getDate()+ds);
  var su=new Date(sa); su.setDate(sa.getDate()+1);
  return[sa,su];
}

function fday(d){
  var n=['Ne','Po','Út','St','Čt','Pá','So'];
  return n[d.getDay()]+' '+d.getDate()+'.'+(d.getMonth()+1)+'.';
}

function wxHTML(id){
  var days=WX[id];
  if(!days)return '';
  var h='<div class="wx-strip">';
  for(var i=0;i<days.length;i++){
    var d=days[i], w=wxi(d.code);
    h+='<div class="wx-col '+w.c+'">'+
      '<div class="wx-ico">'+w.i+'</div>'+
      '<div class="wx-inf">'+
        '<div class="wx-dn">'+fday(d.date)+'</div>'+
        '<div class="wx-cd">'+w.l+'</div>'+
        '<div class="wx-t">'+d.maxT+'&#176;C <small>/ '+d.minT+'&#176;C</small></div>'+
        '<div class="wx-w">&#128168; <b>'+d.wind+' km/h</b> &middot; '+wndl(d.wind)+'</div>'+
        (d.precip>0?'<div class="wx-w">&#127746; Srážky: <b>'+d.precip+'%</b></div>':'')+
      '</div></div>';
  }
  return h+'</div>';
}

// Načtení počasí postupně (jedno po druhém)
document.getElementById('btnWx').addEventListener('click', async function() {
  if (wxDone) return;
  
  const btn = document.getElementById('btnWx');
  btn.disabled = true;
  
  const wknd = nxtWk();
  // Použití lokálního formátu data (prevence chyby UTC posunu)
  const toIsoLocal = (d) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
  const sat = toIsoLocal(wknd[0]);
  const sun = toIsoLocal(wknd[1]);

  const total = PARKS.length;
  btn.textContent = `Načítám... 0/${total}`;

  // Helper pro drobné zpoždění mezi dotazy (např. 50ms), aby byl prohlížeč v klidu
  const delay = (ms) => new Promise(res => setTimeout(res, ms));

  for (let i = 0; i < total; i++) {
    const p = PARKS[i];
    btn.textContent = `Načítám... ${i + 1}/${total}`;

    const url = `https://api.open-meteo.com/v1/forecast?latitude=${p.lat.toFixed(4)}&longitude=${p.lng.toFixed(4)}&daily=temperature_2m_max,temperature_2m_min,weathercode,windspeed_10m_max,precipitation_probability_max&timezone=Europe%2FPrague&forecast_days=14`;

    try {
      const response = await fetch(url);
      const data = await response.json();
      
      const dates = data.daily.time;
      const si = dates.indexOf(sat);
      const ui = dates.indexOf(sun);

      if (si >= 0 && ui >= 0) {
        WX[p.id] = [
          { date: wknd[0], maxT: Math.round(data.daily.temperature_2m_max[si]), minT: Math.round(data.daily.temperature_2m_min[si]), code: data.daily.weathercode[si], wind: Math.round(data.daily.windspeed_10m_max[si]), precip: data.daily.precipitation_probability_max[si] },
          { date: wknd[1], maxT: Math.round(data.daily.temperature_2m_max[ui]), minT: Math.round(data.daily.temperature_2m_min[ui]), code: data.daily.weathercode[ui], wind: Math.round(data.daily.windspeed_10m_max[ui]), precip: data.daily.precipitation_probability_max[ui] }
        ];
      } else {
        WX[p.id] = null;
      }
    } catch (err) {
      console.error(`Chyba u lokality ${p.id}:`, err);
      WX[p.id] = null;
    }

    // Tady se děje to kouzlo: po každém načtení překreslíme aplikaci
    render(); 
    
    // Krátká pauza, aby API nemělo pocit, že ho bombarduje robot
    await delay(50); 
  }

  wxDone = true;
  btn.textContent = '☀️ Počasí načteno';
  toast('Počasí bylo úspěšně aktualizováno', 'ok');
});

// --- Filtrovani a razeni ---
function isvis(p){
  if(flt!=='all'&&p.type!==flt)return false;
  if(qry){var q=qry.toLowerCase();return p.name.toLowerCase().indexOf(q)>=0||p.region.toLowerCase().indexOf(q)>=0;}
  return true;
}
function glist(){
  var l=PARKS.filter(isvis);
  l.sort(function(a,b){
    if(srt==='dist')return a._d-b._d;
    if(srt==='name')return a.name.localeCompare(b.name,'cs');
    if(srt==='type')return a.type.localeCompare(b.type);
    if(srt==='rating')return parseFloat(gu(b.id).my_rating||0)-parseFloat(gu(a.id).my_rating||0);
    return 0;
  });
  return l;
}

// --- Render ---
function render(){
  var list=glist();
  document.getElementById('cnt').textContent=list.length;
  PARKS.forEach(function(p){
    var m=MKS[p.id];
    if(!m)return;
    isvis(p)?(!MAP.hasLayer(m)&&m.addTo(MAP)):(MAP.hasLayer(m)&&MAP.removeLayer(m));
  });
  var cl=document.getElementById('cl');
  cl.innerHTML='';

    var w=document.createElement('div');
    w.innerHTML=mkcard(list[i]);

    wireCard(cl.lastElementChild,list[i]);
  }
}

function wireCard(card,p){
  var id=p.id;
  card.addEventListener('click',function(e){
    if(e.target.closest('.ab')||e.target.closest('.c-det')||e.target.closest('.lbtn')||e.target.closest('.x-btn'))return;
    pick(id);
  });
  var bpl=card.querySelector('[data-a="pl"]');
  if(bpl)bpl.addEventListener('click',function(e){
    e.stopPropagation();
    su(id,'my_status',gu(id).my_status==='planned'?'':'planned');
    toast('Stav uložen','ok');
    render();
  });
  var bvi=card.querySelector('[data-a="vi"]');
  if(bvi)bvi.addEventListener('click',function(e){
    e.stopPropagation();
    su(id,'my_status',gu(id).my_status==='visited'?'':'visited');
    toast('Stav uložen','ok');
    render();
  });
  card.querySelectorAll('[data-a="x"]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      var det=card.querySelector('.c-det'), xb=card.querySelector('.x-btn');
      var open=det.classList.contains('open');
      det.classList.toggle('open');
      if(xb){
        xb.classList.toggle('xo',!open);
        var ar=xb.querySelector('.x-arr');
        if(ar)ar.innerHTML=open?'&#9660;':'&#9650;';
        xb.lastChild.textContent=' '+(open?'Rozbalit detail':'Sbalit detail');
      }
    });
  });
  card.querySelectorAll('.star').forEach(function(st){
    st.addEventListener('click',function(e){
      e.stopPropagation();
      var rv=parseInt(st.dataset.s), cur=parseFloat(gu(id).my_rating||0);
      su(id,'my_rating',String(cur===rv?0:rv));
      toast('Hodnocení uloženo','ok');
      render();
    });
  });
  var bsn=card.querySelector('[data-a="sn"]');
  if(bsn)bsn.addEventListener('click',function(e){
    e.stopPropagation();
    var ta=card.querySelector('textarea'), ns=card.querySelector('[data-ns]');
    bsn.disabled=true;
    bsn.textContent='Ukládám...';

      toast('Poznámka uložena','ok');

  });

function pr(row){
  var la=parseFloat(String(row.lat||'').replace(/[^0-9.\-]/g,'')), ln=parseFloat(String(row.lng||'').replace(/[^0-9.\-]/g,''));
  if(isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180)return null;
  var d=gd(la,ln), rawt=row.trails_json||row.trails||'', trails=[];
  var s=String(rawt).trim();
  if(s.charAt(0)==='['){
    try{trails=JSON.parse(s).map(function(t){return{d:String(t.d||''),n:String(t.n||''),km:parseFloat(t.km)||0};});}
    catch(e){}
  }
  return{
    id:row.id||String(row.name||'').toLowerCase().replace(/[^a-z0-9]/g,'-'),
    name:String(row.name||''),
    type:String(row.type||'').toLowerCase().indexOf('bikepark')>=0?'bikepark':'trail',
    lat:la,lng:ln,region:String(row.region||''),
    skipas:String(row.skipas||'viz web'),parking:String(row.parking||'viz web'),
    web:String(row.web||''),season:String(row.season||''),
    lifts:String(row.lifts||''),desc:String(row.description||''),
    trails:trails,_d:d,_t:ft(d)
  };
}
