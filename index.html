<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚵 Bikepark Atlas ČR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ════════════════════════════════════════
   DESIGN SYSTEM — crisp alpine light
   ════════════════════════════════════════ */
:root {
  --white:    #ffffff;
  --bg:       #f5f3ef;
  --bg2:      #edeae4;
  --surface:  #ffffff;
  --border:   #e2ddd6;
  --border2:  #d0cac0;

  --ink:      #1a1714;
  --ink2:     #4a4540;
  --ink3:     #9e9890;

  --orange:   #e8561a;
  --orange-l: #fff0ea;
  --orange-m: #fbd5c0;

  --green:    #2a7a4b;
  --green-l:  #eaf4ee;
  --green-m:  #b6dfc5;

  --blue:     #1a5fbf;
  --blue-l:   #e8f0fc;

  --red:      #c0392b;
  --red-l:    #fdecea;

  --yellow:   #b8860b;

  --bp-color: var(--orange);
  --tc-color: var(--green);

  --radius-sm: 6px;
  --radius:    10px;
  --radius-lg: 16px;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
  --shadow:    0 4px 16px rgba(0,0,0,.09), 0 1px 3px rgba(0,0,0,.06);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
body {
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  height: 60px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
  z-index: 200;
}

.logo {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 20px;
  color: var(--ink);
  white-space: nowrap;
  letter-spacing: -0.3px;
}
.logo em { color: var(--orange); font-style: normal; }

.hdiv { width: 1px; height: 26px; background: var(--border2); flex-shrink: 0; }

/* pill filters */
.filters { display: flex; gap: 5px; flex-shrink: 0; }
.f-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--border2);
  background: transparent;
  color: var(--ink2);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.f-btn:hover { border-color: var(--orange); color: var(--orange); }
.f-btn.active { background: var(--orange); border-color: var(--orange); color: #fff; }
.f-btn.active.tc { background: var(--green); border-color: var(--green); }

/* search */
.search-wrap { position: relative; flex: 1; max-width: 240px; }
.search-wrap input {
  width: 100%;
  border: 1.5px solid var(--border2);
  border-radius: 20px;
  background: var(--bg);
  padding: 6px 12px 6px 32px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  color: var(--ink);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.search-wrap input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-l); }
.search-wrap .si { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; color: var(--ink3); }

/* header stats */
.h-stats { margin-left: auto; display: flex; gap: 14px; align-items: center; flex-shrink: 0; }
.h-stat { font-size: 12px; color: var(--ink3); display: flex; align-items: center; gap: 5px; }
.h-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.h-dot.bp { background: var(--orange); }
.h-dot.tc { background: var(--green); }

/* ── BODY LAYOUT ── */
.app-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 60px);
}

/* ── SIDEBAR ── */
.sidebar {
  width: 400px;
  min-width: 400px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  height: calc(100vh - 60px);
}

.sb-top {
  padding: 12px 14px 10px;
  background: var(--white);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sb-count { font-size: 12px; font-weight: 500; color: var(--ink3); }
.sb-count strong { color: var(--orange); font-size: 14px; }

.sort-sel {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  background: var(--bg);
  padding: 4px 8px;
  color: var(--ink2);
  outline: none;
  cursor: pointer;
}

.list-wrap {
  flex: 1 1 0;
  overflow-y: scroll;
  overflow-x: hidden;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 0;
  max-height: calc(100vh - 110px);
}
.list-wrap::-webkit-scrollbar { width: 4px; }
.list-wrap::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* ── CARD ── */
.card {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .18s, box-shadow .18s, transform .18s;
  box-shadow: var(--shadow-sm);
  position: relative;
}
.card:hover { border-color: var(--orange); box-shadow: var(--shadow); transform: translateY(-1px); }
.card.active { border-color: var(--orange); box-shadow: 0 0 0 3px var(--orange-l), var(--shadow); }
.card.active.tc-active { border-color: var(--green); box-shadow: 0 0 0 3px var(--green-l), var(--shadow); }

/* card top stripe */
.card-stripe {
  height: 4px;
  background: linear-gradient(90deg, var(--orange) 0%, #f9a05a 100%);
}
.card-stripe.tc { background: linear-gradient(90deg, var(--green) 0%, #54b87a 100%); }

.card-body { padding: 12px 14px 10px; }

.card-row1 {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}
.card-name-col { flex: 1; }
.card-name {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  margin-bottom: 4px;
}
.card-tags { display: flex; gap: 4px; flex-wrap: wrap; }

.tag {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
}
.tag-bp { background: var(--orange-l); color: var(--orange); }
.tag-tc { background: var(--green-l); color: var(--green); }
.tag-reg { background: var(--bg2); color: var(--ink3); }

/* actions */
.card-acts { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.act-btn {
  width: 30px; height: 30px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--ink3);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all .15s;
  flex-shrink: 0;
}
.act-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-l); }
.act-btn.on-plan { background: var(--orange-l); border-color: var(--orange); color: var(--orange); }
.act-btn.on-visit { background: var(--green-l); border-color: var(--green); color: var(--green); }

/* status ribbon */
.s-ribbon {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.s-ribbon.planned { background: var(--orange-l); color: var(--orange); }
.s-ribbon.visited { background: var(--green-l); color: var(--green); }

/* meta grid */
.card-meta {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
}
.meta-cell {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 5px 7px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.meta-label { font-size: 9.5px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--ink3); }
.meta-val { font-size: 12px; font-weight: 600; color: var(--ink); }
.meta-val.free { color: var(--green); }
.meta-val.warn { color: var(--orange); }

/* difficulty bar */
.diff-bar { display: flex; gap: 3px; align-items: center; margin-bottom: 8px; }
.diff-seg {
  height: 5px;
  flex: 1;
  border-radius: 3px;
  background: var(--border2);
  transition: background .2s;
}
.diff-seg.d1 { background: var(--green); }
.diff-seg.d2 { background: var(--blue); }
.diff-seg.d3 { background: var(--red); }
.diff-seg.d4 { background: #1a1714; }
.diff-label { font-size: 10px; color: var(--ink3); margin-left: 4px; font-weight: 500; }

/* trails */
.trails-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.t-pill {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink2);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 2px 7px;
  white-space: nowrap;
}
.t-pill .tdot { font-size: 9px; }
.t-more { color: var(--ink3); font-style: italic; }

/* rating */
.card-rating { display: flex; align-items: center; gap: 5px; margin-bottom: 8px; }
.stars { display: flex; gap: 2px; }
.star { font-size: 13px; cursor: pointer; transition: transform .1s; color: var(--border2); }
.star.filled { color: #f59e0b; }
.star:hover { transform: scale(1.2); }
.rating-label { font-size: 11px; color: var(--ink3); }

/* card footer */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 8px;
  border-top: 1px solid var(--border);
}
.footer-left { display: flex; gap: 10px; align-items: center; }
.f-stat { font-size: 11px; color: var(--ink3); }
.f-stat strong { color: var(--ink); }

.btn-web {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 10px;
  border: 1.5px solid var(--border2);
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink2);
  background: transparent;
  text-decoration: none;
  cursor: pointer;
  transition: all .15s;
}
.btn-web:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-l); }

/* note section */
.note-section { padding: 0 14px 10px; display: none; }
.note-section.open { display: block; }
.note-section textarea {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 8px 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--ink);
  background: var(--bg);
  resize: vertical;
  min-height: 64px;
  outline: none;
  transition: border-color .15s;
}
.note-section textarea:focus { border-color: var(--orange); }
.note-section textarea::placeholder { color: var(--ink3); }
.note-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); display: inline-block; margin-left: 3px; vertical-align: middle; }

/* ── MAP ── */
.map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

.map-controls {
  position: absolute;
  top: 12px; right: 12px;
  z-index: 500;
  display: flex; flex-direction: column; gap: 6px;
}
.map-btn {
  width: 34px; height: 34px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  color: var(--ink2);
  transition: all .15s;
}
.map-btn:hover { border-color: var(--orange); color: var(--orange); }

.origin-chip {
  position: absolute;
  bottom: 30px; left: 12px;
  z-index: 500;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 11px;
  font-size: 11.5px;
  color: var(--ink2);
  box-shadow: var(--shadow-sm);
  line-height: 1.4;
}
.origin-chip strong { color: var(--orange); display: block; font-size: 12px; }

/* loading overlay */
.loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--white);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  transition: opacity .4s;
}
.loading-overlay.done { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border2);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { font-family: 'Fraunces', serif; font-size: 16px; color: var(--ink2); }
.loading-overlay small { font-size: 12px; color: var(--ink3); }

/* error banner */
.err-banner {
  background: var(--red-l);
  border: 1px solid #f5c6c0;
  border-radius: var(--radius);
  padding: 10px 14px;
  margin: 10px;
  font-size: 12.5px;
  color: var(--red);
  display: none;
}
.err-banner.show { display: block; }

/* empty state */
.empty { padding: 40px 16px; text-align: center; color: var(--ink3); }
.empty p { font-size: 13px; margin-top: 8px; }

/* ── LEAFLET OVERRIDES ── */
.leaflet-popup-content-wrapper {
  border-radius: 12px !important;
  box-shadow: var(--shadow-lg) !important;
  border: 1px solid var(--border) !important;
  padding: 0 !important;
}
.leaflet-popup-content { margin: 0 !important; min-width: 210px; }
.leaflet-popup-tip-container { filter: drop-shadow(0 2px 4px rgba(0,0,0,.1)); }
.leaflet-popup-close-button { top: 8px !important; right: 10px !important; color: var(--ink3) !important; font-size: 18px !important; }
.leaflet-control-zoom { border: none !important; box-shadow: var(--shadow) !important; }
.leaflet-control-zoom a { background: var(--white) !important; color: var(--ink) !important; border-color: var(--border) !important; }
.leaflet-control-zoom a:hover { color: var(--orange) !important; }
.leaflet-control-attribution { background: rgba(255,255,255,.85) !important; color: var(--ink3) !important; }

/* popup styles */
.pop { }
.pop-stripe { height: 4px; border-radius: 4px 4px 0 0; }
.pop-stripe.bp { background: linear-gradient(90deg, var(--orange), #f9a05a); }
.pop-stripe.tc { background: linear-gradient(90deg, var(--green), #54b87a); }
.pop-body { padding: 12px 14px 14px; }
.pop-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.pop-type { font-size: 11px; margin-bottom: 8px; font-weight: 500; }
.pop-type.bp { color: var(--orange); }
.pop-type.tc { color: var(--green); }
.pop-meta { font-size: 12px; color: var(--ink2); line-height: 1.75; }
.pop-btn {
  display: block; width: 100%;
  margin-top: 10px; padding: 7px;
  background: var(--orange); color: #fff;
  border: none; border-radius: 7px;
  font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 600;
  cursor: pointer; text-align: center;
  transition: background .15s;
}
.pop-btn:hover { background: #d44d13; }
.pop-btn.tc { background: var(--green); }
.pop-btn.tc:hover { background: #22673d; }

/* ── CONFIG BANNER ── */
.cfg-banner {
  background: linear-gradient(135deg, #fff8f0, #fff);
  border: 1.5px solid var(--orange-m);
  border-radius: var(--radius-lg);
  padding: 20px 24px;
  margin: 12px;
  font-size: 13px;
  line-height: 1.6;
}
.cfg-banner h3 { font-family: 'Fraunces', serif; font-size: 17px; margin-bottom: 8px; color: var(--orange); }
.cfg-banner code {
  background: var(--bg2); padding: 2px 6px; border-radius: 4px;
  font-size: 11px; color: var(--ink); font-family: monospace;
}
.cfg-banner ol { padding-left: 18px; margin-top: 8px; }
.cfg-banner li { margin-bottom: 4px; }
.cfg-banner .cfg-url { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
.cfg-banner input[type=text] {
  flex: 1; border: 1.5px solid var(--border2); border-radius: var(--radius-sm);
  padding: 6px 10px; font-size: 12px; font-family: 'DM Sans', sans-serif;
  color: var(--ink); outline: none;
  transition: border-color .15s;
}
.cfg-banner input[type=text]:focus { border-color: var(--orange); }
.cfg-banner button {
  padding: 7px 14px; background: var(--orange); color: #fff; border: none;
  border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif;
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: background .15s;
}
.cfg-banner button:hover { background: #d44d13; }

/* ── MOBILE ── */
.mob-toggle {
  display: none; position: fixed; bottom: 18px; right: 18px; z-index: 1000;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--orange); color: #fff; border: none;
  font-size: 20px; cursor: pointer; box-shadow: 0 4px 20px rgba(232,86,26,.35);
  align-items: center; justify-content: center;
  transition: transform .15s;
}
.mob-toggle:active { transform: scale(.93); }

@media (max-width: 780px) {
  body { overflow: auto; height: auto; }
  .app-body { flex-direction: column; overflow: visible; }
  .sidebar { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 55vh; }
  .map-wrap { height: 45vh; min-height: 280px; }
  .mob-toggle { display: flex; }
  .h-stats { display: none; }
  .search-wrap { max-width: 150px; }
  .card-meta { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p>🚵 Načítám atlas…</p>
  <small id="loadMsg">Připojuji se ke Google Sheets</small>
</div>

<!-- Header -->
<header>
  <div class="logo">🚵 <em>Bikepark</em> Atlas ČR</div>
  <div class="hdiv"></div>
  <div class="filters">
    <button class="f-btn active" data-f="all">Vše</button>
    <button class="f-btn" data-f="bikepark">🚠 Bikeparky</button>
    <button class="f-btn tc" data-f="trail">🥾 Trail centra</button>
  </div>
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="searchQ" placeholder="Hledat lokalitu…">
  </div>
  <div class="h-stats">
    <div class="h-stat"><div class="h-dot bp"></div><span id="sBP">–</span></div>
    <div class="h-stat"><div class="h-dot tc"></div><span id="sTC">–</span></div>
  </div>
</header>

<div class="app-body">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-top">
      <div class="sb-count">Zobrazeno: <strong id="cntShow">–</strong> lokalit</div>
      <select class="sort-sel" id="sortSel">
        <option value="dist">Vzdálenost</option>
        <option value="name">Název A–Z</option>
        <option value="rating">Hodnocení</option>
        <option value="type">Typ</option>
      </select>
    </div>
    <div class="list-wrap" id="listWrap">
      <div id="configBanner"></div>
      <div class="err-banner" id="errBanner"></div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-controls">
      <button class="map-btn" id="btnAll" title="Zobrazit vše">⊡</button>
      <button class="map-btn" id="btnHome" title="Výchozí bod">🏠</button>
    </div>
    <div class="origin-chip">
      <strong>📍 Výchozí bod</strong>
      Brno – Nový Lískovec
    </div>
  </div>
</div>

<button class="mob-toggle" id="mobToggle">🗺️</button>

<script>
/* ═══════════════════════════════════════════════════
   CONFIG — sem vlož URL tvého Apps Script Web App
   ═══════════════════════════════════════════════════ */
const APPS_SCRIPT_URL = https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec || '';

const ORIGIN = { lat: 49.1694, lng: 16.5928 };

/* ── helpers ── */
function haverDist(lat, lng) {
  const R = 6371, toR = x => x * Math.PI / 180;
  const dLat = toR(lat - ORIGIN.lat), dLon = toR(lng - ORIGIN.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(toR(ORIGIN.lat))*Math.cos(toR(lat))*Math.sin(dLon/2)**2;
  return Math.round(R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}
function fmtTime(km) {
  const m = Math.round(km/80*60);
  return m < 60 ? `${m} min` : `${Math.floor(m/60)}h ${m%60 ? m%60+'m' : ''}`.trim();
}
function ls() { try { return JSON.parse(localStorage.getItem('bp_user')||'{}'); } catch { return {}; } }
function lsSave(d) { try { localStorage.setItem('bp_user', JSON.stringify(d)); } catch {} }

/* ── STATE ── */
let ALL_PARKS = [];
let filter = 'all', query = '', sort = 'dist', activeId = null;
let markers = {}, mapObj;

/* ── MAP INIT ── */
function initMap() {
  mapObj = L.map('map', { zoomControl: true }).setView([49.8, 16.5], 7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
  }).addTo(mapObj);

  // Origin pin
  L.marker([ORIGIN.lat, ORIGIN.lng], {
    icon: L.divIcon({
      className: '',
      html: `<div style="width:14px;height:14px;background:${getComputedStyle(document.documentElement).getPropertyValue('--orange').trim()};border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 8px rgba(232,86,26,.4)"></div>`,
      iconSize: [14,14], iconAnchor: [7,7]
    })
  }).addTo(mapObj).bindTooltip('📍 Brno – Nový Lískovec');

    const vis = ALL_PARKS.filter(isVisible);

  };

function mkMarker(p) {
  const bp = p.type === 'bikepark';
  const clr = bp ? '#e8561a' : '#2a7a4b';
  const ico = L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;border-radius:8px;background:${clr};border:2px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer;">${bp?'🚠':'🥾'}</div>`,
    iconSize: [30,30], iconAnchor: [15,15], popupAnchor: [0,-18]
  });
  const m = L.marker([p.lat, p.lng], { icon: ico }).addTo(mapObj);
  m.bindPopup(buildPopup(p), { maxWidth: 270 });
  m.on('click', () => selectPark(p.id));
  markers[p.id] = m;
}

function buildPopup(p) {
  const u = ls()[p.id] || {};
  const statusLine = u.status === 'planned' ? `<div style="margin-top:4px;font-size:11px;color:#e8561a;font-weight:600;">📌 V plánu</div>`
    : u.status === 'visited' ? `<div style="margin-top:4px;font-size:11px;color:#2a7a4b;font-weight:600;">✅ Navštíveno</div>` : '';
  const bp = p.type === 'bikepark';
  return `<div class="pop">
    <div class="pop-stripe ${bp?'bp':'tc'}"></div>
    <div class="pop-body">
      <div class="pop-name">${p.name}</div>
      <div class="pop-type ${bp?'bp':'tc'}">${bp?'🚠 Bikepark':'🥾 Trail centrum'} · ${p.region}</div>
      <div class="pop-meta">
        📏 <strong>${p._dist} km</strong> · ⏱ <strong>${p._time}</strong><br>
        🎿 ${p.skipas} · 🅿️ ${p.parking}
        ${p.season ? `<br>📅 Sezóna: ${p.season}` : ''}
        ${statusLine}
      </div>
      <button class="pop-btn ${bp?'':'tc'}" onclick="selectPark('${p.id}');document.querySelector('.leaflet-popup-close-button').click()">Zobrazit detail →</button>
    </div>
  </div>`;
}

/* ── VISIBILITY ── */
function isVisible(p) {
  if (filter !== 'all' && p.type !== filter) return false;
  if (query) {
    const q = query.toLowerCase();
    if (!p.name.toLowerCase().includes(q) && !p.region.toLowerCase().includes(q)) return false;
  }
  return true;
}

/* ── RENDER ── */
function renderAll() {
  const u = ls();
  let list = ALL_PARKS.filter(isVisible);
  if (sort === 'dist')   list.sort((a,b) => a._dist - b._dist);
  if (sort === 'name')   list.sort((a,b) => a.name.localeCompare(b.name,'cs'));
  if (sort === 'rating') list.sort((a,b) => (+(u[b.id]?.rating||0)) - (+(u[a.id]?.rating||0)));
  if (sort === 'type')   list.sort((a,b) => a.type.localeCompare(b.type));

  document.getElementById('cntShow').textContent = list.length;

  // toggle markers
  ALL_PARKS.forEach(p => {
    const m = markers[p.id]; if (!m) return;
    isVisible(p) ? (!mapObj.hasLayer(m) && m.addTo(mapObj)) : (mapObj.hasLayer(m) && mapObj.removeLayer(m));
  });

  const wrap = document.getElementById('listWrap');
  const cfgEl = document.getElementById('configBanner');
  const errEl = document.getElementById('errBanner');

  // clear previous cards only
  wrap.querySelectorAll('.card').forEach(el => el.remove());

  if (!list.length) {
    wrap.insertAdjacentHTML('beforeend', `<div class="empty"><p>Žádná lokalita neodpovídá filtru.</p></div>`);
    return;
  }

  list.forEach(p => {
    const div = document.createElement('div');
    div.innerHTML = buildCard(p, u);
    const card = div.firstElementChild;
    wrap.appendChild(card);
    attachCardEvents(card, p);
  });
}

function buildCard(p, u) {
  const s = u[p.id] || {};
  const bp = p.type === 'bikepark';
  const isActive = activeId === p.id;
  const isPlanned = s.status === 'planned';
  const isVisited = s.status === 'visited';
  const hasNote = s.note?.trim();
  const rating = +(s.rating || 0);

  // difficulty analysis
  const trails = p._trails;
  const counts = { g:0, b:0, r:0, k:0 };
  trails.forEach(t => {
    if (t.d==='🟢') counts.g++;
    else if (t.d==='🔵') counts.b++;
    else if (t.d==='🔴') counts.r++;
    else counts.k++;
  });
  const totalTrails = trails.length || 1;
  const diffLabel = counts.k > 0 && counts.k/totalTrails > .3 ? 'Velmi těžké' :
    counts.r/totalTrails > .4 ? 'Těžké' :
    counts.b/totalTrails > .5 ? 'Střední' : 'Snadné–střední';

  // trails pills (max 4 + rest)
  const visTrails = trails.slice(0, 4);
  const trailPills = visTrails.map(t =>
    `<span class="t-pill"><span class="tdot">${t.d}</span>${t.n}${t.km ? ' '+t.km+'km' : ''}</span>`
  ).join('') + (trails.length > 4 ? `<span class="t-pill t-more">+${trails.length-4} dalších</span>` : '');

  // stars
  const starsHtml = [1,2,3,4,5].map(i =>
    `<span class="star${rating>=i?' filled':''}" data-star="${i}">★</span>`
  ).join('');

  const ribbonHtml = isPlanned ? `<span class="s-ribbon planned">📌 V plánu</span>`
    : isVisited ? `<span class="s-ribbon visited">✅ Navštíveno</span>` : '';

  return `<div class="card${isActive?(bp?' active':' active tc-active'):''}" data-id="${p.id}">
    <div class="card-stripe${bp?'':' tc'}"></div>
    <div class="card-body">
      <div class="card-row1">
        <div class="card-name-col">
          <div class="card-name">${p.name}</div>
          <div class="card-tags">
            <span class="tag ${bp?'tag-bp':'tag-tc'}">${bp?'🚠 Bikepark':'🥾 Trail centrum'}</span>
            <span class="tag tag-reg">${p.region}</span>
            ${ribbonHtml}
          </div>
        </div>
        <div class="card-acts">
          <button class="act-btn ${isPlanned?'on-plan':''}" data-action="plan" title="Mám v plánu">📌</button>
          <button class="act-btn ${isVisited?'on-visit':''}" data-action="visit" title="Navštíveno">✅</button>
          <button class="act-btn" data-action="note" title="Poznámka">✏️${hasNote?'<span class="note-dot"></span>':''}</button>
        </div>
      </div>

      <div class="card-meta">
        <div class="meta-cell">
          <div class="meta-label">Vzdálenost</div>
          <div class="meta-val">${p._dist} km</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">Dojezd</div>
          <div class="meta-val">${p._time}</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">Skipas / vstup</div>
          <div class="meta-val ${p.skipas==='Zdarma'?'free':''}">${p.skipas}</div>
        </div>
        <div class="meta-cell">
          <div class="meta-label">Parkování</div>
          <div class="meta-val ${p.parking==='Zdarma'?'free':''}">${p.parking}</div>
        </div>
      </div>

      <div class="diff-bar">
        <div class="diff-seg${counts.g?' d1':''}"></div>
        <div class="diff-seg${counts.b?' d2':''}"></div>
        <div class="diff-seg${counts.r?' d3':''}"></div>
        <div class="diff-seg${counts.k?' d4':''}"></div>
        <span class="diff-label">${diffLabel} · ${trails.length} tras</span>
      </div>

      <div class="trails-row">${trailPills}</div>

      ${p.season ? `<div style="font-size:11.5px;color:var(--ink2);margin-bottom:7px;">📅 Sezóna: <strong>${p.season}</strong>${p.lifts ? ` · 🚠 ${p.lifts} lanovek` : ''}</div>` : ''}

      <div class="card-rating">
        <div class="stars">${starsHtml}</div>
        <span class="rating-label">${rating ? `Tvé hodnocení: ${rating}/5` : 'Ohodnoť lokalitu'}</span>
      </div>

      <div class="card-footer">
        <div class="footer-left">
          ${p.description ? `<span class="f-stat" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.description}</span>` : ''}
        </div>
        <a href="${p.web||'#'}" target="_blank" rel="noopener" class="btn-web" onclick="event.stopPropagation()">🌐 Web ↗</a>
      </div>
    </div>
    <div class="note-section${hasNote?' open':''}" data-note-id="${p.id}">
      <textarea placeholder="Tvoje poznámka k lokalitě… (ukládá se automaticky)">${s.note||''}</textarea>
    </div>
  </div>`;
}

function attachCardEvents(card, p) {
  const id = p.id;
  const bp = p.type === 'bikepark';

  // card click → select
  card.addEventListener('click', e => {
    if (e.target.closest('.act-btn')||e.target.closest('.btn-web')||e.target.closest('.note-section')||e.target.closest('.star')) return;
    selectPark(id);
  });

  // plan
  card.querySelector('[data-action="plan"]')?.addEventListener('click', e => {
    e.stopPropagation();
    const u = ls(); if (!u[id]) u[id] = {};
    u[id].status = u[id].status === 'planned' ? null : 'planned';
    lsSave(u); renderAll();
  });

  // visit
  card.querySelector('[data-action="visit"]')?.addEventListener('click', e => {
    e.stopPropagation();
    const u = ls(); if (!u[id]) u[id] = {};
    u[id].status = u[id].status === 'visited' ? null : 'visited';
    lsSave(u); renderAll();
  });

  // note toggle
  card.querySelector('[data-action="note"]')?.addEventListener('click', e => {
    e.stopPropagation();
    const ns = card.querySelector('.note-section');
    ns.classList.toggle('open');
    if (ns.classList.contains('open')) ns.querySelector('textarea').focus();
  });

  // note save
  card.querySelector('.note-section textarea')?.addEventListener('input', e => {
    const u = ls(); if (!u[id]) u[id] = {};
    u[id].note = e.target.value;
    lsSave(u);
  });

  // stars
  card.querySelectorAll('.star').forEach(star => {
    star.addEventListener('click', e => {
      e.stopPropagation();
      const r = +star.dataset.star;
      const u = ls(); if (!u[id]) u[id] = {};
      u[id].rating = u[id].rating == r ? 0 : r;
      lsSave(u); renderAll();
    });
  });
}

function selectPark(id) {
  activeId = id;
  renderAll();
  setTimeout(() => {
    const card = document.querySelector(`.card[data-id="${id}"]`);
    card?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 30);
  const p = ALL_PARKS.find(x => x.id === id);
  if (p) {
    mapObj.setView([p.lat, p.lng], Math.max(mapObj.getZoom(), 12), { animate: true });
    setTimeout(() => markers[id]?.openPopup(), 450);
  }
}

/* ── DATA LOADING ── */
function parseTrails(raw) {
  if (!raw) return [];
  try {
    if (raw.startsWith('[')) return JSON.parse(raw);
  } catch {}
  // fallback: "🟢 Zelená 3.2km, 🔵 Modrá 5.1km"
  return raw.split(',').map(s => {
    s = s.trim();
    const m = s.match(/(🟢|🔵|🔴|⚫)\s*(.+?)\s*([\d.]+)\s*km/);
    if (m) return { d: m[1], n: m[2].trim(), km: parseFloat(m[3]) };
    return { d: '🔵', n: s, km: null };
  }).filter(x => x.n);
}

function parseCoord(val) {
  // Handle Google Sheets date bug: "12.9581" parsed as date object
  if (!val) return NaN;
  const s = val.toString().trim();
  // If it looks like a date string, try to extract the year as a fallback signal
  // Real coords are small numbers; reject anything that parses to > 200
  const n = parseFloat(s);
  if (!isNaN(n) && Math.abs(n) <= 180) return n;
  // Try parsing date and extracting — not useful, just return NaN so row is skipped
  return NaN;
}

function processRow(row) {
  const lat = parseCoord(row.lat);
  const lng = parseCoord(row.lng);
  // Skip rows with invalid coordinates
  if (isNaN(lat) || isNaN(lng)) {
    console.warn('Přeskakuji řádek s neplatnými souřadnicemi:', row.name, row.lat, row.lng);
    return null;
  }
  const dist = haverDist(lat, lng);
  return {
    id: row.id || (row.name||'x').toLowerCase().replace(/\s+/g,'-'),
    name: row.name || 'Neznámá lokalita',
    type: (row.type||'').toLowerCase().includes('bikepark') ? 'bikepark' : 'trail',
    lat, lng,
    region: row.region || '',
    skipas: row.skipas || 'viz web',
    parking: row.parking || 'viz web',
    web: row.web || '',
    season: row.season || '',
    lifts: row.lifts || '',
    description: row.description || '',
    overall_difficulty: row.overall_difficulty || '',
    _trails: parseTrails(row.trails_json || row.trails || ''),
    _dist: dist,
    _time: fmtTime(dist)
  };
}

async function loadFromAppsScript(url) {
  const r = await fetch(url + '?action=getData');
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const json = await r.json();
  if (json.error) throw new Error(json.error);
  return json.data.map(processRow).filter(Boolean);
}

async function initData() {
  const loader = document.getElementById('loadingOverlay');
  const msg = document.getElementById('loadMsg');

  if (!APPS_SCRIPT_URL) {
    // Show config banner and use fallback
    showConfigBanner();
    msg.textContent = 'Načítám ukázková data…';
    ALL_PARKS = FALLBACK.map(processRow).filter(Boolean);
  } else {
    try {
      msg.textContent = 'Načítám z Google Sheets…';
      ALL_PARKS = await loadFromAppsScript(APPS_SCRIPT_URL);
    } catch (err) {
      console.warn('Sheets load failed:', err);
      const errMsg = err.message || 'Neznámá chyba';
      const hint = errMsg.includes('záložka') || errMsg.includes('Sheet') || errMsg.includes('nenalezen')
        ? '<br><strong>Řešení:</strong> Ujisti se že Apps Script kód má <code>const SHEET_NAME = ""</code> (prázdné = automaticky první záložka)'
        : '<br><strong>Tip:</strong> Zkontroluj Apps Script URL a nastav přístup: Kdokoli';
      document.getElementById('errBanner').innerHTML = `⚠️ <strong>Chyba načítání Google Sheets:</strong> ${errMsg}${hint}`;
      document.getElementById('errBanner').classList.add('show');
      showConfigBanner();
      ALL_PARKS = FALLBACK.map(processRow).filter(Boolean);
    }
  }

  // Add markers
  ALL_PARKS.forEach(mkMarker);

  // Stats
  document.getElementById('sBP').textContent = ALL_PARKS.filter(p=>p.type==='bikepark').length + ' bikeparků';
  document.getElementById('sTC').textContent = ALL_PARKS.filter(p=>p.type==='trail').length + ' trail center';

  renderAll();

  // Hide loader
  loader.classList.add('done');
  setTimeout(() => loader.remove(), 500);
}

/* ── EVENT WIRING ── */
document.querySelectorAll('.f-btn').forEach(btn => btn.addEventListener('click', () => {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filter = btn.dataset.f;
  renderAll();
}));

document.getElementById('searchQ').addEventListener('input', e => { query = e.target.value; renderAll(); });
document.getElementById('sortSel').addEventListener('change', e => { sort = e.target.value; renderAll(); });

// mobile toggle
let mobileShowList = true;
document.getElementById('mobToggle').addEventListener('click', () => {
  mobileShowList = !mobileShowList;
  document.querySelector('.sidebar').style.display = mobileShowList ? 'flex' : 'none';
  document.querySelector('.map-wrap').style.height = mobileShowList ? '45vh' : '100vh';
  document.getElementById('mobToggle').textContent = mobileShowList ? '🗺️' : '📋';
  setTimeout(() => mapObj.invalidateSize(), 100);
});

/* ── BOOT ── */
initMap();
initData();
