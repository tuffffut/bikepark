<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#F05A22">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="BikePark">
    <link rel="manifest" id="manifest-link">
    <title>BikePark Atlas ČR</title>
    <script>
    (function() {
        const icon = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512' viewBox='0 0 48 48'><circle cx='24' cy='24' r='24' fill='%23F05A22'/><line x1='4' y1='14' x2='44' y2='18' stroke='%23fff' stroke-width='2' stroke-linecap='round' opacity='.8'/><line x1='24' y1='16' x2='24' y2='21' stroke='%23fff' stroke-width='2' stroke-linecap='round'/><circle cx='24' cy='14.5' r='2.2' fill='%23fff'/><rect x='12' y='21' width='24' height='16' rx='4' fill='%23fff'/><rect x='15' y='25' width='8' height='9' rx='2' fill='%23F05A22'/><rect x='25' y='25' width='8' height='9' rx='2' fill='%23F05A22'/><rect x='16.5' y='26.5' width='2.5' height='2.5' rx='.8' fill='rgba(255,255,255,.4)'/><rect x='26.5' y='26.5' width='2.5' height='2.5' rx='.8' fill='rgba(255,255,255,.4)'/></svg>";
        const m = {
            name: "BikePark Atlas ČR",
            short_name: "BikePark",
            description: "Průvodce bikeparky a trail centry v ČR",
            start_url: "./",
            display: "standalone",
            background_color: "#F05A22",
            theme_color: "#F05A22",
            orientation: "portrait-primary",
            icons: [
                { src: icon, sizes: "192x192", type: "image/svg+xml", purpose: "any maskable" },
                { src: icon, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
            ]
        };
        const blob = new Blob([JSON.stringify(m)], { type: "application/json" });
        document.getElementById("manifest-link").href = URL.createObjectURL(blob);
    })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
    :root {
        --p:   #F05A22; --pdk: #C94A19; --plt: rgba(240,90,34,.15);
        --g:   #3DB968; --gdk: #2E9B52; --glt: rgba(61,185,104,.15);
        --bl:  #3B82F6;
        --bg:  #111318; --s1: #1C2030; --s2: #242838; --s3: #2C3144;
        --b1:  rgba(255,255,255,.07); --b2: rgba(255,255,255,.13);
        --t1:  #F0EDE8; --t2: #9DA8B8; --mu: #5C6478;
        --sh1: 0 1px 4px rgba(0,0,0,.4);
        --sh2: 0 4px 20px rgba(0,0,0,.5);
        --sh3: 0 8px 40px rgba(0,0,0,.6);
        --popup-bg: #1C2030;
    }
    @media (prefers-color-scheme: light) {
        :root {
            --bg:  #F5F0EB; --s1: #FFFFFF; --s2: #FAF7F5; --s3: #F0EBE6;
            --b1:  rgba(0,0,0,.07); --b2: rgba(0,0,0,.12);
            --t1:  #1A1410; --t2: #6B5E57; --mu: #A0928A;
            --sh1: 0 1px 4px rgba(0,0,0,.08);
            --sh2: 0 4px 16px rgba(0,0,0,.12);
            --sh3: 0 8px 32px rgba(0,0,0,.16);
            --popup-bg: #FFFFFF;
        }
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--t1);height:100dvh;overflow:hidden;line-height:1.4}

    /* ── LOADER ── */
    #loader{position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .5s}
    #loader.hide{opacity:0;pointer-events:none}
    .spinner{width:42px;height:42px;border:3px solid var(--plt);border-top-color:var(--p);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── HEADER ── */
    .hdr{position:fixed;top:0;width:100%;height:62px;background:rgba(var(--bg-rgb,17,19,24),.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);z-index:1000;display:flex;align-items:center;padding:0 18px;gap:12px}
    @media (prefers-color-scheme: light) { .hdr { background: rgba(255,255,255,.95); } }
    @media (prefers-color-scheme: dark)  { .hdr { background: rgba(17,19,24,.97); } }
    .logo{font-size:22px;white-space:nowrap;letter-spacing:-.5px;flex-shrink:0}
    .logo b{color:var(--t1);font-weight:900}
    .logo span{color:var(--t2);font-weight:400}
    .hdr-sep{width:1px;height:26px;background:var(--b2);flex-shrink:0}
    .pills{display:flex;gap:6px}
    .pill{font-size:12px;font-weight:700;padding:7px 15px;border-radius:22px;border:1.5px solid var(--b2);background:var(--s1);color:var(--t2);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px}
    .pill:hover{border-color:var(--p);color:var(--t1)}
    .pill.on{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 2px 12px rgba(240,90,34,.45)}
    .pill.on.tc{background:var(--g);border-color:var(--g);box-shadow:0 2px 12px rgba(61,185,104,.45)}
    .srch{position:relative;flex:1;max-width:200px}
    .srch input{width:100%;background:var(--s1);border:1.5px solid var(--b2);color:var(--t1);padding:8px 12px 8px 33px;border-radius:22px;font-size:12px;outline:none;font-family:inherit;transition:all .15s}
    .srch input:focus{border-color:var(--p);background:var(--s2)}
    .srch input::placeholder{color:var(--mu)}
    .srch-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;opacity:.35;pointer-events:none}
    .hdr-r{margin-left:auto;display:flex;gap:7px;align-items:center;flex-shrink:0}
    .btn-hdr{background:var(--s1);color:var(--t2);border:1.5px solid var(--b2);padding:7px 12px;border-radius:9px;font-weight:700;cursor:pointer;font-size:11.5px;font-family:inherit;white-space:nowrap;transition:all .15s}
    .btn-hdr:hover{border-color:var(--p);color:var(--p)}
    .btn-update{background:var(--p);color:#fff;border:none;padding:7px 14px;border-radius:9px;font-weight:700;cursor:pointer;font-size:11.5px;font-family:inherit;transition:background .15s;box-shadow:0 2px 10px rgba(240,90,34,.35)}
    .btn-update:hover{background:var(--pdk)}
    .btn-update:disabled{background:var(--s3);color:var(--mu);cursor:not-allowed;box-shadow:none}

    /* ── LAYOUT ── */
    .app{display:flex;height:calc(100dvh - 62px);margin-top:62px}
    .sidebar{width:460px;flex-shrink:0;border-right:1px solid var(--b1);overflow-y:auto;background:var(--bg)}
    .sidebar::-webkit-scrollbar{width:3px}
    .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
    .sb-top{padding:10px 14px;background:var(--s2);backdrop-filter:blur(8px);border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--t2);position:sticky;top:0;z-index:10}
    .sb-top b{color:var(--p)}
    .sb-top select{background:var(--s2);border:1px solid var(--b2);color:var(--t1);padding:4px 8px;border-radius:7px;font-family:inherit;font-size:11px;outline:none;cursor:pointer}
    .map-side{flex:1;position:relative}
    #map{width:100%;height:100%}
    .map-origin{position:absolute;bottom:28px;left:10px;z-index:500;background:var(--s1);border:1px solid var(--b2);border-radius:9px;padding:6px 10px;font-size:11px;color:var(--t2);pointer-events:none;box-shadow:var(--sh1)}

    /* ── KARTY ── */
    .card{background:var(--s1);border-radius:14px;margin:8px 10px;border:1px solid var(--b1);transition:all .18s;cursor:pointer;overflow:hidden;box-shadow:var(--sh1)}
    .card:hover{border-color:rgba(240,90,34,.4);transform:translateY(-1px);box-shadow:var(--sh2);background:var(--s2)}
    .card.active{border-color:rgba(240,90,34,.6);box-shadow:var(--sh2),0 0 0 2px rgba(240,90,34,.15);background:var(--s2)}
    .card.active.tc{border-color:rgba(61,185,104,.6);box-shadow:var(--sh2),0 0 0 2px rgba(61,185,104,.15)}
    .card-bar{display:none}
    .card-summary{padding:13px 14px 11px}
    .card-head{display:flex;align-items:center;gap:11px;margin-bottom:9px}
    .card-ico{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
    .card-ico.bp{background:none}
    .card-ico.tc{background:none}
    .card-title{font-size:15px;font-weight:800;color:var(--t1);margin-bottom:5px;letter-spacing:-.1px}
    .card-sub{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
    .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-flex;align-items:center;gap:3px}
    .tag-bp{background:var(--plt);color:var(--p)}
    .tag-tc{background:var(--glt);color:var(--g)}
    .tag-reg{background:var(--s3);color:var(--t2);font-size:9.5px}
    .tag-plan{background:var(--plt);color:var(--p)}
    .tag-vis{background:var(--glt);color:var(--g)}
    .card-btns{display:flex;gap:4px;flex-shrink:0;margin-left:auto;align-self:flex-start}
    .ab{width:30px;height:30px;border-radius:8px;border:1px solid var(--b2);background:var(--s3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s}
    .ab:hover{border-color:var(--p);background:var(--plt)}
    .ab.on-p{background:var(--plt);border-color:var(--p)}
    .ab.on-v{background:var(--glt);border-color:var(--g)}
    .card-stats{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:12px;color:var(--t2)}
    .cst{display:flex;align-items:center;gap:3px}
    .cst b{color:var(--t1);font-weight:700}
    .cst.fr b{color:var(--g)}
    .card-note-preview{font-size:11.5px;color:var(--t2);background:var(--s3);border-radius:7px;padding:6px 10px;margin-top:6px;border-left:2px solid var(--p);line-height:1.4}
    .wx-inline{font-size:12px;margin-left:auto}
    .x-btn{width:100%;background:transparent;border:none;border-top:1px solid var(--b1);padding:7px 14px;display:flex;align-items:center;gap:5px;font-family:inherit;font-size:11px;font-weight:600;color:var(--mu);cursor:pointer;transition:color .13s}
    .x-btn:hover,.x-btn.xo{color:var(--p)}
    .x-arr{display:inline-block;font-size:9px;transition:transform .2s}
    .x-btn.xo .x-arr{transform:rotate(180deg)}
    .card-detail{display:none;padding:4px 14px 16px;border-top:1px solid var(--b1);background:var(--s2)}
    .card-detail.open{display:block}
    .ds{margin-top:14px}
    .ds-t{font-size:9.5px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
    .ds-d{font-size:12.5px;color:var(--t2);line-height:1.65}
    .tpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
    .tp{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;color:var(--t2);background:var(--s1);border:1px solid var(--b2);border-radius:6px;padding:3px 9px}
    .tp-km{font-size:10px;color:var(--mu)}
    .diff-bar{display:flex;align-items:center;gap:6px;margin-top:4px}
    .diff-segs{display:flex;gap:3px;flex:1}
    .dseg{height:5px;flex:1;border-radius:3px;background:rgba(255,255,255,.08)}
    .dseg.g{background:#3DB968}.dseg.b{background:#3b82f6}.dseg.r{background:#ef4444}.dseg.k{background:#e0e0e0}
    .diff-lbl{font-size:10px;color:var(--mu);white-space:nowrap}
    .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .mc{background:var(--s3);border:1px solid var(--b1);border-radius:9px;padding:8px 10px}
    .mc-l{font-size:8.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--mu);margin-bottom:3px}
    .mc-v{font-size:12px;font-weight:800;color:var(--t1)}
    .mc-v.fr{color:var(--g)}
    .stars{display:flex;gap:3px;margin-top:4px}
    .star{font-size:22px;color:rgba(255,255,255,.12);cursor:pointer;transition:color .1s,transform .1s;line-height:1}
    .star.on{color:#F59E0B}
    .star:hover{transform:scale(1.18);color:#F59E0B}
    .rrow{display:flex;align-items:center;gap:8px}
    .rlbl{font-size:11px;color:var(--mu)}
    .ntxt{margin-top:6px}
    .ntxt textarea{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:12px;color:var(--t1);resize:vertical;min-height:68px;outline:none;line-height:1.5;transition:border-color .14s}
    .ntxt textarea:focus{border-color:var(--p)}
    .ntxt textarea::placeholder{color:var(--mu)}
    .nrow{margin-top:6px;display:flex;align-items:center;gap:8px}
    .btn-save{font-family:inherit;font-size:11.5px;font-weight:700;padding:7px 15px;background:var(--p);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:background .13s;box-shadow:0 2px 6px rgba(240,90,34,.25)}
    .btn-save:hover{background:var(--pdk)}
    .btn-save:disabled{background:var(--s3);color:var(--mu);cursor:not-allowed;box-shadow:none}
    .nst{font-size:11px;color:var(--mu)}
    .nst.ok{color:var(--g);font-weight:600}
    .wx-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .wx-box{background:var(--s3);padding:11px;border-radius:11px;font-size:11px;border:1px solid var(--b1)}
    .wx-day{font-weight:800;color:var(--p);text-transform:uppercase;margin-bottom:4px;font-size:10px}
    .wx-temp{font-size:17px;font-weight:800;margin-bottom:4px;color:var(--t1)}
    .wx-ic{font-size:26px;margin-bottom:4px}
    .lrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .lbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border:1px solid var(--b2);border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;color:var(--t2);text-decoration:none;background:var(--s3);cursor:pointer;transition:all .13s}
    .lbtn:hover{border-color:var(--p);color:var(--p);background:var(--plt)}
    .visit-row{display:flex;align-items:flex-start;gap:8px;padding:8px 0;border-bottom:1px solid var(--b1);font-size:12px}
    .visit-row:last-child{border-bottom:none}
    .visit-date{color:var(--p);font-weight:700;white-space:nowrap;flex-shrink:0}
    .visit-note{color:var(--t2);flex:1;line-height:1.4}
    .visit-del{background:none;border:none;color:var(--mu);cursor:pointer;font-size:12px;padding:0 4px;flex-shrink:0;transition:color .15s}
    .visit-del:hover{color:#DC2626}
    .visit-add{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;align-items:center}
    .visit-date-input{background:var(--s3);border:1px solid var(--b2);border-radius:8px;padding:6px 9px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;width:140px;transition:border-color .15s;color-scheme:dark}
    .visit-date-input:focus{border-color:var(--p)}
    .visit-note-input{background:var(--s3);border:1px solid var(--b2);border-radius:8px;padding:6px 9px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;flex:1;min-width:120px;transition:border-color .15s}
    .visit-note-input:focus{border-color:var(--p)}
    .visit-date-input::placeholder,.visit-note-input::placeholder{color:var(--mu)}
    .visits-list{max-height:200px;overflow-y:auto;scrollbar-width:thin;margin-bottom:2px}

    /* ── LEAFLET ── */
    .leaflet-popup-content-wrapper{background:var(--s1)!important;border:1px solid var(--b2)!important;border-radius:14px!important;color:var(--t1)!important;box-shadow:var(--sh3)!important;padding:0!important;overflow:hidden}
    .leaflet-popup-content{margin:0!important}
    .leaflet-popup-tip{background:var(--s1)!important}
    .leaflet-popup-close-button{color:var(--t2)!important;top:8px!important;right:10px!important;font-size:18px!important}
    .leaflet-control-zoom a{background:var(--s1)!important;color:var(--t1)!important;border-color:var(--b2)!important}
    .leaflet-control-zoom a:hover{background:var(--s2)!important;color:var(--p)!important}
    .leaflet-control-attribution{background:var(--s1)!important;color:var(--t2)!important;font-size:10px!important;opacity:.8}
    .leaflet-bar{box-shadow:var(--sh1)!important;border:1px solid var(--b2)!important;border-radius:8px!important;overflow:hidden}
    .coords-popup .leaflet-popup-content-wrapper{background:var(--s1)!important;border:1px solid var(--b2)!important}
    .coords-popup .leaflet-popup-tip{background:var(--s1)!important}
    @media(max-width:850px){.leaflet-bottom.leaflet-right{bottom:68px!important}}

    /* ── TOAST ── */
    #toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--s2);color:var(--t1);border:1px solid var(--b2);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh2)}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    #toast.ok{background:var(--gdk);color:#fff;border-color:var(--g)}
    #toast.err{background:#7F1D1D;color:#fff;border-color:#DC2626}

    /* ── QUICK FILTRY (mobil) ── */
    .quick-filters{display:none;position:absolute;top:12px;left:10px;right:10px;z-index:600;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-wrap:nowrap;padding-bottom:2px}
    .quick-filters::-webkit-scrollbar{display:none}
    .qf-pill{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1px solid var(--b2);background:var(--s1);backdrop-filter:blur(12px);color:var(--t2);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s;box-shadow:var(--sh1)}
    .qf-pill:hover{border-color:var(--p);color:var(--t1)}
    .qf-pill.on{background:var(--p);border-color:var(--p);color:#fff;box-shadow:0 2px 8px rgba(240,90,34,.4)}
    .qf-pill.on.tc{background:var(--g);border-color:var(--g);box-shadow:0 2px 8px rgba(61,185,104,.4)}
    .qf-pill.on.dist50{background:#8B5CF6;border-color:#8B5CF6}
    .qf-pill.on.free{background:var(--g);border-color:var(--g)}

    /* ── FAB ── */
    .fab-loc{display:none;position:absolute;bottom:16px;right:12px;z-index:600;width:44px;height:44px;border-radius:50%;background:var(--s1);backdrop-filter:blur(8px);border:1px solid var(--b2);color:var(--p);font-size:18px;cursor:pointer;align-items:center;justify-content:center;box-shadow:var(--sh2);transition:background .15s}
    .fab-loc:hover{background:var(--plt)}

    /* ── BOTTOM NAV ── */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;background:var(--s1);backdrop-filter:blur(20px);border-top:1px solid var(--b1);z-index:1100;justify-content:space-around;align-items:center;box-shadow:0 -2px 12px rgba(0,0,0,.08)}
    .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--mu);cursor:pointer;padding:4px 0;border:none;background:none;font-family:inherit;transition:color .15s}
    .bn-item.active{color:var(--p)}
    .bn-icon{font-size:20px;line-height:1}
    .bn-label{font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}

    /* ── MODAL LOKALITY ── */
    .loc-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:9000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
    .loc-modal.hide{display:none}
    .loc-box{background:var(--s1);border:1px solid var(--b2);border-radius:18px;padding:24px;width:340px;max-width:94vw;box-shadow:var(--sh3)}
    .loc-box h3{font-size:15px;font-weight:800;margin-bottom:16px;color:var(--t1)}
    .loc-presets{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .loc-preset{background:var(--s2);border:1px solid var(--b2);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;text-align:left;transition:all .13s}
    .loc-preset:hover{border-color:var(--p);background:var(--plt);color:var(--p)}
    .loc-preset.active{border-color:var(--p);background:var(--plt);color:var(--p)}
    .loc-sep{font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .loc-custom{display:flex;flex-direction:column;gap:6px}
    .loc-custom input{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 11px;font-family:inherit;font-size:12px;color:var(--t1);outline:none;transition:border-color .13s}
    .loc-custom input:focus{border-color:var(--p)}
    .loc-custom input::placeholder{color:var(--mu)}
    .loc-row{display:flex;gap:6px}
    .loc-row input{flex:1}
    .loc-btns{display:flex;gap:8px;margin-top:16px}
    .loc-btns button{flex:1;padding:10px;border-radius:9px;border:none;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:background .13s}
    .loc-cancel{background:var(--s2);color:var(--t2)}
    .loc-cancel:hover{background:var(--s3)}
    .loc-ok{background:var(--p);color:#fff;box-shadow:0 2px 8px rgba(240,90,34,.3)}
    .loc-ok:hover{background:var(--pdk)}

    /* ── MOBIL ── */
    @media(max-width:850px){
        body{overflow:hidden}
        .hdr{position:relative;top:auto;height:auto;padding:8px 12px;gap:8px;flex-wrap:nowrap}
        .hdr-sep,.pills,.btn-update,.btn-hdr:not(#btn-loc){display:none}
        .logo{font-size:16px}
        .srch{max-width:none;flex:1}
        #btn-loc{display:flex}
        .app{margin-top:0!important;height:calc(100dvh - 58px)!important;flex-direction:column}
        .map-side{flex:1;position:relative;z-index:5}
        .sidebar{display:none;width:100%;position:fixed;top:0;bottom:58px;left:0;right:0;z-index:900;overflow-y:auto;border-right:none;background:var(--bg)}
        .sidebar.mob-visible{display:block}
        .quick-filters{display:flex}
        .fab-loc{display:flex}
        .bottom-nav{display:flex}
        .card{margin:8px 10px 0}
        .card:last-child{margin-bottom:68px}
        .card-summary{padding:12px 13px 10px}
        .sb-top{position:sticky;top:0;z-index:10}
    }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p style="margin-top:16px;font-size:12px;color:var(--mu)" id="loader-status">Připojování...</p>
</div>
<div id="toast"></div>

<!-- HEADER -->
<header class="hdr">
    <div class="logo"><b>BIKE</b><span>park</span> <b style="color:var(--p)">Atlas</b></div>
    <div class="hdr-sep"></div>
    <div class="pills">
        <button class="pill on" data-f="all">Vše</button>
        <button class="pill tc" data-f="trail" id="pill-trail">Trail centra</button>
        <button class="pill" data-f="bikepark" id="pill-bp">Bikeparky</button>
    </div>
    <div class="srch">
        <span class="srch-ic">🔍</span>
        <input type="text" id="sq" placeholder="Hledat...">
    </div>
    <div class="hdr-r">
        <button class="btn-hdr" id="btn-loc" onclick="openLocModal()">📍 <span id="loc-label">Brno – Nový Lískovec</span></button>
        <button class="btn-hdr" onclick="loadAllWeather()">☁ Počasí</button>
        <button class="btn-update" onclick="updateAll()">↺ Přepočítat</button>
    </div>
</header>

<!-- MODAL LOKALITY -->
<div class="loc-modal hide" id="loc-modal" onclick="if(event.target===this)closeLocModal()">
    <div class="loc-box">
        <h3>📍 Změnit výchozí bod</h3>
        <div class="loc-sep">Rychlý výběr</div>
        <div class="loc-presets" id="loc-presets">
            <button class="loc-preset" data-lat="49.1694" data-lng="16.5928" data-name="Brno – Nový Lískovec" onclick="selectPreset(this)">📍 Brno – Nový Lískovec</button>
            <button class="loc-preset" data-lat="50.0755" data-lng="14.4378" data-name="Praha" onclick="selectPreset(this)">📍 Praha</button>
            <button class="loc-preset" data-lat="49.8175" data-lng="18.2826" data-name="Ostrava" onclick="selectPreset(this)">📍 Ostrava</button>
            <button class="loc-preset" data-lat="49.7384" data-lng="13.3736" data-name="Plzeň" onclick="selectPreset(this)">📍 Plzeň</button>
            <button class="loc-preset" data-lat="50.7663" data-lng="15.0543" data-name="Liberec" onclick="selectPreset(this)">📍 Liberec</button>
            <button class="loc-preset" data-lat="48.9745" data-lng="14.4741" data-name="České Budějovice" onclick="selectPreset(this)">📍 České Budějovice</button>
        </div>
        <div class="loc-sep">Vlastní souřadnice</div>
        <div class="loc-custom">
            <div class="loc-row">
                <input type="number" id="loc-lat" placeholder="Šířka (lat)" step="0.0001">
                <input type="number" id="loc-lng" placeholder="Délka (lng)" step="0.0001">
            </div>
            <input type="text" id="loc-name" placeholder="Název místa (volitelné)">
        </div>
        <div class="loc-btns">
            <button class="loc-cancel" onclick="closeLocModal()">Zrušit</button>
            <button class="loc-ok" onclick="applyLocation()">Použít</button>
        </div>
    </div>
</div>

<!-- HLAVNÍ LAYOUT -->
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sb-top">
            <span>Zobrazeno: <b id="cnt">–</b> lokalit</span>
            <select id="ss">
                <option value="dist">Vzdálenost</option>
                <option value="name">Název A–Z</option>
                <option value="rating">Hodnocení</option>
            </select>
        </div>
    </aside>
    <main class="map-side">
        <div id="map"></div>
        <div class="quick-filters" id="quick-filters">
            <button class="qf-pill on" data-qf="all">Vše</button>
            <button class="qf-pill" data-qf="bikepark" id="qf-bp">Bikeparky</button>
            <button class="qf-pill tc" data-qf="trail" id="qf-trail">Trail centra</button>
            <button class="qf-pill dist50" data-qf="dist50">📍 Do 50 km</button>
            <button class="qf-pill free" data-qf="free">💸 Zdarma</button>
        </div>
        <button class="fab-loc" id="fab-loc" title="Moje poloha" onclick="locateMe()">📍</button>
        <div class="map-origin" id="map-origin">📍 Brno – Nový Lískovec</div>
    </main>
</div>

<!-- BOTTOM NAV (mobil) -->
<nav class="bottom-nav" id="bottom-nav">
    <button class="bn-item active" id="bn-map" onclick="switchTab('map')"><span class="bn-icon">🗺</span><span class="bn-label">Mapa</span></button>
    <button class="bn-item" id="bn-list" onclick="switchTab('list')"><span class="bn-icon">☰</span><span class="bn-label">Seznam</span></button>
    <button class="bn-item" id="bn-wx" onclick="loadAllWeather();switchTab('list')"><span class="bn-icon">☁</span><span class="bn-label">Počasí</span></button>
    <button class="bn-item" id="bn-settings" onclick="openLocModal()"><span class="bn-icon">⚙</span><span class="bn-label">Nastavení</span></button>
</nav>

<script>
// ═══════════════════════
// KONFIGURACE
// ═══════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec';
const DEF_LAT = 49.1694, DEF_LNG = 16.5928, DEF_NAME = 'Brno – Nový Lískovec';
let START_LAT = DEF_LAT, START_LNG = DEF_LNG;

try {
    const sv = JSON.parse(localStorage.getItem('bp_origin') || 'null');
    if (sv?.lat && sv?.lng) { START_LAT = sv.lat; START_LNG = sv.lng; updateOriginUI(sv.name || `${sv.lat}, ${sv.lng}`); }
} catch(e) {}

// ═══════════════════════
// STAV
// ═══════════════════════
let PARKS = [], flt = 'all', qry = '', srt = 'dist', selId = null;
let MAP, MARKERS = {}, UD = {}, VISITS = {};
let qfDist50 = false, qfFree = false;

try { UD = JSON.parse(localStorage.getItem('bp_ud') || '{}'); } catch(e) { UD = {}; }

function gu(id) { return UD[id] || {}; }
function su(id, f, v) {
    if (!UD[id]) UD[id] = {};
    UD[id][f] = v;
    try { localStorage.setItem('bp_ud', JSON.stringify(UD)); } catch(e) {}
    fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({ action:'saveUserData', id, field:f, value:v }) }).catch(() => {});
}

let _toastT;
function toast(m, t) {
    const el = document.getElementById('toast');
    el.textContent = m; el.className = 'show ' + (t||'');
    clearTimeout(_toastT); _toastT = setTimeout(() => el.className = '', 3000);
}

// ═══════════════════════
// LOKACE & MODAL
// ═══════════════════════
function updateOriginUI(name) {
    document.getElementById('loc-label').textContent = name;
    document.getElementById('map-origin').textContent = '📍 ' + name;
}
function openLocModal() {
    document.getElementById('loc-modal').classList.remove('hide');
    document.getElementById('loc-lat').value = '';
    document.getElementById('loc-lng').value = '';
    document.getElementById('loc-name').value = '';
    document.querySelectorAll('.loc-preset').forEach(b => b.classList.toggle('active', parseFloat(b.dataset.lat) === START_LAT && parseFloat(b.dataset.lng) === START_LNG));
}
function closeLocModal() { document.getElementById('loc-modal').classList.add('hide'); }
function selectPreset(btn) {
    document.querySelectorAll('.loc-preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loc-lat').value = btn.dataset.lat;
    document.getElementById('loc-lng').value = btn.dataset.lng;
    document.getElementById('loc-name').value = btn.dataset.name;
}
function applyLocation() {
    const lat = parseFloat(document.getElementById('loc-lat').value);
    const lng = parseFloat(document.getElementById('loc-lng').value);
    const name = document.getElementById('loc-name').value.trim() || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    if (isNaN(lat) || isNaN(lng)) { toast('Zadej platné souřadnice', 'err'); return; }
    START_LAT = lat; START_LNG = lng;
    localStorage.setItem('bp_origin', JSON.stringify({ lat, lng, name }));
    updateOriginUI(name);
    if (window._oM) MAP.removeLayer(window._oM);
    window._oM = L.circleMarker([lat, lng], { radius:7, fillColor:'#f59e0b', color:'#fff', weight:2, fillOpacity:1 }).addTo(MAP).bindTooltip('📍 ' + name);
    MAP.flyTo([lat, lng], 10);
    closeLocModal();
    toast('Výchozí bod změněn', 'ok');
    updateAll();
}
function locateMe() {
    if (!navigator.geolocation) { toast('Poloha není dostupná', 'err'); return; }
    toast('Zjišťuji polohu…', '');
    navigator.geolocation.getCurrentPosition(pos => {
        START_LAT = pos.coords.latitude; START_LNG = pos.coords.longitude;
        const name = 'Moje poloha';
        localStorage.setItem('bp_origin', JSON.stringify({ lat:START_LAT, lng:START_LNG, name }));
        updateOriginUI(name);
        if (window._oM) MAP.removeLayer(window._oM);
        window._oM = L.circleMarker([START_LAT, START_LNG], { radius:7, fillColor:'#f59e0b', color:'#fff', weight:2, fillOpacity:1 }).addTo(MAP).bindTooltip('📍 Moje poloha');
        MAP.flyTo([START_LAT, START_LNG], 10);
        toast('Poloha nalezena', 'ok');
        updateAll();
    }, () => toast('Polohu nelze zjistit', 'err'));
}

// Souřadnice klikem na mapu
function copyClickedCoords() { navigator.clipboard.writeText(window._cLat + ', ' + window._cLng).then(() => toast('Zkopírováno! ✓', 'ok')); }
function setClickedAsOrigin() {
    MAP.closePopup();
    document.getElementById('loc-lat').value = window._cLat;
    document.getElementById('loc-lng').value = window._cLng;
    document.getElementById('loc-name').value = '';
    document.getElementById('loc-modal').classList.remove('hide');
    document.querySelectorAll('.loc-preset').forEach(b => b.classList.remove('active'));
}

// ═══════════════════════
// MOBIL TABS
// ═══════════════════════
function switchTab(tab) {
    if (window.innerWidth > 850) return;
    const sb = document.getElementById('sidebar');
    document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
    if (tab === 'map') {
        document.getElementById('bn-map').classList.add('active');
        sb.classList.remove('mob-visible');
        setTimeout(() => MAP?.invalidateSize(), 100);
    } else {
        document.getElementById('bn-' + tab).classList.add('active');
        sb.classList.add('mob-visible');
    }
}

// ═══════════════════════
// QUICK FILTRY
// ═══════════════════════
function initQuickFilters() {
    document.querySelectorAll('.qf-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            const qf = btn.dataset.qf;
            if (qf === 'all') {
                flt = 'all'; qfDist50 = false; qfFree = false;
                document.querySelectorAll('.qf-pill').forEach(b => b.classList.remove('on'));
                btn.classList.add('on');
            } else if (qf === 'bikepark' || qf === 'trail') {
                const was = btn.classList.contains('on');
                document.querySelectorAll('.qf-pill[data-qf="all"],.qf-pill[data-qf="bikepark"],.qf-pill[data-qf="trail"]').forEach(b => b.classList.remove('on'));
                if (was) { flt = 'all'; document.querySelector('.qf-pill[data-qf="all"]').classList.add('on'); }
                else { flt = qf; btn.classList.add('on'); }
            } else if (qf === 'dist50') { qfDist50 = !qfDist50; btn.classList.toggle('on', qfDist50); }
            else if (qf === 'free') { qfFree = !qfFree; btn.classList.toggle('on', qfFree); }
            renderUI();
        });
    });
}

// ═══════════════════════
// MAPA
// ═══════════════════════
function initMap() {
    MAP = L.map('map', { zoomControl:false }).setView([49.8, 15.5], 7);
    const dark = isDark();
    const tileUrl = dark
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png';
    L.tileLayer(tileUrl, {
        attribution:'&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
        subdomains:'abcd', maxZoom:19
    }).addTo(MAP);
    L.control.zoom({ position:'bottomright' }).addTo(MAP);
    window._oM = L.circleMarker([START_LAT, START_LNG], { radius:7, fillColor:'#f59e0b', color:'#fff', weight:2, fillOpacity:1 })
        .addTo(MAP).bindTooltip('📍 ' + (document.getElementById('loc-label')?.textContent || 'Výchozí bod'));
    MAP.on('click', e => {
        if (e.originalEvent._stopped) return;
        const lat = e.latlng.lat.toFixed(6), lng = e.latlng.lng.toFixed(6);
        window._cLat = lat; window._cLng = lng;
        if (window._cP) MAP.closePopup(window._cP);
        window._cP = L.popup({ closeButton:true, className:'coords-popup' })
            .setLatLng(e.latlng)
            .setContent(`<div style="padding:12px 14px;font-family:inherit;min-width:210px">
                <div style="font-size:10px;color:var(--mu);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Souřadnice bodu</div>
                <div style="font-size:14px;font-weight:800;color:var(--t1);margin-bottom:10px">${lat}, ${lng}</div>
                <div style="display:flex;gap:6px">
                    <button onclick="copyClickedCoords()" style="flex:1;padding:7px;border-radius:7px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">📋 Kopírovat</button>
                    <button onclick="setClickedAsOrigin()" style="flex:1;padding:7px;border-radius:7px;border:none;background:var(--p);color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer">📍 Výchozí bod</button>
                </div></div>`)
            .openOn(MAP);
    });
}

// ═══════════════════════
// SVG IKONY
// ═══════════════════════
// ═══════════════════════════════════════════════
// UNIVERZÁLNÍ SVG IKONY  – 1 design všude
// bp() = gondola lanovky   tc() = hora + serpentina
// size = px, color = fill barva pozadí čtverce
// ═══════════════════════════════════════════════

function svgBP(size) {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 48 48">
  <circle cx="24" cy="24" r="24" fill="#F05A22"/>
  <!-- lano -->
  <line x1="4" y1="14" x2="44" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity=".8"/>
  <!-- závěs -->
  <line x1="24" y1="16" x2="24" y2="21" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <!-- kladka -->
  <circle cx="24" cy="14.5" r="2.2" fill="#fff"/>
  <!-- tělo gondoly -->
  <rect x="12" y="21" width="24" height="16" rx="4" fill="#fff"/>
  <!-- okno L -->
  <rect x="15" y="25" width="8" height="9" rx="2" fill="#F05A22"/>
  <!-- okno P -->
  <rect x="25" y="25" width="8" height="9" rx="2" fill="#F05A22"/>
  <!-- odlesk L -->
  <rect x="16.5" y="26.5" width="2.5" height="2.5" rx=".8" fill="rgba(255,255,255,.4)"/>
  <!-- odlesk P -->
  <rect x="26.5" y="26.5" width="2.5" height="2.5" rx=".8" fill="rgba(255,255,255,.4)"/>
</svg>`;
}

function svgTC(size) {
    return `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 48 48">
  <circle cx="24" cy="24" r="24" fill="#3DB968"/>
  <!-- zadní kolo -->
  <circle cx="13" cy="30" r="9" fill="none" stroke="#fff" stroke-width="2.2"/>
  <circle cx="13" cy="30" r="2" fill="#fff"/>
  <!-- přední kolo -->
  <circle cx="35" cy="30" r="9" fill="none" stroke="#fff" stroke-width="2.2"/>
  <circle cx="35" cy="30" r="2" fill="#fff"/>
  <!-- rám – sedlová trubka -->
  <line x1="13" y1="30" x2="22" y2="18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- rám – řetězová trubka -->
  <line x1="13" y1="30" x2="27" y2="30" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- rám – horní trubka -->
  <line x1="22" y1="18" x2="30" y2="18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- rám – přední vidlice -->
  <line x1="30" y1="18" x2="35" y2="30" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- rám – zadní vzpěra -->
  <line x1="27" y1="30" x2="22" y2="18" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- střed kola (kliky) -->
  <circle cx="27" cy="30" r="2.5" fill="#fff"/>
  <!-- řídítka -->
  <line x1="30" y1="18" x2="30" y2="14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="28" y1="14" x2="32" y2="14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <!-- sedlo -->
  <line x1="22" y1="18" x2="22" y2="14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="19.5" y1="14" x2="24.5" y2="14" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
</svg>`;
}

function pillIcon(isBP) {
    const svg = isBP ? svgBP(20) : svgTC(20);
    return `<span style="display:inline-flex;align-items:center;vertical-align:middle;margin-right:4px;border-radius:50%;overflow:hidden;flex-shrink:0">${svg}</span>`;
}

function iconBikeparkMarker() {
    return `<g transform="translate(21,19) scale(0.7)">
      <line x1="-14" y1="-10" x2="14" y2="-6" stroke="rgba(255,255,255,.8)" stroke-width="2.2" stroke-linecap="round"/>
      <line x1="0" y1="-8" x2="0" y2="-2" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
      <circle cx="0" cy="-10.5" r="2.5" fill="#fff"/>
      <rect x="-13" y="-2" width="26" height="16" rx="4" fill="#fff"/>
      <rect x="-11" y="2" width="9" height="9" rx="2" fill="#F05A22"/>
      <rect x="2" y="2" width="9" height="9" rx="2" fill="#F05A22"/>
      <rect x="-9.5" y="3.5" width="2.5" height="2.5" rx=".8" fill="rgba(255,255,255,.4)"/>
      <rect x="3.5" y="3.5" width="2.5" height="2.5" rx=".8" fill="rgba(255,255,255,.4)"/>
    </g>`;
}

function iconTrailMarker() {
    return `<g transform="translate(21,21) scale(0.78)">
      <!-- zadní kolo -->
      <circle cx="-10" cy="7" r="8" fill="none" stroke="#fff" stroke-width="2"/>
      <circle cx="-10" cy="7" r="1.8" fill="#fff"/>
      <!-- přední kolo -->
      <circle cx="10" cy="7" r="8" fill="none" stroke="#fff" stroke-width="2"/>
      <circle cx="10" cy="7" r="1.8" fill="#fff"/>
      <!-- rám -->
      <line x1="-10" y1="7" x2="-2" y2="-4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="7" x2="4" y2="7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="-2" y1="-4" x2="6" y2="-4" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="-4" x2="10" y2="7" stroke="#fff" stroke-width="2" stroke-linecap="round"/>

    const ico = isBP ? iconBikeparkMarker() : iconTrailMarker();

async function fetchData() {
    const st = document.getElementById('loader-status');
    try {
        st.textContent = 'Stahování dat…';
        const res = await fetch(SCRIPT_URL + '?action=getData');
        const result = await res.json();

        PARKS = result.data.map(row => {
            const g = (...keys) => {
                const k = Object.keys(row).find(k => keys.includes(k.toLowerCase().trim().replace(/[\s/]+/g,'_')));
                return k ? String(row[k]||'') : '';
            };
            const lat = parseFloat(g('lat','šířka','latitude'));
            const lng = parseFloat(g('lng','délka','longitude'));
            if (isNaN(lat) || isNaN(lng) || lat===0) return null;
            let trails = [];
            const rawT = g('trails_json','trasy_json','trasy','trails');
            if (rawT?.trim().startsWith('[')) { try { trails = JSON.parse(rawT); } catch(e) {} }
            return {
                id: g('id'), name: g('name','název','jméno'),
                lat, lng,
                region: g('region','kraj'),
                skipas: g('skipas','cena'),
                parking: g('parking','parkování'),
                desc: g('description','popis'),
                web: g('web','web_url','url'),
                season: g('season','sezóna','sezona'),
                lifts: g('lifts','lanovky','počet_lanovek'),
                elevation: g('elevation','m_n.m.','nadmořská_výška'),
                overall_difficulty: g('overall_difficulty','obtížnost'),
                type: g('type','typ').toLowerCase(),
                trail_count: g('trail_count','počet_tras'),
                green_count: g('green_count','zelené'),
                blue_count: g('blue_count','modré'),
                red_count: g('red_count','červené_černé'),
                trails,
                _my_status: g('my_status','stav'),
                _my_note: g('my_note'),
                _my_rating: g('my_rating','hodnocení'),
            };
        }).filter(Boolean);

        // User data ze Sheets
        try {
            const ur = await fetch(SCRIPT_URL + '?action=getUserData');
            const ud = await ur.json();
            if (ud.userData) {
                Object.entries(ud.userData).forEach(([id, f]) => {
                    if (!UD[id]) UD[id] = {};
                    if (f.status) UD[id].status = f.status;
                    if (f.note)   UD[id].note   = f.note;
                    if (f.rating) UD[id].rating  = f.rating;
                });
                try { localStorage.setItem('bp_ud', JSON.stringify(UD)); } catch(e) {}
            }
        } catch(e) { console.warn('getUserData selhal:', e.message); }

        // Návštěvy
        try {
            const vr = await fetch(SCRIPT_URL + '?action=getVisits');
            const vd = await vr.json();
            if (vd.visits) VISITS = vd.visits;
        } catch(e) { console.warn('getVisits selhal:', e.message); }

        await updateAll();
        const ldr = document.getElementById('loader');
        ldr.classList.add('hide');
        setTimeout(() => ldr.remove(), 600);
    } catch(e) {
        if (st) st.textContent = 'Chyba: ' + e.message;
        console.error(e);
    }
}

// ═══════════════════════
// VZDÁLENOSTI (OSRM + Haversine fallback)
// ═══════════════════════
function haversine(a, b, c, d) {
    const R=6371, dL=(c-a)*Math.PI/180, dN=(d-b)*Math.PI/180;
    const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
    return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

async function updateAll() {
    const btn = document.querySelector('.btn-update');
    if (btn) { btn.disabled=true; btn.textContent='⏳ Počítám…'; }
    const B = 5;
    for (let i=0; i<PARKS.length; i+=B) {
        await Promise.all(PARKS.slice(i, i+B).map(async p => {
            try {
                const r = await fetch(`https://router.project-osrm.org/route/v1/driving/${START_LNG},${START_LAT};${p.lng},${p.lat}?overview=false`, { signal:AbortSignal.timeout(6000) });
                const d = await r.json();
                if (d.code==='Ok' && d.routes?.[0]) {
                    p.distKm = d.routes[0].distance/1000;
                    p.duration = Math.round(d.routes[0].duration/60);
                    p._ds = 'osrm';
                } else throw new Error();
            } catch(e) {
                const air = haversine(START_LAT, START_LNG, p.lat, p.lng);
                p.distKm = air*1.35;
                p.duration = Math.round((p.distKm/70)*60);
                p._ds = 'fallback';
            }
        }));
        renderUI();
    }
    if (btn) { btn.disabled=false; btn.textContent='↺ Přepočítat'; }
    toast('Vzdálenosti aktualizovány', 'ok');
}

const WXC = {0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',61:'🌧',63:'🌧',65:'🌧',71:'🌨',80:'🌦',81:'🌧',95:'⛈'};
const WX_CACHE = {};
function wxIcon(c) { const k=Object.keys(WXC).map(Number).sort((a,b)=>a-b); for(let i=k.length-1;i>=0;i--) if(k[i]<=c) return WXC[k[i]]; return '🌡'; }

async function loadInlineWeather(list) {
    const dSat = ((6-new Date().getDay()+7)%7)||7;
    await Promise.all(list.map(async p => {
        const el = document.getElementById('wx-' + p.id);
        if (!el) return;
        if (WX_CACHE[p.id]) { el.innerHTML = WX_CACHE[p.id]; return; }
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=weathercode,temperature_2m_max&timezone=Europe%2FPrague&forecast_days=14`);
            const d = await r.json();
            const ic = wxIcon(d.daily.weathercode[dSat]);
            const tp = Math.round(d.daily.temperature_2m_max[dSat]);
            const h = `<span title="Počasí na sobotu">${ic} <b style="color:var(--t1)">${tp}°</b></span>`;
            WX_CACHE[p.id] = h;
            if (el) el.innerHTML = h;
        } catch(e) { if (el) el.textContent = ''; }
    }));
}

async function loadAllWeather() {
    const btn = document.querySelector('.btn-hdr[onclick*="loadAllWeather"]');
    if (btn) { btn.disabled=true; btn.textContent='⏳'; }
    const dSat = ((6-new Date().getDay()+7)%7)||7, dSun=dSat+1;
    const WXCF = {0:['☀️','Jasno'],1:['🌤','Převážně jasno'],2:['⛅','Polojasno'],3:['☁️','Zataženo'],45:['🌫','Mlha'],51:['🌦','Mrholení'],61:['🌧','Slabý déšť'],63:['🌧','Déšť'],65:['🌧','Vydatný déšť'],71:['🌨','Sněžení'],80:['🌦','Přeháňky'],81:['🌧','Silné přeháňky'],95:['⛈','Bouřka']};
    function wxi(c){const k=Object.keys(WXCF).map(Number).sort((a,b)=>a-b);for(let i=k.length-1;i>=0;i--)if(k[i]<=c)return WXCF[k[i]];return['🌡','—'];}
    const vis = PARKS.filter(isVisible);
    await Promise.all(vis.map(async p => {
        try {
            const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=temperature_2m_max,temperature_2m_min,weathercode,windspeed_10m_max,precipitation_probability_max&timezone=Europe%2FPrague&forecast_days=14`);
            const d = await r.json(); const days = d.daily;
            const card = document.querySelector(`.card[data-id="${p.id}"]`);
            if (!card) return;
            const box = card.querySelector('[data-wx-box]');
            if (!box) return;
            const det = card.querySelector('.card-detail'), xb = card.querySelector('.x-btn');
            if (det && !det.classList.contains('open')) { det.classList.add('open'); if(xb){xb.classList.add('xo');xb.querySelector('.x-arr').textContent='▲';xb.lastChild.textContent=' Sbalit detail';} }
            const hw = dd => { const w=wxi(days.weathercode[dd]); return `<div class="wx-box"><div class="wx-day">${dd===dSat?'Sobota':'Neděle'}</div><div class="wx-ic">${w[0]}</div><div class="wx-temp">${Math.round(days.temperature_2m_max[dd])}°C <span style="font-size:11px;opacity:.6">/ ${Math.round(days.temperature_2m_min[dd])}°C</span></div><div style="margin-top:3px;opacity:.7">${w[1]}</div><div style="opacity:.7">💨 ${Math.round(days.windspeed_10m_max[dd])} km/h</div>${days.precipitation_probability_max[dd]>0?`<div style="opacity:.7">🌂 ${days.precipitation_probability_max[dd]}%</div>`:''}</div>`; };
            box.innerHTML = hw(dSat) + hw(dSun); box.style.display = 'grid';
            const wxBtn = card.querySelector('[data-a="wx"]'); if (wxBtn) wxBtn.style.display='none';
        } catch(e) {}
    }));
    if (btn) { btn.disabled=false; btn.textContent='☁ Počasí'; }
    toast(`Počasí načteno pro ${vis.length} lokalit`, 'ok');
}

function isVisible(p) {
    if (flt!=='all' && !(p.type?.includes(flt))) return false;
    if (qfDist50 && (p.distKm||9999) > 50) return false;
    if (qfFree && p.skipas?.toLowerCase() !== 'zdarma') return false;
    if (qry) { const q=qry.toLowerCase(); return p.name.toLowerCase().includes(q)||(p.region||'').toLowerCase().includes(q); }
    return true;
}
function getSorted() {
    return PARKS.filter(isVisible).sort((a,b) => {
        if (srt==='dist') return (a.distKm||9999)-(b.distKm||9999);
        if (srt==='name') return a.name.localeCompare(b.name,'cs');
        if (srt==='rating') return parseFloat(gu(b.id).rating||0)-parseFloat(gu(a.id).rating||0);
        return 0;
    });
}
function renderUI() {
    const list = getSorted();
    document.getElementById('cnt').textContent = list.length;
    Object.values(MARKERS).forEach(m => MAP.removeLayer(m)); MARKERS = {};
    PARKS.filter(isVisible).forEach(p => addMarker(p));
    const side = document.getElementById('sidebar');
    const sbTop = side.querySelector('.sb-top');
    side.innerHTML = '';
    if (sbTop) side.appendChild(sbTop);

    list.forEach(p => { const w=document.createElement('div'); w.innerHTML=buildCard(p); const c=w.firstElementChild; side.appendChild(c); wireCard(c, p); });
    loadInlineWeather(list);
}

        <div class="nrow"><button class="btn-save" data-a="sn">Uložit poznámku</button><span class="nst" data-ns></span></div></div></div>
    <div class="ds"><div class="ds-t">Historie návštěv <span style="font-size:9px;font-weight:400;text-transform:none;opacity:.45;margin-left:4px">(list Navstevnost)</span></div>
        <div class="visits-list" id="vlist-${p.id}">${visRows}</div>
        <div class="visit-add">
            <input type="date" class="visit-date-input" id="vdate-${p.id}" value="${new Date().toISOString().slice(0,10)}">
            <input type="text" class="visit-note-input" id="vnote-${p.id}" placeholder="Poznámka k návštěvě">
            <button class="btn-save" data-a="av">+ Přidat</button>
            <span class="nst" data-vns></span>
        </div></div>
    <div class="lrow">
        ${p.web?`<a href="${p.web}" target="_blank" rel="noopener" class="lbtn" onclick="event.stopPropagation()">🌐 Web</a>`:''}
        <a href="${mcu}" target="_blank" rel="noopener" class="lbtn" onclick="event.stopPropagation()">🗺 Navigovat</a>
    </div>
</div>
</article>`;
}

// ═══════════════════════
// WIRE CARD
// ═══════════════════════
function updateStatusTag(card, status) {
    card.querySelectorAll('.tag-plan,.tag-vis').forEach(t => t.remove());
    const sub = card.querySelector('.card-sub');
    if (!sub) return;
    if (status==='planned') { const t=document.createElement('span'); t.className='tag tag-plan'; t.textContent='📌 V plánu'; sub.appendChild(t); }
    else if (status==='visited') { const t=document.createElement('span'); t.className='tag tag-vis'; t.textContent='✅ Navštíveno'; sub.appendChild(t); }
}

async function deleteVisit(e, parkId, card) {
    e.stopPropagation();
    const btn = e.target.closest('[data-a="dv"]'); if (!btn) return;
    const vid = btn.dataset.vid;
    if (!confirm('Smazat tuto návštěvu?')) return;
    btn.textContent = '…';
    try {
        const r = await fetch(SCRIPT_URL, { method:'POST', body:JSON.stringify({ action:'deleteVisit', visit_id:vid, park_id:parkId }) });
        const d = await r.json();
        if (d.ok) {
            btn.closest('.visit-row').remove();
            if (VISITS[parkId]) VISITS[parkId] = VISITS[parkId].filter(v => v.id != vid);
            const vl = document.getElementById('vlist-' + parkId);
            if (vl && vl.children.length===0) vl.innerHTML='<div style="font-size:12px;color:var(--mu);padding:4px 0">Zatím žádná návštěva</div>';
            toast('Návštěva smazána', 'ok');
        } else { btn.textContent='✕'; toast('Chyba: '+(d.error||''), 'err'); }
    } catch(err) { btn.textContent='✕'; toast('Nelze smazat', 'err'); }
}

function wireCard(card, p) {
    const id = p.id;
    card.addEventListener('click', e => {
        if (e.target.closest('.ab,.card-detail,.lbtn,.x-btn')) return;
        selectPark(id);
    });

    // Plánuji
    card.querySelector('[data-a="pl"]')?.addEventListener('click', e => {
        e.stopPropagation();
        const n = gu(id).status==='planned' ? '' : 'planned';
        su(id, 'status', n);
        e.currentTarget.classList.toggle('on-p', n==='planned');
        card.querySelector('[data-a="vi"]')?.classList.remove('on-v');
        updateStatusTag(card, n);
        toast(n==='planned'?'📌 Přidáno do plánu':'Odebráno z plánu', 'ok');
    });

    // Navštíveno
    card.querySelector('[data-a="vi"]')?.addEventListener('click', e => {
        e.stopPropagation();
        const n = gu(id).status==='visited' ? '' : 'visited';
        su(id, 'status', n);
        e.currentTarget.classList.toggle('on-v', n==='visited');
        card.querySelector('[data-a="pl"]')?.classList.remove('on-p');
        updateStatusTag(card, n);
        toast(n==='visited'?'✅ Označeno jako navštíveno':'Odznačeno', 'ok');
    });

    // Expand
    card.querySelectorAll('[data-a="x"]').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const det = card.querySelector('.card-detail');
            const xb = card.querySelector('.x-btn');
            const open = det.classList.contains('open');
            det.classList.toggle('open');
            if (xb) { xb.classList.toggle('xo',!open); xb.querySelector('.x-arr').textContent=open?'▼':'▲'; xb.lastChild.textContent=' '+(open?'Rozbalit detail':'Sbalit detail'); }
        });
    });

    // Počasí v detailu
    card.querySelector('[data-a="wx"]')?.addEventListener('click', async e => {
        e.stopPropagation();
        const btn=e.currentTarget, box=card.querySelector('[data-wx-box]');
        btn.textContent='Načítám…'; btn.disabled=true;
        const dSat=((6-new Date().getDay()+7)%7)||7, dSun=dSat+1;
        const WXCF={0:['☀️','Jasno'],1:['🌤','Převážně jasno'],2:['⛅','Polojasno'],3:['☁️','Zataženo'],45:['🌫','Mlha'],51:['🌦','Mrholení'],61:['🌧','Slabý déšť'],63:['🌧','Déšť'],65:['🌧','Vydatný déšť'],71:['🌨','Sněžení'],80:['🌦','Přeháňky'],81:['🌧','Silné přeháňky'],95:['⛈','Bouřka']};
        function wxi(c){const k=Object.keys(WXCF).map(Number).sort((a,b)=>a-b);for(let i=k.length-1;i>=0;i--)if(k[i]<=c)return WXCF[k[i]];return['🌡','—'];}
        try {
            const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=temperature_2m_max,temperature_2m_min,weathercode,windspeed_10m_max,precipitation_probability_max&timezone=Europe%2FPrague&forecast_days=14`);
            const d=await r.json(); const days=d.daily;
            const hw=dd=>{const w=wxi(days.weathercode[dd]);return`<div class="wx-box"><div class="wx-day">${dd===dSat?'Sobota':'Neděle'}</div><div class="wx-ic">${w[0]}</div><div class="wx-temp">${Math.round(days.temperature_2m_max[dd])}°C <span style="font-size:11px;opacity:.6">/ ${Math.round(days.temperature_2m_min[dd])}°C</span></div><div style="margin-top:3px;opacity:.7">${w[1]}</div><div style="opacity:.7">💨 ${Math.round(days.windspeed_10m_max[dd])} km/h</div>${days.precipitation_probability_max[dd]>0?`<div style="opacity:.7">🌂 ${days.precipitation_probability_max[dd]}%</div>`:''}</div>`;};
            box.innerHTML=hw(dSat)+hw(dSun); box.style.display='grid'; btn.style.display='none';
        } catch(e) { btn.textContent='⚠ Nepodařilo se načíst'; btn.disabled=false; }
    });

    // Hvězdičky (bez zavření karty)
    card.querySelectorAll('.star').forEach(st => {
        st.addEventListener('click', e => {
            e.stopPropagation();
            const r=parseInt(st.dataset.s), cur=parseFloat(gu(id).rating||0), newR=cur===r?0:r;
            su(id, 'rating', String(newR));
            card.querySelectorAll('.star').forEach((s,i) => s.classList.toggle('on', i<newR));
            const rl=card.querySelector('.rlbl'); if(rl) rl.textContent=newR?newR+'/5 ★':'Neohodnoceno';
            toast('Hodnocení: '+(newR?'★'.repeat(newR):'–'), 'ok');
        });
    });

    // Přidat návštěvu
    card.querySelector('[data-a="av"]')?.addEventListener('click', async e => {
        e.stopPropagation();
        const btn=e.currentTarget, date=document.getElementById('vdate-'+id)?.value, note=document.getElementById('vnote-'+id)?.value.trim(), vns=card.querySelector('[data-vns]');
        if (!date) { toast('Vyber datum návštěvy', 'err'); return; }
        btn.disabled=true; btn.textContent='Ukládám…';
        try {
            const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'addVisit',park_id:id,date,note})});
            const d=await r.json();
            if (d.ok) {
                if (!VISITS[id]) VISITS[id]=[];
                VISITS[id].push({id:d.visit_id,date,note});
                const vl=document.getElementById('vlist-'+id);
                if (vl) { const row=document.createElement('div'); row.className='visit-row'; row.dataset.vid=d.visit_id; row.innerHTML=`<div class="visit-date">📅 ${date}</div><div class="visit-note">${note||'—'}</div><button class="visit-del" data-a="dv" data-vid="${d.visit_id}" title="Smazat">✕</button>`; row.querySelector('[data-a="dv"]').addEventListener('click',ev=>deleteVisit(ev,id,card)); vl.insertBefore(row,vl.firstChild); if(vl.querySelector('div[style]'))vl.querySelector('div[style]').remove(); }
                document.getElementById('vnote-'+id).value='';
                toast('Návštěva přidána ✓', 'ok');
                if (vns){vns.textContent='✓ Uloženo do Sheets';vns.className='nst ok';setTimeout(()=>{vns.textContent='';vns.className='nst';},4000);}
            } else toast('Chyba: '+(d.error||''), 'err');
        } catch(err) { toast('Nelze uložit', 'err'); }
        btn.disabled=false; btn.textContent='+ Přidat';
    });

    // Smazat návštěvu
    card.querySelector('.visits-list')?.addEventListener('click', e => { if(e.target.closest('[data-a="dv"]')) deleteVisit(e,id,card); });

    // Uložit poznámku
    card.querySelector('[data-a="sn"]')?.addEventListener('click', async e => {
        e.stopPropagation();
        const ta=card.querySelector('textarea'), btn=e.currentTarget, ns=card.querySelector('[data-ns]');
        btn.disabled=true; btn.textContent='Ukládám…'; ns.textContent=''; ns.className='nst';
        su(id,'note',ta.value);
        try {
            const r=await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'saveUserData',id,field:'note',value:ta.value})});
            const d=await r.json();
            if (d.ok){ns.textContent='✓ Uloženo do Sheets';ns.className='nst ok';toast('Poznámka uložena','ok');}
            else{ns.textContent='⚠ Uloženo lokálně';toast('Uloženo lokálně','');}
        } catch(err){ns.textContent='⚠ Offline – uloženo lokálně';}
        btn.disabled=false; btn.textContent='Uložit poznámku';
        setTimeout(()=>{ns.textContent='';ns.className='nst';},5000);
    });
}

// ═══════════════════════
// VÝBĚR PARKU
// ═══════════════════════
function selectPark(id) {
    selId = id;
    renderUI();
    if (window.innerWidth <= 850) switchTab('list');
    setTimeout(() => {
        const card = document.querySelector(`.card[data-id="${id}"]`);
        if (!card) return;
        card.scrollIntoView({ behavior:'smooth', block:'start' });
        const det=card.querySelector('.card-detail'), xb=card.querySelector('.x-btn');
        if (det && !det.classList.contains('open')) { det.classList.add('open'); if(xb){xb.classList.add('xo');xb.querySelector('.x-arr').textContent='▲';xb.lastChild.textContent=' Sbalit detail';} }
    }, 80);
    const p = PARKS.find(x => x.id===id);
    if (p) MAP.flyTo([p.lat, p.lng], 13);
}

document.querySelectorAll('.pill').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('on'));
    b.classList.add('on'); flt = b.dataset.f; renderUI();
}));
document.getElementById('sq').addEventListener('input', e => { qry=e.target.value; renderUI(); });
document.getElementById('ss').addEventListener('change', e => { srt=e.target.value; renderUI(); });

// ═══════════════════════
// SPUŠTĚNÍ
// ═══════════════════════
initMap();
initQuickFilters();
injectStaticIcons();
fetchData();

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    // Mapa: přepni dlaždice
    MAP.eachLayer(l => { if (l._url) MAP.removeLayer(l); });
    const dark2 = isDark();
    L.tileLayer(dark2
        ? 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'
        : 'https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
        { attribution:'&copy; OSM &copy; CARTO', subdomains:'abcd', maxZoom:19 }).addTo(MAP);
    // Markery
    PARKS.forEach(p => MARKERS[p.id]?.setIcon(makeIcon(p.type?.includes('bikepark'), false)));
});
