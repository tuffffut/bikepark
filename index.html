<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bikepark Atlas 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #f05a22;
            --secondary: #22c55e;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.7);
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100dvh;
        }

        /* Loading Screen */
        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--glass); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Moderní Header */
        .hdr {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            background: var(--glass); border-bottom: 1px solid var(--border);
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px;
        }
        .logo { font-size: 18px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--primary); text-shadow: 0 0 15px rgba(240, 90, 34, 0.4); }

        /* Hlavní layout */
        .app { display: flex; height: 100dvh; padding-top: 64px; }
        
        .sidebar {
            width: 420px; flex-shrink: 0; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; background: rgba(3, 7, 18, 0.5);
        }

        .map-side { flex: 1; position: relative; background: #000; }
        #map { width: 100%; height: 100%; filter: grayscale(0.5) contrast(1.1) brightness(0.8); }

        /* Seznam a karty */
        .card-list { flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth; }
        .card {
            background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border);
            margin-bottom: 12px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer; position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
        }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); background: rgba(31, 41, 55, 0.8); }
        .card.active { border-color: var(--primary); box-shadow: 0 0 30px rgba(240, 90, 34, 0.15); }

        .card-content { padding: 16px; }
        .card-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #fff; }
        .card-tag { 
            display: inline-block; font-size: 10px; font-weight: 800; text-transform: uppercase;
            padding: 2px 8px; border-radius: 6px; margin-right: 6px; letter-spacing: 0.5px;
        }
        .tag-bp { background: rgba(240, 90, 34, 0.1); color: var(--primary); }
        .tag-tc { background: rgba(34, 197, 94, 0.1); color: var(--secondary); }

        /* Počasí v kartě */
        .wx-row { 
            display: flex; gap: 8px; margin-top: 12px; padding-top: 12px; 
            border-top: 1px solid var(--border); 
        }
        .wx-item { flex: 1; background: var(--glass); border-radius: 12px; padding: 8px; text-align: center; }
        .wx-temp { font-size: 16px; font-weight: 800; }
        .wx-day { font-size: 9px; opacity: 0.5; text-transform: uppercase; font-weight: 700; }

        /* Ovládací prvky */
        .btn-weather {
            background: var(--primary); color: white; border: none; padding: 8px 16px;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn-weather:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Mobilní optimalizace */
        @media (max-width: 800px) {
            .app { flex-direction: column; overflow-y: auto; height: auto; }
            .sidebar { width: 100%; border-right: none; height: auto; }
            .map-side { height: 50vh; order: -1; position: sticky; top: 64px; z-index: 10; border-bottom: 1px solid var(--border); }
            body { overflow-y: auto; }
            .card-list { padding: 12px; }
        }

        /* Leaflet Dark Fix */
        .leaflet-container { background: #030712 !important; }
        .leaflet-popup-content-wrapper { background: #111827 !important; color: #fff !important; border-radius: 12px !important; }
        .leaflet-popup-tip { background: #111827 !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 700; letter-spacing: 1px; opacity: 0.8;">NAČÍTÁM DATA 2026...</p>
    </div>

    <header class="hdr">
        <div class="logo">BIKE<span>ATLAS</span></div>
        <button id="btnWx" class="btn-weather">Aktualizovat počasí</button>
    </header>

    <div class="app">
        <aside class="sidebar">
            <div id="cl" class="card-list">
                </div>
        </aside>
        
        <main class="map-side">
            <div id="map"></div>
        </main>
    </div>

<script>
    // TVŮJ ODKAZ Z GOOGLE SHEETS
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec';
    //var SCRIPT_URL='https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec';

    let PARKS = [];
    let MAP, MARKERS = {};
    let WX = {};

    // 1. Inicializace mapy (v roce 2026 chceme tmavou mapu)
    function initMap() {
        MAP = L.map('map', { zoomControl: false }).setView([49.8, 15.5], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(MAP);
        
        // Fix pro mobily: po krátké pauze vynutíme přepočet velikosti
        setTimeout(() => { MAP.invalidateSize(); }, 500);
    }

    // 2. NAČTENÍ DAT - Žádná offline data, jen čistý fetch ze Sheetu
    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL + '?action=getData');
            const result = await response.json();
            
            // Transformace dat ze Sheetu do našeho formátu
            PARKS = result.data.map(row => ({
                id: row.id || row.name.toLowerCase().replace(/\s/g, '-'),
                name: row.name,
                type: row.type.toLowerCase().includes('bikepark') ? 'bikepark' : 'trail',
                lat: parseFloat(row.lat),
                lng: parseFloat(row.lng),
                region: row.region,
                skipas: row.skipas,
                parking: row.parking,
                desc: row.description || ''
            }));

            renderUI();
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => document.getElementById('loader').remove(), 500);
            
        } catch (err) {
            console.error("Chyba při načítání dat:", err);
            alert("Nepodařilo se připojit k Google Sheets. Zkontrolujte připojení.");
        }
    }

    function renderUI() {
        const list = document.getElementById('cl');
        list.innerHTML = '';

        PARKS.forEach(p => {
            // Přidání markeru na mapu
            const color = p.type === 'bikepark' ? '#f05a22' : '#22c55e';
            const mk = L.circleMarker([p.lat, p.lng], {
                radius: 8, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.9
            }).addTo(MAP);
            
            mk.bindPopup(`<b style="color:${color}">${p.name}</b><br>${p.region}`);
            MARKERS[p.id] = mk;

            // Vytvoření karty
            const card = document.createElement('div');
            card.className = 'card';
            card.id = `card-${p.id}`;
            card.innerHTML = `
                <div class="card-content">
                    <span class="card-tag ${p.type === 'bikepark' ? 'tag-bp' : 'tag-tc'}">
                        ${p.type === 'bikepark' ? '🚠 Bikepark' : '🚲 Trail Centrum'}
                    </span>
                    <div class="card-title">${p.name}</div>
                    <div style="font-size: 12px; opacity: 0.6; margin-bottom: 8px;">📍 ${p.region}</div>
                    <div style="font-size: 13px; display: flex; gap: 15px;">
                        <span>🎫 ${p.skipas}</span>
                        <span>🅿️ ${p.parking}</span>
                    </div>
                    <div id="wx-box-${p.id}"></div>
                </div>
            `;
            
            card.onclick = () => focusPark(p.id, p.lat, p.lng);
            list.appendChild(card);
        });
    }

    function focusPark(id, lat, lng) {
        MAP.flyTo([lat, lng], 13, { duration: 1.5 });
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${id}`).classList.add('active');
        MARKERS[id].openPopup();
        
        // Na mobilu odscrollovat k mapě (volitelné)
        if(window.innerWidth < 800) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    }

    // 3. Počasí - Postupné načítání (vylepšená verze z minula)
    document.getElementById('btnWx').addEventListener('click', async function() {
        const btn = this;
        btn.disabled = true;
        
        for (let i = 0; i < PARKS.length; i++) {
            const p = PARKS[i];
            btn.textContent = `Načítám ${i+1}/${PARKS.length}`;
            
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=temperature_2m_max,weathercode&timezone=auto`);
                const data = await res.json();
                
                const temp = Math.round(data.daily.temperature_2m_max[0]);
                const code = data.daily.weathercode[0];
                
                document.getElementById(`wx-box-${p.id}`).innerHTML = `
                    <div class="wx-row">
                        <div class="wx-item">
                            <div class="wx-day">Dnes</div>
                            <div class="wx-temp">${temp}°C</div>
                        </div>
                        <div class="wx-item">
                            <div class="wx-day">Stav</div>
                            <div style="font-size:16px">${getWxIcon(code)}</div>
                        </div>
                    </div>
                `;
            } catch(e) {}
            
            // Krátká pauza pro plynulost
            await new Promise(r => setTimeout(r, 50));
        }
        btn.textContent = "Počasí aktualizováno";
    });

    function getWxIcon(code) {
        if (code === 0) return '☀️';
        if (code < 4) return '⛅';
        if (code < 70) return '🌧️';
        return '⛈️';
    }

    // START
    initMap();
    fetchData();

</script>
</body>
</html>
