<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <meta name="theme-color" content="#F05A22">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="BikePark">
    <link id="manifest-link" rel="manifest">
    <title>Bikepark Atlas ČR</title>
    <script>
    // Generuj ikonu jako canvas PNG a vlož do manifestu
    (function() {
        // SVG ikona – oranžové pozadí + 🚠 emoji
        const iconSvg = (size, r) => `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
            <rect width="${size}" height="${size}" rx="${r}" fill="#F05A22"/>
            <text x="${size/2}" y="${size*0.72}" text-anchor="middle" dominant-baseline="middle" font-size="${size*0.55}" font-family="sans-serif">🚠</text>
            <text x="${size/2}" y="${size*0.92}" text-anchor="middle" font-size="${size*0.13}" font-weight="bold" font-family="sans-serif" fill="rgba(255,255,255,0.9)" letter-spacing="1">BIKEPARK</text>
        </svg>`;

        function svgToDataUrl(svgStr) {
            return 'data:image/svg+xml,' + encodeURIComponent(svgStr);
        }

        const manifest = {
            name: 'BikePark Atlas ČR',
            short_name: 'BikePark',
            description: 'Průvodce bikeparky a trail centry v ČR',
            start_url: './',
            display: 'standalone',
            background_color: '#F5F0EB',
            theme_color: '#F05A22',
            orientation: 'portrait-primary',
            icons: [
                { src: svgToDataUrl(iconSvg(192, 38)),  sizes: '192x192',  type: 'image/svg+xml', purpose: 'any maskable' },
                { src: svgToDataUrl(iconSvg(512, 102)), sizes: '512x512',  type: 'image/svg+xml', purpose: 'any maskable' }
            ]
        };

        const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        document.getElementById('manifest-link').href = url;
    })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root {
            color-scheme: light;
            --primary:    #F05A22;
            --primary-lt: #FEF0EA;
            --primary-dk: #C94A19;
            --green:      #22C55E;
            --green-lt:   #DCFCE7;
            --green-dk:   #16A34A;
            --blue:       #3B82F6;
            --bg:         #F5F0EB;
            --surface:    #FFFFFF;
            --surface2:   #FAF7F5;
            --border:     rgba(0,0,0,0.08);
            --border-md:  rgba(0,0,0,0.13);
            --text:       #1A1410;
            --text2:      #6B5E57;
            --muted:      #A0928A;
            --shadow-sm:  0 1px 4px rgba(0,0,0,0.07);
            --shadow-md:  0 4px 16px rgba(0,0,0,0.10);
            --shadow-lg:  0 8px 32px rgba(0,0,0,0.13);
            --orange-dim: rgba(240,90,34,0.10);
            --green-dim:  rgba(34,197,94,0.12);
            --card-bg:    #FFFFFF;
            --card-bg2:   #FAF7F5;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; line-height: 1.4; }

        /* LOADER */
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        #loader.hide { opacity: 0; pointer-events: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(240,90,34,0.15); border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HEADER */
        .hdr { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(255,255,255,0.95); backdrop-filter: blur(14px); border-bottom: 1px solid var(--border); z-index: 1000; display: flex; align-items: center; padding: 0 16px; gap: 10px; box-shadow: var(--shadow-sm); }
        .logo { font-weight: 800; font-size: 17px; white-space: nowrap; color: var(--text); }
        .logo span { color: var(--primary); }
        .hdr-sep { width: 1px; height: 24px; background: var(--border-md); flex-shrink: 0; }
        .pills { display: flex; gap: 4px; }
        .pill { font-size: 11px; font-weight: 700; padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border-md); background: transparent; color: var(--text2); cursor: pointer; white-space: nowrap; transition: all .15s; }
        .pill:hover { border-color: var(--primary); color: var(--primary); background: var(--orange-dim); }
        .pill.on { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(240,90,34,0.3); }
        .pill.on.tc { background: var(--green); border-color: var(--green); box-shadow: 0 2px 8px rgba(34,197,94,0.3); }
        .srch { position: relative; flex: 1; max-width: 180px; }
        .srch input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border-md); color: var(--text); padding: 7px 10px 7px 28px; border-radius: 20px; font-size: 12px; outline: none; font-family: inherit; transition: border-color .15s; }
        .srch input:focus { border-color: var(--primary); }
        .srch input::placeholder { color: var(--muted); }
        .srch-ic { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 12px; opacity: .45; pointer-events: none; }
        .hdr-r { margin-left: auto; display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
        .btn-update { background: var(--primary); color: #fff; border: none; padding: 8px 14px; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; transition: background .15s; box-shadow: 0 2px 8px rgba(240,90,34,0.25); }
        .btn-update:hover { background: var(--primary-dk); }
        .btn-loc { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border-md); padding: 7px 11px; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; transition: all .15s; }
        .btn-loc:hover { border-color: var(--primary); color: var(--primary); }
        .btn-wx-all { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border-md); padding: 7px 11px; border-radius: 9px; font-weight: 700; cursor: pointer; font-size: 12px; font-family: inherit; white-space: nowrap; transition: all .15s; }
        .btn-wx-all:hover { border-color: var(--blue); color: var(--blue); }

        /* LAYOUT */
        .app { display: flex; height: calc(100dvh - 60px); margin-top: 60px; }

        /* SIDEBAR */
        .sidebar { width: 480px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(0,0,0,.12); border-radius: 2px; }
        .sb-top { padding: 10px 14px; background: rgba(245,240,235,0.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--text2); position: sticky; top: 0; z-index: 10; }
        .sb-top b { color: var(--primary); }
        .sb-top select { background: var(--surface); border: 1.5px solid var(--border-md); color: var(--text); padding: 4px 8px; border-radius: 7px; font-family: inherit; font-size: 11px; outline: none; cursor: pointer; }
        .map-side { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .map-origin { position: absolute; bottom: 28px; left: 10px; z-index: 500; background: rgba(255,255,255,.92); border: 1px solid var(--border-md); border-radius: 9px; padding: 6px 10px; font-size: 11px; color: var(--text2); pointer-events: none; box-shadow: var(--shadow-sm); }

        /* KARTA */
        .card { background: var(--surface); border-radius: 16px; margin: 10px 12px; border: 1.5px solid var(--border); transition: all .2s; cursor: pointer; overflow: hidden; box-shadow: var(--shadow-sm); }
        .card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-md), 0 0 0 3px rgba(240,90,34,0.08); }
        .card.active { border-color: var(--primary); box-shadow: var(--shadow-md), 0 0 0 3px rgba(240,90,34,0.12); }
        .card.active.tc { border-color: var(--green); box-shadow: var(--shadow-md), 0 0 0 3px rgba(34,197,94,0.12); }

        /* barevný pruh */
        .card-bar { height: 4px; }
        .card-bar.bp { background: linear-gradient(90deg, var(--primary), #F48A5A); }
        .card-bar.tc { background: linear-gradient(90deg, var(--green), #4ADE80); }

        .card-summary { padding: 14px 16px 12px; }
        .card-head { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
        .card-ico { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .card-ico.bp { background: var(--orange-dim); }
        .card-ico.tc { background: var(--green-dim); }
        .card-title { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
        .card-sub { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
        .tag { font-size: 9.5px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; padding: 2px 7px; border-radius: 5px; }
        .tag-bp { background: var(--orange-dim); color: var(--primary); }
        .tag-tc { background: var(--green-dim); color: var(--green-dk); }
        .tag-reg { background: rgba(0,0,0,.06); color: var(--text2); font-size: 9px; }
        .tag-plan { background: var(--orange-dim); color: var(--primary); }
        .tag-vis { background: var(--green-dim); color: var(--green-dk); }
        .card-btns { display: flex; gap: 4px; flex-shrink: 0; margin-left: auto; }
        .ab { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid var(--border-md); background: var(--surface2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .13s; }
        .ab:hover { border-color: var(--primary); background: var(--orange-dim); }
        .ab.on-p { background: var(--orange-dim); border-color: var(--primary); }
        .ab.on-v { background: var(--green-dim); border-color: var(--green); }

        /* rychlé info */
        .card-stats { display: flex; flex-wrap: wrap; gap: 3px 12px; font-size: 12.5px; color: var(--text2); margin-bottom: 8px; }
        .cst b { color: var(--text); font-weight: 700; }
        .cst.fr b { color: var(--green-dk); }

        /* poznámka náhled v kartičce */
        .card-note-preview { font-size: 11.5px; color: var(--text2); background: var(--surface2); border-radius: 7px; padding: 6px 10px; margin-top: 4px; border-left: 3px solid var(--primary); line-height: 1.4; }

        /* wx inline */
        .wx-inline { font-size: 12px; }

        /* expand tlačítko */
        .x-btn { width: 100%; background: transparent; border: none; border-top: 1px solid var(--border); padding: 7px 14px; display: flex; align-items: center; gap: 5px; font-family: inherit; font-size: 11.5px; font-weight: 600; color: var(--muted); cursor: pointer; transition: color .13s; }
        .x-btn:hover, .x-btn.xo { color: var(--primary); }
        .x-arr { display: inline-block; font-size: 9px; transition: transform .2s; }
        .x-btn.xo .x-arr { transform: rotate(180deg); }

        /* detail sekce */
        .card-detail { display: none; padding: 4px 16px 16px; border-top: 1px solid var(--border); background: var(--surface2); }
        .card-detail.open { display: block; }
        .ds { margin-top: 14px; }
        .ds-t { font-size: 9.5px; font-weight: 700; letter-spacing: .7px; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
        .ds-d { font-size: 12.5px; color: var(--text2); line-height: 1.65; }

        /* trasy */
        .tpills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
        .tp { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--text2); background: var(--surface); border: 1.5px solid var(--border-md); border-radius: 6px; padding: 3px 9px; }
        .tp-km { font-size: 10px; color: var(--muted); }

        /* diff bar */
        .diff-bar { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
        .diff-segs { display: flex; gap: 3px; flex: 1; }
        .dseg { height: 5px; flex: 1; border-radius: 3px; background: rgba(0,0,0,.08); }
        .dseg.g { background: #22c55e; } .dseg.b { background: #3b82f6; } .dseg.r { background: #ef4444; } .dseg.k { background: #1a1410; }
        .diff-lbl { font-size: 10px; color: var(--muted); white-space: nowrap; }

        /* meta grid */
        .mgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .mc { background: var(--surface); border: 1px solid var(--border); border-radius: 9px; padding: 8px 10px; }
        .mc-l { font-size: 8.5px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
        .mc-v { font-size: 12px; font-weight: 800; color: var(--text); }
        .mc-v.fr { color: var(--green-dk); }

        /* hvězdičky */
        .stars { display: flex; gap: 3px; margin-top: 4px; }
        .star { font-size: 22px; color: rgba(0,0,0,.15); cursor: pointer; transition: color .1s, transform .1s; line-height: 1; }
        .star.on { color: #F59E0B; }
        .star:hover { transform: scale(1.18); color: #F59E0B; }
        .rrow { display: flex; align-items: center; gap: 8px; }
        .rlbl { font-size: 11px; color: var(--muted); }

        /* poznámka */
        .ntxt { margin-top: 6px; }
        .ntxt textarea { width: 100%; background: var(--surface); border: 1.5px solid var(--border-md); border-radius: 9px; padding: 9px 11px; font-family: inherit; font-size: 12px; color: var(--text); resize: vertical; min-height: 68px; outline: none; line-height: 1.5; transition: border-color .14s; }
        .ntxt textarea:focus { border-color: var(--primary); }
        .ntxt textarea::placeholder { color: var(--muted); }
        .nrow { margin-top: 6px; display: flex; align-items: center; gap: 8px; }
        .btn-save { font-family: inherit; font-size: 11.5px; font-weight: 700; padding: 7px 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background .13s; box-shadow: 0 2px 6px rgba(240,90,34,0.2); }
        .btn-save:hover { background: var(--primary-dk); }
        .btn-save:disabled { background: var(--border-md); color: var(--muted); cursor: not-allowed; box-shadow: none; }
        .nst { font-size: 11px; color: var(--muted); }
        .nst.ok { color: var(--green-dk); font-weight: 600; }

        /* počasí */
        .wx-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .wx-box { background: var(--surface); padding: 11px; border-radius: 11px; font-size: 11px; border: 1.5px solid var(--border); }
        .wx-day { font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; font-size: 10px; }
        .wx-temp { font-size: 17px; font-weight: 800; margin-bottom: 4px; color: var(--text); }
        .wx-ic { font-size: 26px; margin-bottom: 4px; }

        /* linky */
        .lrow { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .lbtn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 13px; border: 1.5px solid var(--border-md); border-radius: 8px; font-family: inherit; font-size: 11px; font-weight: 700; color: var(--text2); text-decoration: none; background: var(--surface); cursor: pointer; transition: all .13s; }
        .lbtn:hover { border-color: var(--primary); color: var(--primary); background: var(--orange-dim); }

        /* popup */
        .leaflet-popup-content-wrapper { background: #fff !important; border: 1.5px solid var(--border-md) !important; border-radius: 14px !important; color: var(--text) !important; box-shadow: var(--shadow-lg) !important; padding: 0 !important; overflow: hidden; }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip { background: #fff !important; }
        .leaflet-popup-close-button { color: var(--muted) !important; top: 8px !important; right: 10px !important; font-size: 18px !important; }

        /* toast */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: #fff; padding: 10px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; z-index: 9999; opacity: 0; transition: all .3s; pointer-events: none; white-space: nowrap; box-shadow: var(--shadow-md); }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        #toast.ok  { background: var(--green-dk); }
        #toast.err { background: #DC2626; }

        /* návštěvy */
        .visit-row { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
        .visit-row:last-child { border-bottom: none; }
        .visit-date { color: var(--primary); font-weight: 700; white-space: nowrap; flex-shrink: 0; }
        .visit-note { color: var(--text2); flex: 1; line-height: 1.4; }
        .visit-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0 4px; flex-shrink: 0; transition: color .15s; }
        .visit-del:hover { color: #DC2626; }
        .visit-add { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; align-items: center; }
        .visit-date-input { background: var(--surface); border: 1.5px solid var(--border-md); border-radius: 8px; padding: 6px 9px; font-family: inherit; font-size: 12px; color: var(--text); outline: none; width: 140px; transition: border-color .15s; }
        .visit-date-input:focus { border-color: var(--primary); }
        .visit-note-input { background: var(--surface); border: 1.5px solid var(--border-md); border-radius: 8px; padding: 6px 9px; font-family: inherit; font-size: 12px; color: var(--text); outline: none; flex: 1; min-width: 120px; transition: border-color .15s; }
        .visit-note-input:focus { border-color: var(--primary); }
        .visit-date-input::placeholder, .visit-note-input::placeholder { color: var(--muted); }
        .visits-list { max-height: 200px; overflow-y: auto; scrollbar-width: thin; margin-bottom: 2px; }

        /* QUICK FILTRY */
        .quick-filters { display: none; position: absolute; top: 12px; left: 10px; right: 10px; z-index: 600; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-wrap: nowrap; padding-bottom: 2px; }
        .quick-filters::-webkit-scrollbar { display: none; }
        .qf-pill { flex-shrink: 0; padding: 7px 14px; border-radius: 20px; border: 1.5px solid rgba(0,0,0,.12); background: rgba(255,255,255,.92); backdrop-filter: blur(10px); color: var(--text2); font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap; font-family: inherit; transition: all .15s; box-shadow: var(--shadow-sm); }
        .qf-pill:hover { border-color: var(--primary); color: var(--primary); }
        .qf-pill.on { background: var(--primary); border-color: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(240,90,34,0.3); }
        .qf-pill.on.tc { background: var(--green); border-color: var(--green); box-shadow: 0 2px 8px rgba(34,197,94,0.3); }
        .qf-pill.on.dist50 { background: #8B5CF6; border-color: #8B5CF6; box-shadow: 0 2px 8px rgba(139,92,246,0.3); }
        .qf-pill.on.free { background: var(--green); border-color: var(--green); box-shadow: 0 2px 8px rgba(34,197,94,0.3); }

        /* FAB */
        .fab-loc { display: none; position: absolute; bottom: 16px; right: 12px; z-index: 600; width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,.95); backdrop-filter: blur(8px); border: 1.5px solid var(--border-md); color: var(--primary); font-size: 18px; cursor: pointer; align-items: center; justify-content: center; box-shadow: var(--shadow-md); transition: background .15s; }
        .fab-loc:hover { background: var(--orange-dim); }

        /* BOTTOM NAV */
        .bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 58px; background: rgba(255,255,255,.97); backdrop-filter: blur(14px); border-top: 1px solid var(--border); z-index: 1100; justify-content: space-around; align-items: center; box-shadow: 0 -2px 12px rgba(0,0,0,0.06); }
        .bn-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--muted); cursor: pointer; padding: 4px 0; border: none; background: none; font-family: inherit; transition: color .15s; }
        .bn-item.active { color: var(--primary); }
        .bn-icon { font-size: 20px; line-height: 1; }
        .bn-label { font-size: 9px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase; }

        /* MODAL lokality */
        .loc-modal { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 9000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .loc-modal.hide { display: none; }
        .loc-box { background: var(--surface); border: 1.5px solid var(--border-md); border-radius: 18px; padding: 24px; width: 340px; max-width: 94vw; box-shadow: var(--shadow-lg); }
        .loc-box h3 { font-size: 15px; font-weight: 800; margin-bottom: 16px; color: var(--text); }
        .loc-presets { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .loc-preset { background: var(--surface2); border: 1.5px solid var(--border-md); border-radius: 9px; padding: 9px 13px; font-family: inherit; font-size: 12px; font-weight: 600; color: var(--text2); cursor: pointer; text-align: left; transition: all .13s; }
        .loc-preset:hover { border-color: var(--primary); background: var(--orange-dim); color: var(--primary); }
        .loc-preset.active { border-color: var(--primary); background: var(--orange-dim); color: var(--primary); }
        .loc-sep { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
        .loc-custom { display: flex; flex-direction: column; gap: 6px; }
        .loc-custom input { background: var(--surface2); border: 1.5px solid var(--border-md); border-radius: 8px; padding: 8px 11px; font-family: inherit; font-size: 12px; color: var(--text); outline: none; transition: border-color .13s; }
        .loc-custom input:focus { border-color: var(--primary); }
        .loc-custom input::placeholder { color: var(--muted); }
        .loc-row { display: flex; gap: 6px; }
        .loc-row input { flex: 1; }
        .loc-btns { display: flex; gap: 8px; margin-top: 16px; }
        .loc-btns button { flex: 1; padding: 10px; border-radius: 9px; border: none; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: background .13s; }
        .loc-cancel { background: var(--surface2); color: var(--text2); border: 1.5px solid var(--border-md) !important; }
        .loc-cancel:hover { background: var(--bg); }
        .loc-ok { background: var(--primary); color: #fff; box-shadow: 0 2px 8px rgba(240,90,34,0.25); }
        .loc-ok:hover { background: var(--primary-dk); }

        /* COORDS POPUP */
        .coords-popup .leaflet-popup-content-wrapper { background: #fff !important; border: 1.5px solid var(--border-md) !important; border-radius: 14px !important; color: var(--text) !important; padding: 0 !important; }
        .coords-popup .leaflet-popup-content { margin: 0 !important; }
        .coords-popup .leaflet-popup-tip { background: #fff !important; }


        /* Leaflet light theme */
        .leaflet-control-zoom a { background: #fff !important; color: var(--text) !important; border-color: var(--border-md) !important; }
        .leaflet-control-zoom a:hover { background: var(--surface2) !important; color: var(--primary) !important; }
        /* Na mobilu posuň zoom nad bottom nav (58px) + mezera */
        @media (max-width: 850px) {
            .leaflet-bottom.leaflet-right { bottom: 68px !important; }
        }
        .leaflet-control-attribution { background: rgba(255,255,255,.85) !important; color: var(--text2) !important; font-size: 10px !important; }
        .leaflet-bar { box-shadow: var(--shadow-sm) !important; border: 1px solid var(--border-md) !important; }

        /* Mobile media query */
        @media (max-width: 850px) {
            body { overflow: hidden; }

            /* Header: jen logo + hledání + lokace */
            .hdr {
                position: relative; top: auto;
                height: auto; padding: 8px 12px;
                gap: 8px; flex-wrap: nowrap;
            }
            .hdr-sep, .pills, .btn-update, .btn-wx-all { display: none; }
            .logo { font-size: 15px; }
            .srch { max-width: none; flex: 1; }
            .btn-loc { font-size: 10px; padding: 5px 9px; }

            /* Hlavní layout */
            .app {
                margin-top: 0 !important;
                height: calc(100dvh - 58px) !important;
                flex-direction: column;
            }

            /* Mapa = celá výška */
            .map-side { flex: 1; position: relative; z-index: 5; }

            /* Quick filtry + FAB viditelné */
            .quick-filters { display: flex; }
            .fab-loc { display: flex; }

            /* Sidebar – skrytý panel přes celou obrazovku */
            .sidebar {
                display: none;
                width: 100%;
                position: fixed;
                top: 0; bottom: 58px; left: 0; right: 0;
                z-index: 900;
                overflow-y: auto;
                border-right: none;
                background: var(--bg);
            }
            .sidebar.mob-visible { display: block; }

            /* Bottom nav viditelný */
            .bottom-nav { display: flex; }

            /* Karty na mobilu */
            .card { margin: 10px 10px 0; }
            .card:last-child { margin-bottom: 68px; }
            .card-summary { padding: 13px 13px 10px; }
            .mgrid { grid-template-columns: 1fr 1fr; }
            .sb-top { position: sticky; top: 0; z-index: 10; }
        }
    </style>
</head>
<body>

<div id="loader">

<header class="hdr">

            <button class="loc-preset" data-lat="50.0755" data-lng="14.4378" data-name="Praha" onclick="selectPreset(this)">📍 Praha</button>

<script>
// ═══════════════════════════════════════════════
// KONFIGURACE
// ═══════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec';
const DEFAULT_LAT = 49.1694, DEFAULT_LNG = 16.5928, DEFAULT_NAME = 'Brno – Nový Lískovec';
let START_LAT = DEFAULT_LAT, START_LNG = DEFAULT_LNG;

// Načti uložený výchozí bod
try {
    const saved = JSON.parse(localStorage.getItem('bp_origin') || 'null');
    if (saved && saved.lat && saved.lng) { START_LAT = saved.lat; START_LNG = saved.lng; updateOriginUI(saved.name || `${saved.lat}, ${saved.lng}`); }
} catch(e) {}

function updateOriginUI(name) {
    document.getElementById('loc-label').textContent = name;
    document.getElementById('map-origin').textContent = '📍 Výchozí bod: ' + name;
}

function openLocModal() {
    document.getElementById('loc-modal').classList.remove('hide');
    document.getElementById('loc-lat').value = '';
    document.getElementById('loc-lng').value = '';
    document.getElementById('loc-name').value = '';
    // Označ aktivní preset
    document.querySelectorAll('.loc-preset').forEach(b => {
        b.classList.toggle('active', parseFloat(b.dataset.lat) === START_LAT && parseFloat(b.dataset.lng) === START_LNG);
    });
}
function closeLocModal() { document.getElementById('loc-modal').classList.add('hide'); }

function selectPreset(btn) {
    document.querySelectorAll('.loc-preset').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('loc-lat').value = btn.dataset.lat;
    document.getElementById('loc-lng').value = btn.dataset.lng;
    document.getElementById('loc-name').value = btn.dataset.name;
}

function applyLocation() {
    const lat = parseFloat(document.getElementById('loc-lat').value);
    const lng = parseFloat(document.getElementById('loc-lng').value);
    const name = document.getElementById('loc-name').value.trim() || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    if (isNaN(lat) || isNaN(lng)) { toast('Zadej platné souřadnice', 'err'); return; }
    START_LAT = lat; START_LNG = lng;
    localStorage.setItem('bp_origin', JSON.stringify({ lat, lng, name }));
    updateOriginUI(name);
    // Přesuň marker výchozího bodu
    if (window._originMarker) MAP.removeLayer(window._originMarker);
    window._originMarker = L.circleMarker([START_LAT, START_LNG], { radius: 7, fillColor: '#f59e0b', color: '#fff', weight: 2, fillOpacity: 1 })
        .addTo(MAP).bindTooltip('📍 ' + name);
    MAP.flyTo([START_LAT, START_LNG], 10);
    closeLocModal();
    toast('Výchozí bod změněn, přepočítávám...', 'ok');
    updateAll();
}

// Počasí pro všechny viditelné lokality najednou
async function loadAllWeather() {
    const btn = document.querySelector('.btn-wx-all');
    btn.textContent = '⏳ Načítám...';
    btn.disabled = true;

    const today = new Date().getDay();
    const dSat = ((6 - today + 7) % 7) || 7;
    const dSun = dSat + 1;
    const WXC = {
        0:['☀️','Jasno'], 1:['🌤','Převážně jasno'], 2:['⛅','Polojasno'], 3:['☁️','Zataženo'],
        45:['🌫','Mlha'], 51:['🌦','Mrholení'], 61:['🌧','Slabý déšť'], 63:['🌧','Déšť'],
        65:['🌧','Vydatný déšť'], 71:['🌨','Sněžení'], 80:['🌦','Přeháňky'],
        81:['🌧','Silné přeháňky'], 95:['⛈','Bouřka']
    };
    function wxInfo(code) {
        const k = Object.keys(WXC).map(Number).sort((a,b)=>a-b);
        for (let i = k.length-1; i >= 0; i--) if (k[i] <= code) return WXC[k[i]];
        return ['🌡','—'];
    }
    const visible = PARKS.filter(isVisible);
    // Otevři detaily a načti počasí pro každou lokalitu
    await Promise.all(visible.map(async p => {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=temperature_2m_max,temperature_2m_min,weathercode,windspeed_10m_max,precipitation_probability_max&timezone=Europe%2FPrague&forecast_days=14`);
            const data = await res.json();
            const days = data.daily;
            const card = document.querySelector(`.card[data-id="${p.id}"]`);
            if (!card) return;
            const box = card.querySelector('[data-wx-box]');
            const wxBtn = card.querySelector('[data-a="wx"]');
            if (!box) return;
            // Otevři detail karty pokud není otevřen
            const det = card.querySelector('.card-detail');
            const xb = card.querySelector('.x-btn');
            if (det && !det.classList.contains('open')) {
                det.classList.add('open');
                if (xb) { xb.classList.add('xo'); xb.querySelector('.x-arr').textContent='▲'; xb.lastChild.textContent=' Sbalit detail'; }
            }
            const html = (d) => {
                const w = wxInfo(days.weathercode[d]);
                return `<div class="wx-box">
                    <div class="wx-day">${d===dSat?'Sobota':'Neděle'}</div>
                    <div class="wx-ic">${w[0]}</div>
                    <div class="wx-temp">${Math.round(days.temperature_2m_max[d])}°C <span style="font-size:11px;opacity:.6">/ ${Math.round(days.temperature_2m_min[d])}°C</span></div>
                    <div style="margin-top:3px;opacity:.7">${w[1]}</div>
                    <div style="margin-top:4px;opacity:.7">💨 ${Math.round(days.windspeed_10m_max[d])} km/h</div>
                    ${days.precipitation_probability_max[d]>0?`<div style="opacity:.7">🌂 ${days.precipitation_probability_max[d]}%</div>`:''}
                </div>`;
            };
            box.innerHTML = html(dSat) + html(dSun);
            box.style.display = 'grid';
            if (wxBtn) wxBtn.style.display = 'none';
        } catch(e) {}
    }));
    btn.textContent = '☁ Počasí vše';
    btn.disabled = false;
    toast(`Počasí načteno pro ${visible.length} lokalit`, 'ok');
}

// ═══════════════════════════════════════════════
// STAV APLIKACE
// ═══════════════════════════════════════════════
let PARKS = [], flt = 'all', qry = '', srt = 'dist', selId = null;
let MAP, MARKERS = {}, UD = {};
let qfDist50 = false, qfFree = false;
let VISITS = {}; // { park_id: [{date, note}, ...] }

// Quick filtry
function initQuickFilters() {
    document.querySelectorAll('.qf-pill').forEach(btn => {
        btn.addEventListener('click', () => {
            const qf = btn.dataset.qf;
            if (qf === 'all') {
                flt = 'all'; qfDist50 = false; qfFree = false;
                document.querySelectorAll('.qf-pill').forEach(b => b.classList.remove('on'));
                btn.classList.add('on');
            } else if (qf === 'bikepark' || qf === 'trail') {
                const wasOn = btn.classList.contains('on');
                document.querySelectorAll('.qf-pill[data-qf="all"],.qf-pill[data-qf="bikepark"],.qf-pill[data-qf="trail"]').forEach(b => b.classList.remove('on'));
                if (wasOn) { flt = 'all'; document.querySelector('.qf-pill[data-qf="all"]').classList.add('on'); }
                else { flt = qf; btn.classList.add('on'); }
            } else if (qf === 'dist50') {
                qfDist50 = !qfDist50; btn.classList.toggle('on', qfDist50);
            } else if (qf === 'free') {
                qfFree = !qfFree; btn.classList.toggle('on', qfFree);
            }
            renderUI();
        });
    });
}

// Tab switching (mobil)
function switchTab(tab) {
    if (window.innerWidth > 850) return;
    const sidebar = document.getElementById('sidebar');
    document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
    if (tab === 'map') {
        document.getElementById('bn-map').classList.add('active');
        sidebar.classList.remove('mob-visible');
        setTimeout(() => MAP && MAP.invalidateSize(), 100);
    } else {
        document.getElementById('bn-' + tab).classList.add('active');
        sidebar.classList.add('mob-visible');
    }
}

// Locate me (FAB)
function locateMe() {
    if (!navigator.geolocation) { toast('Poloha není dostupná', 'err'); return; }
    toast('Zjišťuji polohu...', '');
    navigator.geolocation.getCurrentPosition(pos => {
        START_LAT = pos.coords.latitude; START_LNG = pos.coords.longitude;
        const name = 'Moje poloha';
        localStorage.setItem('bp_origin', JSON.stringify({ lat: START_LAT, lng: START_LNG, name }));
        updateOriginUI(name);
        if (window._originMarker) MAP.removeLayer(window._originMarker);
        window._originMarker = L.circleMarker([START_LAT, START_LNG], { radius: 7, fillColor: '#f59e0b', color: '#fff', weight: 2, fillOpacity: 1 })
            .addTo(MAP).bindTooltip('📍 Moje poloha');
        MAP.flyTo([START_LAT, START_LNG], 10);
        toast('Poloha nalezena, přepočítávám...', 'ok');
        updateAll();
    }, () => toast('Polohu nelze zjistit', 'err'));
}

// Načti uložená uživatelská data
try { UD = JSON.parse(localStorage.getItem('bp_ud') || '{}'); } catch(e) { UD = {}; }
async function deleteVisit(e, parkId, card) {
    e.stopPropagation();
    const btn = e.target.closest('[data-a="dv"]');
    if (!btn) return;
    const vid = btn.dataset.vid;
    if (!confirm('Smazat tuto návštěvu?')) return;
    btn.textContent = '…';
    try {
        const res = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'deleteVisit', visit_id: vid, park_id: parkId })
        });
        const data = await res.json();
        if (data.ok) {
            btn.closest('.visit-row').remove();
            if (VISITS[parkId]) VISITS[parkId] = VISITS[parkId].filter(v => v.id != vid);
            const vlist = document.getElementById('vlist-' + parkId);
            if (vlist && vlist.children.length === 0) {
                vlist.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:4px 0">Zatím žádná návštěva</div>';
            }
            toast('Návštěva smazána', 'ok');
        } else {
            btn.textContent = '✕';
            toast('Chyba mazání: ' + (data.error||''), 'err');
        }
    } catch(err) {
        btn.textContent = '✕';
        toast('Nelze smazat – zkontroluj spojení', 'err');
    }
}

function updateStatusTag(card, status) {
    // Odstraň staré status tagy
    card.querySelectorAll('.tag-plan, .tag-vis').forEach(t => t.remove());
    const sub = card.querySelector('.card-sub');
    if (!sub) return;
    if (status === 'planned') {
        const t = document.createElement('span');
        t.className = 'tag tag-plan'; t.textContent = '📌 V plánu';
        sub.appendChild(t);
    } else if (status === 'visited') {
        const t = document.createElement('span');
        t.className = 'tag tag-vis'; t.textContent = '✅ Navštíveno';
        sub.appendChild(t);
    }
}

function saveUD() { try { localStorage.setItem('bp_ud', JSON.stringify(UD)); } catch(e) {} }
function gu(id) { return UD[id] || {}; }
function su(id, f, v) {
    if (!UD[id]) UD[id] = {};
    UD[id][f] = v;
    saveUD();
    // Sync do Sheets
    if (SCRIPT_URL) {
        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'saveUserData', id, field: f, value: v }) }).catch(() => {});
    }
}

// Toast
let toastT;
function toast(m, t) {
    const el = document.getElementById('toast');
    el.textContent = m; el.className = 'toast show ' + (t || '');
    clearTimeout(toastT); toastT = setTimeout(() => el.className = 'toast', 3000);
}

// ═══════════════════════════════════════════════
// MAPA
// ═══════════════════════════════════════════════
function initMap() {
    MAP = L.map('map', { zoomControl: false }).setView([49.8, 15.5], 7);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a>',
        subdomains: 'abcd', maxZoom: 19
    }).addTo(MAP);

    // Zoom do pravého dolního rohu – pryč od headeru a sidebaru
    L.control.zoom({ position: 'bottomright' }).addTo(MAP);

    window._originMarker = L.circleMarker([START_LAT, START_LNG], { radius: 7, fillColor: '#f59e0b', color: '#fff', weight: 2, fillOpacity: 1 })
        .addTo(MAP).bindTooltip('📍 ' + (document.getElementById('loc-label')?.textContent || 'Výchozí bod'));
}

// Custom SVG drop-pin ikona
function makeIcon(isBP, active) {
    const bg   = isBP ? '#F05A22' : '#22c55e';
    const ring = active ? '#fff' : 'rgba(255,255,255,0.55)';
    const sw   = active ? 2.5 : 1.5;
    const em   = isBP ? '🚠' : '🥾';
    const s    = active ? 42 : 34;
    const h    = Math.round(s * 1.35);
    const svg  = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${h}" viewBox="0 0 42 57">
      <filter id="ds"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.45"/></filter>
      <ellipse cx="21" cy="54" rx="7" ry="2.5" fill="rgba(0,0,0,0.22)"/>

      <text x="21" y="22" text-anchor="middle" dominant-baseline="middle" font-size="15">${em}</text>
    </svg>`;
    return L.divIcon({ html: svg, className: '', iconSize: [s, h], iconAnchor: [s/2, h], popupAnchor: [0, -h + 4] });

function addMarker(p) {
    const isBP = p.type && p.type.includes('bikepark');
    const mk = L.marker([p.lat, p.lng], { icon: makeIcon(isBP, false) }).addTo(MAP);
    mk.bindPopup(buildPopup(p), { maxWidth: 280 });
    mk.on('click', () => {
        PARKS.forEach(q => MARKERS[q.id]?.setIcon(makeIcon(q.type?.includes('bikepark'), false)));
        mk.setIcon(makeIcon(isBP, true));
    });
    mk.on('popupclose', () => mk.setIcon(makeIcon(isBP, false)));
    MARKERS[p.id] = mk;
}

async function fetchData() {
    const status = document.getElementById('loader-status');
    try {
        status.textContent = 'Stahování dat ze Sheetu...';
        const res = await fetch(SCRIPT_URL + '?action=getData');
        const result = await res.json();

        PARKS = result.data.map(row => {
            // Flexibilní načtení sloupců
            const g = (...keys) => {
                const k = Object.keys(row).find(k => keys.includes(k.toLowerCase().trim().replace(/\s+/g,'_')));
                return k ? String(row[k] || '') : '';
            };
            const lat = parseFloat(g('lat','šířka','latitude'));
            const lng = parseFloat(g('lng','délka','longitude'));
            if (isNaN(lat) || isNaN(lng) || lat === 0) return null;

            // Trails JSON
            let trails = [];
            const rawT = g('trails_json','trasy_json','trasy','trails');
            if (rawT && rawT.trim().startsWith('[')) {
                try { trails = JSON.parse(rawT); } catch(e) {}
            }

            return {
                id:                 g('id'),
                name:               g('name','název','jméno'),
                lat, lng,
                region:             g('region','kraj'),
                skipas:             g('skipas','cena'),
                parking:            g('parking','parkování'),
                desc:               g('description','popis'),
                web:                g('web','web_url','url'),
                season:             g('season','sezóna','sezona'),
                lifts:              g('lifts','lanovky','počet_lanovek'),
                elevation:          g('elevation','m_n.m.','nadmořská_výška','m_nm'),
                overall_difficulty: g('overall_difficulty','obtížnost'),
                type:               g('type','typ').toLowerCase(),
                trail_count:        g('trail_count','počet_tras'),
                green_count:        g('green_count','zelené'),
                blue_count:         g('blue_count','modré'),
                red_count:          g('red_count','červené/černé','červené_černé'),
                trails,
                _my_status:         g('my_status','stav'),
                _my_note:           g('my_note'),
                _my_rating:         g('my_rating','hodnocení'),
            };
        }).filter(Boolean);

        // Načti uživatelská data ze Sheets do UD
        // Sheets má přednost před localStorage
        try {
            const udRes = await fetch(SCRIPT_URL + '?action=getUserData');
            const udResult = await udRes.json();
            if (udResult.userData) {
                // Slouč: Sheets přepíše localStorage
                Object.entries(udResult.userData).forEach(([id, fields]) => {
                    if (!UD[id]) UD[id] = {};
                    if (fields.status) UD[id].status = fields.status;
                    if (fields.note)   UD[id].note   = fields.note;
                    if (fields.rating) UD[id].rating = fields.rating;
                });
                saveUD();
            }
        } catch(e) {
            console.warn('getUserData ze Sheets selhal, používám localStorage:', e.message);
        }

        // Načti návštěvy ze Sheets
        try {
            const vRes = await fetch(SCRIPT_URL + '?action=getVisits');
            const vResult = await vRes.json();
            if (vResult.visits) {
                VISITS = vResult.visits; // { park_id: [{date, note}, ...] }
            }
        } catch(e) {
            console.warn('getVisits selhal:', e.message);
        }

        await updateAll();

        const loader = document.getElementById('loader');
        loader.classList.add('hide');
        setTimeout(() => loader.remove(), 600);

    } catch(e) {
        status.textContent = 'Chyba: ' + e.message;
        console.error(e);
    }
}

// ═══════════════════════════════════════════════
// VÝPOČET VZDÁLENOSTÍ
// Primárně OSRM (reálná silniční vzdálenost),
// fallback na Haversine (vzdušná čára × 1.35)
// ═══════════════════════════════════════════════

// Haversine – vzdušná vzdálenost v km
function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function updateAll() {
    const btn = document.querySelector('.btn-update');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Počítám…'; }

    // OSRM – dávky po 5, aby server nebyl přetížen
    const BATCH = 5;
    for (let i = 0; i < PARKS.length; i += BATCH) {
        const batch = PARKS.slice(i, i + BATCH);
        await Promise.all(batch.map(async p => {
            try {
                const url = `https://router.project-osrm.org/route/v1/driving/${START_LNG},${START_LAT};${p.lng},${p.lat}?overview=false&hints=;`;
                const res  = await fetch(url, { signal: AbortSignal.timeout(6000) });
                const data = await res.json();
                if (data.code === 'Ok' && data.routes?.[0]) {
                    p.distKm  = data.routes[0].distance / 1000;
                    p.duration = Math.round(data.routes[0].duration / 60);
                    p._distSource = 'osrm';
                } else {
                    throw new Error('no route');
                }
            } catch(e) {
                // Fallback: vzdušná vzdálenost × korekční faktor 1.35 (průměr CZ silnice)
                const air = haversine(START_LAT, START_LNG, p.lat, p.lng);
                p.distKm   = air * 1.35;
                p.duration = Math.round((p.distKm / 70) * 60); // ~70 km/h průměr
                p._distSource = 'fallback';
            }
        }));
        // Průběžně překresli po každé dávce
        renderUI();
    }

    if (btn) { btn.disabled = false; btn.textContent = 'Přepočítat trasy'; }
    toast('Vzdálenosti aktualizovány', 'ok');
}

// ═══════════════════════════════════════════════
function isVisible(p) {
    if (flt !== 'all' && !(p.type && p.type.includes(flt))) return false;
    if (qfDist50 && (p.distKm || 9999) > 50) return false;
    if (qfFree && p.skipas && p.skipas.toLowerCase() !== 'zdarma') return false;
    if (qry) {
        const q = qry.toLowerCase();
        return p.name.toLowerCase().includes(q) || (p.region||'').toLowerCase().includes(q);
    }
    return true;
}

function getSorted() {
    let list = PARKS.filter(isVisible);
    list.sort((a, b) => {
        if (srt === 'dist') return (a.distKm||9999) - (b.distKm||9999);
        if (srt === 'name') return a.name.localeCompare(b.name, 'cs');
        if (srt === 'rating') return parseFloat(gu(b.id).rating||0) - parseFloat(gu(a.id).rating||0);
        return 0;
    });
    return list;
}

function renderUI() {
    const list = getSorted();
    document.getElementById('cnt').textContent = list.length;

    // Markery
    Object.values(MARKERS).forEach(m => MAP.removeLayer(m));
    MARKERS = {};
    PARKS.filter(isVisible).forEach((p, i) => addMarker(p, i));

    const side = document.getElementById('sidebar');
    // Zachovat sb-top
    const sbTop = side.querySelector('.sb-top');
    side.innerHTML = '';
    if (sbTop) side.appendChild(sbTop);

    if (!list.length) {
        side.insertAdjacentHTML('beforeend', '<div style="padding:40px;text-align:center;color:var(--muted);font-size:13px">Žádná lokalita neodpovídá filtru.</div>');
        return;
    }

    list.forEach(p => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = buildCard(p);
        const card = wrapper.firstElementChild;
        side.appendChild(card);
        wireCard(card, p);
    });

    // Načti inline počasí pro všechny viditelné parky (v pozadí)
    loadInlineWeather(list);
}

// Inline počasí – malá ikona + teplota v kartičce
const WX_CACHE = {};
const WXC = {
    0:'☀️',1:'🌤',2:'⛅',3:'☁️',45:'🌫',51:'🌦',61:'🌧',63:'🌧',
    65:'🌧',71:'🌨',80:'🌦',81:'🌧',95:'⛈'
};
function wxIcon(code) {
    const k = Object.keys(WXC).map(Number).sort((a,b)=>a-b);
    for (let i=k.length-1;i>=0;i--) if(k[i]<=code) return WXC[k[i]];
    return '🌡';
}
async function loadInlineWeather(list) {
    const today = new Date().getDay();
    const dSat = ((6-today+7)%7)||7;
    await Promise.all(list.map(async p => {
        const el = document.getElementById('wx-inline-'+p.id);
        if (!el) return;
        // Použij cache
        if (WX_CACHE[p.id]) { el.innerHTML = WX_CACHE[p.id]; return; }
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=weathercode,temperature_2m_max&timezone=Europe%2FPrague&forecast_days=14`);
            const data = await res.json();
            const icon = wxIcon(data.daily.weathercode[dSat]);
            const temp = Math.round(data.daily.temperature_2m_max[dSat]);
            const html = `<span title="Sobota">${icon} <b style="color:var(--text)">${temp}°</b></span>`;
            WX_CACHE[p.id] = html;
            if (el) el.innerHTML = html;
        } catch(e) { if(el) el.textContent = ''; }
    }));
}

                </div>
                <div class="visit-add">
                    <input type="date" class="visit-date-input" id="vdate-${p.id}" value="${new Date().toISOString().slice(0,10)}">
                    <input type="text" class="visit-note-input" id="vnote-${p.id}" placeholder="Poznámka k návštěvě (volitelné)">
                    <button class="btn-save" data-a="av">+ Přidat návštěvu</button>
                    <span class="nst" data-vns></span>
                </div>
            </div>

            <div class="lrow">
                ${p.web?`<a href="${p.web}" target="_blank" rel="noopener" class="lbtn" onclick="event.stopPropagation()">🌐 Oficiální web</a>`:''}
                <a href="${mcu}" target="_blank" rel="noopener" class="lbtn" onclick="event.stopPropagation()">🗺 Navigovat</a>
            </div>
        </div>
    </article>`;
}

// ═══════════════════════════════════════════════
// OBSLUHA KARTY
// ═══════════════════════════════════════════════
function wireCard(card, p) {
    const id = p.id;

    card.addEventListener('click', e => {
        if (e.target.closest('.ab') || e.target.closest('.card-detail') || e.target.closest('.lbtn') || e.target.closest('.x-btn')) return;
        selectPark(id);
    });

    // Plánuji
    card.querySelector('[data-a="pl"]')?.addEventListener('click', e => {
        e.stopPropagation();
        const cur    = gu(id).status;
        const newSt  = cur === 'planned' ? '' : 'planned';
        su(id, 'status', newSt);
        // Aktualizuj tlačítko a tag inline
        const btn = e.currentTarget;
        btn.classList.toggle('on-p', newSt === 'planned');
        const vBtn = card.querySelector('[data-a="vi"]');
        if (vBtn) vBtn.classList.remove('on-v');
        updateStatusTag(card, newSt);
        toast(newSt === 'planned' ? '📌 Přidáno do plánu' : 'Odebráno z plánu', 'ok');
    });

    // Navštíveno
    card.querySelector('[data-a="vi"]')?.addEventListener('click', e => {
        e.stopPropagation();
        const cur   = gu(id).status;
        const newSt = cur === 'visited' ? '' : 'visited';
        su(id, 'status', newSt);
        // Aktualizuj tlačítko a tag inline
        const btn = e.currentTarget;
        btn.classList.toggle('on-v', newSt === 'visited');
        const pBtn = card.querySelector('[data-a="pl"]');
        if (pBtn) pBtn.classList.remove('on-p');
        updateStatusTag(card, newSt);
        toast(newSt === 'visited' ? '✅ Označeno jako navštíveno' : 'Odznačeno', 'ok');
    });

    // Expand
    card.querySelectorAll('[data-a="x"]').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            const det = card.querySelector('.card-detail');
            const xb = card.querySelector('.x-btn');
            const open = det.classList.contains('open');
            det.classList.toggle('open');
            if (xb) {
                xb.classList.toggle('xo', !open);
                xb.querySelector('.x-arr').textContent = open ? '▼' : '▲';
                xb.lastChild.textContent = ' ' + (open ? 'Rozbalit detail' : 'Sbalit detail');
            }
        });
    });

    // Počasí
    card.querySelector('[data-a="wx"]')?.addEventListener('click', async e => {
        e.stopPropagation();
        const btn = e.currentTarget;
        const box = card.querySelector('[data-wx-box]');
        btn.textContent = 'Načítám...';
        btn.disabled = true;

        const today = new Date().getDay();
        const dSat = ((6 - today + 7) % 7) || 7;
        const dSun = dSat + 1;

        const WXC = {
            0:['☀️','Jasno'], 1:['🌤','Převážně jasno'], 2:['⛅','Polojasno'], 3:['☁️','Zataženo'],
            45:['🌫','Mlha'], 51:['🌦','Mrholení'], 61:['🌧','Slabý déšť'], 63:['🌧','Déšť'],
            65:['🌧','Vydatný déšť'], 71:['🌨','Sněžení'], 80:['🌦','Přeháňky'],
            81:['🌧','Silné přeháňky'], 95:['⛈','Bouřka']
        };
        function wxInfo(code) {
            const k = Object.keys(WXC).map(Number).sort((a,b)=>a-b);
            for (let i = k.length-1; i >= 0; i--) if (k[i] <= code) return WXC[k[i]];
            return ['🌡','—'];
        }

        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lng}&daily=temperature_2m_max,temperature_2m_min,weathercode,windspeed_10m_max,precipitation_probability_max&timezone=Europe%2FPrague&forecast_days=14`);
            const data = await res.json();
            const days = data.daily;

            const html = (d) => {
                const w = wxInfo(days.weathercode[d]);
                return `<div class="wx-box">
                    <div class="wx-day">${d===dSat?'Sobota':'Neděle'}</div>
                    <div class="wx-ic">${w[0]}</div>
                    <div class="wx-temp">${Math.round(days.temperature_2m_max[d])}°C <span style="font-size:11px;opacity:.6">/ ${Math.round(days.temperature_2m_min[d])}°C</span></div>
                    <div style="margin-top:3px;opacity:.7">${w[1]}</div>
                    <div style="margin-top:4px;opacity:.7">💨 ${Math.round(days.windspeed_10m_max[d])} km/h</div>
                    ${days.precipitation_probability_max[d]>0?`<div style="opacity:.7">🌂 ${days.precipitation_probability_max[d]}%</div>`:''}
                </div>`;
            };

            box.innerHTML = html(dSat) + html(dSun);
            box.style.display = 'grid';
            btn.style.display = 'none';
        } catch(e) {
            btn.textContent = '⚠ Nepodařilo se načíst počasí';
            btn.disabled = false;
        }
    });

    // Hvězdičky
    card.querySelectorAll('.star').forEach(st => {
        st.addEventListener('click', e => {
            e.stopPropagation();
            const r   = parseInt(st.dataset.s);
            const cur = parseFloat(gu(id).rating || 0);
            const newR = cur === r ? 0 : r;
            su(id, 'rating', String(newR));
            // Aktualizuj hvězdičky inline bez zavření karty
            card.querySelectorAll('.star').forEach((s, i) => {
                s.classList.toggle('on', i < newR);
            });
            const rlbl = card.querySelector('.rlbl');
            if (rlbl) rlbl.textContent = newR ? newR + '/5 ★' : 'Neohodnoceno';
            toast('Hodnocení uloženo ' + (newR ? '★'.repeat(newR) : '–'), 'ok');
        });
    });

    // Přidat návštěvu
    card.querySelector('[data-a="av"]')?.addEventListener('click', async e => {
        e.stopPropagation();
        const btn  = e.currentTarget;
        const date = document.getElementById('vdate-' + id)?.value;
        const note = document.getElementById('vnote-' + id)?.value.trim();
        const vns  = card.querySelector('[data-vns]');
        if (!date) { toast('Vyber datum návštěvy', 'err'); return; }
        btn.disabled = true; btn.textContent = 'Ukládám…';
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'addVisit', park_id: id, date, note })
            });
            const data = await res.json();
            if (data.ok) {
                // Přidej do lokálního VISITS
                if (!VISITS[id]) VISITS[id] = [];
                VISITS[id].push({ id: data.visit_id, date, note });
                // Překresli seznam návštěv
                const vlist = document.getElementById('vlist-' + id);
                if (vlist) {
                    const row = document.createElement('div');
                    row.className = 'visit-row';
                    row.dataset.vid = data.visit_id;
                    row.innerHTML = `<div class="visit-date">📅 ${date}</div><div class="visit-note">${note||'—'}</div><button class="visit-del" data-a="dv" data-vid="${data.visit_id}" title="Smazat">✕</button>`;
                    row.querySelector('[data-a="dv"]').addEventListener('click', ev => deleteVisit(ev, id, card));
                    vlist.insertBefore(row, vlist.firstChild);
                    if (vlist.querySelector('div[style]')) vlist.querySelector('div[style]').remove();
                }
                document.getElementById('vnote-' + id).value = '';
                toast('Návštěva přidána ✓', 'ok');
                if (vns) { vns.textContent = '✓ Uloženo do Sheets'; vns.className = 'nst ok'; setTimeout(() => { vns.textContent=''; vns.className='nst'; }, 4000); }
            } else {
                toast('Chyba: ' + (data.error||'neznámá'), 'err');
            }
        } catch(err) {
            toast('Nelze uložit – zkontroluj spojení', 'err');
        }
        btn.disabled = false; btn.textContent = '+ Přidat návštěvu';
    });

    // Smazat návštěvu (delegace na vlist)
    card.querySelector('.visits-list')?.addEventListener('click', e => {
        const btn = e.target.closest('[data-a="dv"]');
        if (btn) deleteVisit(e, id, card);
    });


    card.querySelector('[data-a="sn"]')?.addEventListener('click', async e => {
        e.stopPropagation();
        const ta  = card.querySelector('textarea');
        const btn = e.currentTarget;
        const ns  = card.querySelector('[data-ns]');
        btn.disabled = true; btn.textContent = 'Ukládám…';
        ns.textContent = ''; ns.className = 'nst';
        su(id, 'note', ta.value);
        // Čekej na odpověď ze Sheets
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'saveUserData', id, field: 'note', value: ta.value })
            });
            const data = await res.json();
            if (data.ok) {
                ns.textContent = '✓ Uloženo do Google Sheets';
                ns.className = 'nst ok';
                toast('Poznámka uložena do Sheets', 'ok');
            } else {
                ns.textContent = '⚠ Uloženo lokálně (Sheets nedostupné)';
                ns.className = 'nst';
                toast('Uloženo lokálně', '');
            }
        } catch(err) {
            ns.textContent = '⚠ Uloženo lokálně (offline)';
            ns.className = 'nst';
        }
        btn.disabled = false;
        btn.textContent = 'Uložit poznámku';
        setTimeout(() => { ns.textContent = ''; ns.className = 'nst'; }, 5000);
    });
}

// ═══════════════════════════════════════════════
// VÝBĚR PARKU
// ═══════════════════════════════════════════════
function selectPark(id) {
    selId = id;
    renderUI();

    // Na mobilu přepni na Seznam tab aby byl detail vidět
    if (window.innerWidth <= 850) {
        switchTab('list');
    }

    setTimeout(() => {
        const card = document.querySelector(`.card[data-id="${id}"]`);
        if (!card) return;
        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        const det = card.querySelector('.card-detail');
        const xb = card.querySelector('.x-btn');
        if (det && !det.classList.contains('open')) {
            det.classList.add('open');
            if (xb) { xb.classList.add('xo'); xb.querySelector('.x-arr').textContent='▲'; xb.lastChild.textContent=' Sbalit detail'; }
        }
    }, 80);

    const p = PARKS.find(x => x.id === id);
    if (p) MAP.flyTo([p.lat, p.lng], 13);
}
