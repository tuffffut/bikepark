<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Bikepark Atlas CR</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#f0ede7;--white:#fff;--border:#e3dfd8;--border2:#ccc8c0;
  --ink:#18160f;--ink2:#5a564f;--ink3:#a09b93;
  --orange:#d4500e;--orange-l:#fff3ee;--green:#24603f;--green-l:#ebf5ef;
  --yellow:#e09b00;--blue:#1a4faa;
  --sh1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --sh2:0 4px 16px rgba(0,0,0,.09),0 1px 4px rgba(0,0,0,.05);
  --sh3:0 8px 28px rgba(0,0,0,.13);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}

/* HEADER */
.hdr{position:sticky;top:0;z-index:900;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--sh1);height:56px;padding:0 14px;display:flex;align-items:center;gap:10px}
.logo{font-size:16px;font-weight:800;color:var(--ink);white-space:nowrap;letter-spacing:-.3px}
.logo i{color:var(--orange);font-style:normal}
.vline{width:1px;height:22px;background:var(--border2);flex-shrink:0}
.pills{display:flex;gap:4px}
.pill{font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;border:1.5px solid var(--border2);background:transparent;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .14s}
.pill:hover{border-color:var(--orange);color:var(--orange)}
.pill.on{background:var(--orange);border-color:var(--orange);color:#fff}
.pill.on.tc{background:var(--green);border-color:var(--green)}
.srch{position:relative;flex:1;min-width:0;max-width:180px}
.srch input{width:100%;border:1.5px solid var(--border2);border-radius:20px;background:var(--bg);padding:6px 10px 6px 28px;font:inherit;font-size:13px;color:var(--ink);outline:none;transition:border-color .14s}
.srch input:focus{border-color:var(--orange)}
.srch::before{content:'\1F50D';position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--ink3);pointer-events:none}
.hd-r{margin-left:auto;display:flex;gap:10px;flex-shrink:0}
.hstat{font-size:11.5px;color:var(--ink3);display:flex;align-items:center;gap:4px}
.hdot{width:7px;height:7px;border-radius:50%}

/* LAYOUT */
.app{display:grid;grid-template-columns:400px 1fr;height:calc(100vh - 56px)}
.sidebar{display:flex;flex-direction:column;background:var(--bg);border-right:1px solid var(--border);overflow:hidden;height:calc(100vh - 56px)}
.sb-top{padding:9px 12px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sb-cnt{font-size:12px;font-weight:500;color:var(--ink3)}
.sb-cnt b{color:var(--orange);font-weight:700}
.sort-sel{font:inherit;font-size:12px;border:1px solid var(--border2);border-radius:6px;background:var(--white);padding:4px 8px;color:var(--ink2);outline:none;cursor:pointer}
/* KEY FIX: display:block not flex - cards never collapse */
.cl{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px}
.cl::-webkit-scrollbar{width:4px}
.cl::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.card+.card{margin-top:9px}

/* MAP */
.map-side{position:relative;height:calc(100vh - 56px)}
#map{width:100%;height:100%}
.map-lbl{position:absolute;bottom:28px;left:10px;z-index:500;background:var(--white);border:1px solid var(--border);border-radius:9px;padding:6px 10px;font-size:11px;color:var(--ink2);box-shadow:var(--sh2);pointer-events:none;line-height:1.45}
.map-lbl strong{color:var(--orange);display:block;font-size:11.5px}
.btn-fs{position:absolute;top:10px;right:10px;z-index:600;background:var(--white);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font:inherit;font-size:12.5px;font-weight:600;color:var(--ink2);cursor:pointer;box-shadow:var(--sh2);display:none;align-items:center;gap:5px;transition:all .14s}
.btn-fs:hover{border-color:var(--orange);color:var(--orange)}
.btn-fs-close{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:9001;background:var(--orange);color:#fff;border:none;border-radius:22px;padding:9px 20px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;box-shadow:var(--sh3);display:none;align-items:center;gap:6px}
.map-side.fs{position:fixed;inset:0;height:100dvh;z-index:9000}
.map-side.fs #map{height:100%}
.map-side.fs .btn-fs{display:none}
.map-side.fs .btn-fs-close{display:flex}
.map-side.fs .map-lbl{bottom:14px}

/* CARD */
.card{background:var(--white);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;box-shadow:var(--sh1);transition:border-color .18s,box-shadow .18s,transform .15s;display:block}
.card:hover{border-color:var(--orange);box-shadow:var(--sh2);transform:translateY(-1px)}
.card.sel{border-color:var(--orange);box-shadow:0 0 0 3px rgba(212,80,14,.1),var(--sh2)}
.card.sel.tc{border-color:var(--green);box-shadow:0 0 0 3px rgba(36,96,63,.1),var(--sh2)}
.cbar{height:3px}
.cbar.bp{background:linear-gradient(90deg,var(--orange),#f07a4a)}
.cbar.tc{background:linear-gradient(90deg,var(--green),#42a86b)}
.c-head{padding:10px 12px 6px;display:flex;align-items:flex-start;gap:9px}
.cico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cico.bp{background:var(--orange-l)}.cico.tc{background:var(--green-l)}
.cbod{flex:1;min-width:0}
.cname{font-size:14px;font-weight:700;color:var(--ink);margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ctags{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.badge{font-size:9.5px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 6px;border-radius:4px;white-space:nowrap}
.bbp{background:var(--orange-l);color:var(--orange)}
.btc{background:var(--green-l);color:var(--green)}
.breg{background:#edeae4;color:var(--ink3);font-size:9px}
.bpl{background:var(--orange-l);color:var(--orange)}
.bvi{background:var(--green-l);color:var(--green)}
.cbtns{display:flex;gap:4px;flex-shrink:0}
.ab{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .13s}
.ab:hover{border-color:var(--orange);background:var(--orange-l)}
.ab.onp{background:var(--orange-l);border-color:var(--orange)}
.ab.onv{background:var(--green-l);border-color:var(--green)}

/* STATS */
.cstats{padding:0 12px 8px;display:flex;flex-wrap:wrap;gap:4px 10px}
.cst{display:flex;align-items:center;gap:3px;font-size:12px;color:var(--ink2)}
.cst b{color:var(--ink);font-weight:600}
.cst.fr b{color:var(--green)}

/* WEATHER STRIP */
.wx-strip{padding:8px 12px 10px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:6px;background:linear-gradient(180deg,#f5f9ff,var(--white))}
.wxcol{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.8);border:1px solid #d8eaf8;border-radius:9px;padding:7px 9px}
.wxcol.sun{background:#fffdf0;border-color:#f0e0a0}
.wxcol.rain{background:#f0f5ff;border-color:#c5d5f0}
.wxcol.storm{background:#f5f0ff;border-color:#c8b8f0}
.wxcol.snow{background:#f0faff;border-color:#b8def5}
.wxico{font-size:26px;line-height:1;flex-shrink:0}
.wxinf{flex:1;min-width:0}
.wxdn{font-size:9.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink3);margin-bottom:1px}
.wxcond{font-size:11px;font-weight:600;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wxtmp{font-size:13px;font-weight:800;color:var(--ink)}
.wxtmp small{font-size:10px;font-weight:500;color:var(--ink3)}
.wxwnd{font-size:10px;color:var(--ink3)}
.wxwnd b{color:var(--ink2)}
.wx-loading{padding:7px 12px 9px;display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink3);border-top:1px solid var(--border)}
.wxspin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}

/* EXPAND */
.xbtn{width:100%;background:transparent;border:none;border-top:1px solid #f0ede7;padding:7px 12px;display:flex;align-items:center;gap:5px;font:inherit;font-size:12px;font-weight:500;color:var(--ink3);cursor:pointer;transition:color .13s}
.xbtn:hover,.xbtn.xo{color:var(--orange)}
.xarr{display:inline-block;transition:transform .2s;font-size:10px}
.xbtn.xo .xarr{transform:rotate(180deg)}

/* DETAIL */
.cdet{display:none;padding:2px 12px 12px;border-top:1px solid #f0ede7}
.cdet.open{display:block}
.ds{margin-top:11px}
.dst{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--ink3);margin-bottom:5px}
.dsdesc{font-size:12.5px;color:var(--ink2);line-height:1.65}
.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.mc{background:var(--bg);border-radius:7px;padding:7px 9px}
.mcl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:2px}
.mcv{font-size:12.5px;font-weight:700;color:var(--ink)}
.mcv.fr{color:var(--green)}
.dbar{display:flex;align-items:center;gap:7px;margin-top:4px}
.dsegs{display:flex;gap:3px;flex:1}
.dseg{height:5px;flex:1;border-radius:3px;background:var(--border)}
.dseg.g{background:#22c55e}.dseg.b{background:#3b82f6}.dseg.r{background:#ef4444}.dseg.k{background:#1c1917}
.dtxt{font-size:11px;color:var(--ink3);white-space:nowrap}
.tpills{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.tp{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:500;color:var(--ink2);background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px 8px}
.tpkm{font-size:10px;color:var(--ink3)}
.stars{display:flex;gap:2px;margin-top:4px}
.star{font-size:22px;color:var(--border2);cursor:pointer;line-height:1;transition:color .1s,transform .1s}
.star.on{color:var(--yellow)}
.star:hover{transform:scale(1.15)}
.rrow{display:flex;align-items:center;gap:9px}
.rlbl{font-size:12px;color:var(--ink3)}
.ntxt{margin-top:5px}
.ntxt textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font:inherit;font-size:12.5px;color:var(--ink);background:var(--bg);resize:vertical;min-height:70px;outline:none;line-height:1.55;transition:border-color .14s}
.ntxt textarea:focus{border-color:var(--orange)}
.ntxt textarea::placeholder{color:#c8c3bb}
.nrow{margin-top:6px;display:flex;align-items:center;gap:9px}
.bsave{font:inherit;font-size:12px;font-weight:600;padding:6px 14px;background:var(--orange);color:#fff;border:none;border-radius:7px;cursor:pointer}
.bsave:hover{background:#b8400b}
.bsave:disabled{background:var(--border2);cursor:not-allowed}
.nst{font-size:11.5px;color:var(--ink3)}
.nst.ok{color:var(--green)}.nst.err{color:var(--orange)}
.lrow{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
.lbtn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border:1.5px solid var(--border2);border-radius:7px;font:inherit;font-size:12px;font-weight:500;color:var(--ink2);text-decoration:none;background:transparent;cursor:pointer;transition:all .13s}
.lbtn:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-l)}

/* LEAFLET */
.leaflet-popup-content-wrapper{border-radius:13px!important;box-shadow:var(--sh3)!important;border:1px solid var(--border)!important;padding:0!important;overflow:hidden}
.leaflet-popup-content{margin:0!important;min-width:210px}
.leaflet-popup-close-button{top:8px!important;right:10px!important;color:var(--ink3)!important;font-size:17px!important}
.leaflet-control-zoom{border:none!important;box-shadow:var(--sh2)!important}
.leaflet-control-zoom a{background:var(--white)!important;color:var(--ink)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{color:var(--orange)!important}
.leaflet-control-attribution{background:rgba(255,255,255,.8)!important;font-size:10px!important}
.pst{height:4px}.pst.bp{background:linear-gradient(90deg,var(--orange),#f07a4a)}.pst.tc{background:linear-gradient(90deg,var(--green),#42a86b)}
.pbdy{padding:11px 13px 13px}
.pnm{font-size:14px;font-weight:700;margin-bottom:2px}
.ptp{font-size:11.5px;font-weight:600;margin-bottom:6px}
.ptp.bp{color:var(--orange)}.ptp.tc{color:var(--green)}
.pmt{font-size:12px;color:var(--ink2);line-height:1.75}
.pbtn{display:block;width:100%;margin-top:9px;padding:7px;border:none;border-radius:7px;font:inherit;font-size:12.5px;font-weight:700;cursor:pointer;text-align:center}
.pbtn.bp{background:var(--orange);color:#fff}.pbtn.tc{background:var(--green);color:#fff}

/* LOADING */
#ld{position:fixed;inset:0;z-index:9999;background:var(--white);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
#ld.gone{display:none!important}
.spin{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:sp .7s linear infinite}
#ldt{font-size:18px;font-weight:700;color:var(--ink2)}
#ldm{font-size:13px;color:var(--ink3)}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--white);border:1.5px solid var(--border);border-radius:22px;padding:8px 16px;font-size:12.5px;color:var(--ink2);box-shadow:var(--sh2);opacity:0;transform:translateY(8px);transition:all .24s;pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
#toast.ok{color:var(--green);border-color:var(--green)}
#toast.err{color:var(--orange);border-color:var(--orange)}

/* MOBILE */
@media(max-width:800px){
  .app{display:block;height:auto}
  .sidebar{height:auto;overflow:visible}
  .cl{max-height:none;padding:8px}
  .map-side{height:50vw;min-height:220px}
  .btn-fs{display:flex!important}
  .hd-r{display:none}
  body{font-size:15px}
  .cname{font-size:15px}
  .cico{width:42px;height:42px;font-size:20px}
  .cst{font-size:13px}
  .ab{width:36px;height:36px;font-size:16px}
  .wxico{font-size:28px}
  .wxcond{font-size:12px}
  .wxtmp{font-size:14px}
  .xbtn{font-size:13px;padding:9px 12px}
  .star{font-size:26px}
  .tp{font-size:12.5px;padding:4px 9px}
  .mg{grid-template-columns:1fr 1fr}
  .ntxt textarea{font-size:15px;min-height:80px}
  .bsave{font-size:14px;padding:9px 18px}
  .lbtn{font-size:13px;padding:9px 14px}
  .pill{font-size:13px;padding:6px 12px}
}
</style>
</head>
<body>

<div id="ld">
  <div class="spin"></div>
  <div id="ldt">Bikepark Atlas</div>
  <div id="ldm">Pripravuji aplikaci...</div>
</div>
<div id="toast"></div>

<header class="hdr">
  <div class="logo">Bike<i>park</i> Atlas</div>
  <div class="vline"></div>
  <div class="pills">
    <button class="pill on" data-f="all">Vse</button>
    <button class="pill" data-f="bikepark">Bikeparky</button>
    <button class="pill tc" data-f="trail">Trail centra</button>
  </div>
  <div class="srch"><input type="text" id="sq" placeholder="Hledat..."></div>
  <div class="hd-r">
    <div class="hstat"><div class="hdot" style="background:var(--orange)"></div><span id="sBP">-</span></div>
    <div class="hstat"><div class="hdot" style="background:var(--green)"></div><span id="sTC">-</span></div>
  </div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sb-top">
      <div class="sb-cnt">Zobrazeno: <b id="cnt">-</b> lokalit</div>
      <select class="sort-sel" id="ss">
        <option value="dist">Vzdalnost</option>
        <option value="name">Nazev</option>
        <option value="rating">Hodnoceni</option>
        <option value="type">Typ</option>
      </select>
    </div>
    <div class="cl" id="cl"></div>
  </aside>
  <div class="map-side" id="mside">
    <div id="map"></div>
    <div class="map-lbl"><strong>Vychozi bod</strong>Brno - Novy Liskovec</div>
    <button class="btn-fs" id="btnFS">&#x26F6; Cela obrazovka</button>
    <button class="btn-fs-close" id="btnFSC">&#x2715; Zavrit mapu</button>
  </div>
</div>

<script>
// ── NASTAVENÍ ──────────────────────────────────────────
// Vloz svou Apps Script URL:
//var SCRIPT_URL = 'VLOZ_ZDE_SVOU_APPS_SCRIPT_URL';
// ──────────────────────────────────────────────────────

var SU = 'https://script.google.com/macros/s/AKfycbyYrMpmabpG58oWuiQwLNrkYUyJu53ZLFFgQBrBsCdVR7Sg8diz6PmeqMyKOmd0eu3a/exec';

var OLA=49.1694,OLN=16.5928;
var PARKS=[],flt='all',qry='',srt='dist',selId=null;
var MAP,MKS={},UD={},WX={};

function gd(la,ln){var R=6371,r=function(x){return x*Math.PI/180};var a=Math.sin(r(la-OLA)/2)*Math.sin(r(la-OLA)/2)+Math.cos(r(OLA))*Math.cos(r(la))*Math.sin(r(ln-OLN)/2)*Math.sin(r(ln-OLN)/2);return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))}
function ft(km){var m=Math.round(km/80*60);return m<60?m+'min':Math.floor(m/60)+'h'+(m%60?' '+m%60+'m':'')}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function gu(id){return UD[id]||{}}
function su(id,f,v){if(!UD[id])UD[id]={};UD[id][f]=v;var su_ok=SCRIPT_URL&&SCRIPT_URL.indexOf('http')===0;if(su_ok)fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'saveUserData',id:id,field:f,value:v})}).catch(function(){})}

var TOAST_T;
function toast(m,t){var el=document.getElementById('toast');el.textContent=m;el.className='toast show '+(t||'');clearTimeout(TOAST_T);TOAST_T=setTimeout(function(){el.className='toast'},3000)}
function hideLd(){document.getElementById('ld').classList.add('gone')}

// ── MAP ──
function initMap(){
  MAP=L.map('map').setView([49.8,16.5],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(MAP);
  L.marker([OLA,OLN],{icon:L.divIcon({className:'',html:'<div style="width:13px;height:13px;background:#d4500e;border-radius:50%;border:2.5px solid #fff;box-shadow:0 2px 7px rgba(212,80,14,.5)"></div>',iconSize:[13,13],iconAnchor:[6,6]})}).addTo(MAP).bindTooltip('Brno - Novy Liskovec');
}

function addMk(p){
  var bp=p.type==='bikepark',c=bp?'#d4500e':'#24603f';
  var m=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',html:'<div style="width:34px;height:34px;border-radius:9px;background:'+c+';border:2px solid rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 9px rgba(0,0,0,.22)">'+(bp?'\u{1F6A0}':'\u{1F97E}')+'</div>',iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-20]})}).addTo(MAP);
  m.bindPopup(mkpop(p),{maxWidth:275});
  m.on('click',function(){pick(p.id)});
  MKS[p.id]=m;
}

function mkpop(p){
  var bp=p.type==='bikepark',u=gu(p.id);
  var st=u.my_status==='planned'?'<br><b style="color:#d4500e">V planu</b>':u.my_status==='visited'?'<br><b style="color:#24603f">Navstiveno</b>':'';
  var wx=WX[p.id],wxl='';
  if(wx&&wx[0]){var w=wxi(wx[0].code);wxl='<br>Vikendu: '+w.i+' '+wx[0].maxT+'&#176;C, vitr '+wx[0].wind+'km/h'}

var WXC={
  0:{i:'\u2600\uFE0F',l:'Jasno',c:'sun'},1:{i:'\uD83C\uDF24\uFE0F',l:'Prevazne jasno',c:'sun'},
  2:{i:'\u26C5',l:'Polojasno',c:''},3:{i:'\u2601\uFE0F',l:'Zatazeno',c:''},

  51:{i:'\uD83C\uDF26\uFE0F',l:'Mrholeni',c:'rain'},53:{i:'\uD83C\uDF26\uFE0F',l:'Mrholeni',c:'rain'},
  55:{i:'\uD83C\uDF27\uFE0F',l:'Huste mrholeni',c:'rain'},

  95:{i:'\u26C8\uFE0F',l:'Bourka',c:'storm'},96:{i:'\u26C8\uFE0F',l:'Bourka',c:'storm'}
};
function wxi(code){var c=WXC[code];if(c)return c;var k=Object.keys(WXC).map(Number).sort(function(a,b){return a-b});for(var i=k.length-1;i>=0;i--){if(k[i]<=code)return WXC[k[i]]}return{i:'\uD83C\uDF21\uFE0F',l:'Neznamo',c:''}}
function wnd(kmh){if(kmh<10)return 'Klid';if(kmh<20)return 'Slaby';if(kmh<30)return 'Mirny';if(kmh<40)return 'Cerstvý';if(kmh<55)return 'Silny';return 'Bourlivy'}
function nxtWknd(){var t=new Date(),d=t.getDay(),ds=(6-d+7)%7;if(ds===0)ds=7;var sa=new Date(t);sa.setDate(t.getDate()+ds);var su=new Date(sa);su.setDate(sa.getDate()+1);return[sa,su]}
function fday(d){var n=['Ne','Po','Ut','St','Ct','Pa','So'];return n[d.getDay()]+' '+d.getDate()+'.'+(d.getMonth()+1)+'.'}

function wxHTML(id){
  var days=WX[id];
  if(!days)return '';
  var h='<div class="wx-strip">';
  days.forEach(function(d){var w=wxi(d.code);h+='<div class="wxcol '+w.c+'"><div class="wxico">'+w.i+'</div><div class="wxinf"><div class="wxdn">'+fday(d.date)+'</div><div class="wxcond">'+w.l+'</div><div class="wxtmp">'+d.maxT+'&#176;C <small>/ '+d.minT+'&#176;C</small></div><div class="wxwnd">&#128168; <b>'+d.wind+'km/h</b> '+wnd(d.wind)+'</div>'+(d.precip>0?'<div class="wxwnd">&#127746; <b>'+d.precip+'%</b></div>':'')+'</div></div>'});
  return h+'</div>';
}

// Load weather for ONE park — returns promise
function loadWx(p){
  var wknd=nxtWknd(),sat=wknd[0].toISOString().slice(0,10),sun=wknd[1].toISOString().slice(0,10);
  var url='https://api.open-meteo.com/v1/forecast?latitude='+p.lat.toFixed(4)+'&longitude='+p.lng.toFixed(4)+'&daily=temperature_2m_max,temperature_2m_min,weathercode,windspeed_10m_max,precipitation_probability_max&timezone=Europe%2FPrague&forecast_days=14';
  return fetch(url,{signal:AbortSignal.timeout?AbortSignal.timeout(8000):undefined}).then(function(r){return r.json()}).then(function(data){
    var dates=data.daily.time,si=dates.indexOf(sat),ui=dates.indexOf(sun);
    if(si<0||ui<0){WX[p.id]=null;return}
    WX[p.id]=[
      {date:wknd[0],maxT:Math.round(data.daily.temperature_2m_max[si]),minT:Math.round(data.daily.temperature_2m_min[si]),code:data.daily.weathercode[si],wind:Math.round(data.daily.windspeed_10m_max[si]),precip:data.daily.precipitation_probability_max[si]},
      {date:wknd[1],maxT:Math.round(data.daily.temperature_2m_max[ui]),minT:Math.round(data.daily.temperature_2m_min[ui]),code:data.daily.weathercode[ui],wind:Math.round(data.daily.windspeed_10m_max[ui]),precip:data.daily.precipitation_probability_max[ui]}
    ];
  }).catch(function(){WX[p.id]=null});
}

// Load weather for all parks in batches of 5, update cards as they load
function loadAllWx(){
  var parks=PARKS.slice(),batchSize=5;
  function nextBatch(){
    if(!parks.length)return;
    var batch=parks.splice(0,batchSize);
    Promise.all(batch.map(function(p){return loadWx(p)})).then(function(){
      // Update only weather strips in existing cards (no full re-render)
      batch.forEach(function(p){
        var card=document.querySelector('.card[data-id="'+p.id+'"]');
        if(!card)return;
        var existing=card.querySelector('.wx-strip,.wx-loading');
        if(existing){existing.outerHTML=wxHTML(p.id)||''}
        else{
          var statsEl=card.querySelector('.cstats');
          if(statsEl&&WX[p.id])statsEl.insertAdjacentHTML('afterend',wxHTML(p.id));
        }
      });
      setTimeout(nextBatch,50);
    });
  }
  setTimeout(nextBatch,500);
}

function pr(row){
  var la=parseFloat(String(row.lat||'').replace(/[^0-9.\-]/g,'')),ln=parseFloat(String(row.lng||'').replace(/[^0-9.\-]/g,''));
  if(isNaN(la)||isNaN(ln)||Math.abs(la)>90||Math.abs(ln)>180)return null;
  var d=gd(la,ln),rawt=row.trails_json||row.trails||'',trails=[];
  var s=String(rawt).trim();
  if(s.charAt(0)==='['){try{trails=JSON.parse(s).map(function(t){return{d:String(t.d||''),n:String(t.n||''),km:parseFloat(t.km)||0}})}catch(e){}}
  return{id:row.id||String(row.name||'').toLowerCase().replace(/[^a-z0-9]/g,'-'),name:String(row.name||''),type:String(row.type||'').toLowerCase().indexOf('bikepark')>=0?'bikepark':'trail',lat:la,lng:ln,region:String(row.region||''),skipas:String(row.skipas||'viz web'),parking:String(row.parking||'viz web'),web:String(row.web||''),season:String(row.season||''),lifts:String(row.lifts||''),desc:String(row.description||''),trails:trails,_d:d,_t:ft(d)};
}

function isvis(p){
  if(flt!=='all'&&p.type!==flt)return false;
  if(qry){var q=qry.toLowerCase();return p.name.toLowerCase().indexOf(q)>=0||p.region.toLowerCase().indexOf(q)>=0}
  return true;
}
function glist(){
  var l=PARKS.filter(isvis);
  l.sort(function(a,b){
    if(srt==='dist')return a._d-b._d;if(srt==='name')return a.name.localeCompare(b.name,'cs');

    if(srt==='rating')return parseFloat((gu(b.id).my_rating||0))-parseFloat((gu(a.id).my_rating||0));
    return 0;
  });
  return l;
}

// MAIN INIT — synchronous, loader hides immediately
// ══════════════════════════════════════════════════════
function main(){
  // 1. Init map (synchronous)
  try{initMap()}catch(e){console.error('Map init:',e)}

  // 2. Load parks data
  var isPlaceholder=!SCRIPT_URL||SCRIPT_URL.indexOf('VLOZ')===0||SCRIPT_URL.indexOf('http')!==0;
  if(isPlaceholder){
    // Use fallback immediately
    PARKS=FD();
    PARKS.forEach(function(p){try{addMk(p)}catch(e){}});
    document.getElementById('sBP').textContent=PARKS.filter(function(p){return p.type==='bikepark'}).length+' bikepark';
    document.getElementById('sTC').textContent=PARKS.filter(function(p){return p.type==='trail'}).length+' trail center';
    render();
    hideLd(); // ← hide loader NOW
    loadAllWx(); // weather in background
  } else {
    // Fetch from Sheets — but show fallback immediately as placeholder
    PARKS=FD();
    PARKS.forEach(function(p){try{addMk(p)}catch(e){}});
    render();
    hideLd(); // ← hide loader NOW, before fetch completes
    // Then silently update with real Sheets data
    fetch(SCRIPT_URL+'?action=getData')
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()})
      .then(function(j){
        if(j.error)throw new Error(j.error);
        j.data.forEach(function(row){if(row.id)UD[row.id]={my_status:row.my_status||'',my_note:row.my_note||'',my_rating:row.my_rating||'',my_visited_date:row.my_visited_date||''}});
        var fresh=j.data.map(pr).filter(Boolean);
        if(fresh.length){
          // Remove old markers
          PARKS.forEach(function(p){var m=MKS[p.id];if(m&&MAP.hasLayer(m))MAP.removeLayer(m)});
          MKS={};
          PARKS=fresh;
          PARKS.forEach(function(p){try{addMk(p)}catch(e){}});
          document.getElementById('sBP').textContent=PARKS.filter(function(p){return p.type==='bikepark'}).length+' bikepark';
          document.getElementById('sTC').textContent=PARKS.filter(function(p){return p.type==='trail'}).length+' trail center';
          render();
          toast('Data z Google Sheets nactena','ok');
        }
      })
      .catch(function(e){console.warn('Sheets:',e);toast('Sheets nedostupne - zobrazuji zabudovana data','err')})
      .finally(function(){loadAllWx()});
  }
}
